body:
  text: 卷之七治眼目疾錦鳩丸治肝經不足風邪內乘上攻眼暗淚出怕日羞明隱澀癢痛瞻視茫茫多見黑花或生翳膜並皆治之草決明子蕤仁去皮羌活去蘆瞿麥各三兩細辛去苗牡蠣洗火煅取粉黃連去須杜蒺藜炒去尖角防風去蘆肉桂去粗皮甘菊花淨各五兩白茯苓去皮四兩斑鳩一隻去皮毛腸嘴爪用文武火連骨炙乾羯羊肝一具薄批炙令焦蔓荊子二升淘洗絹袋盛飯甑蒸一伏時日乾上十五味為末煉蜜和杵五百下丸如梧桐子大每服十五丸至二十丸以溫水或溫酒下空心日午臨臥日三服如久患內外障眼服諸藥無效者漸加服五十丸必效暴赤眼疼痛食後用荊芥湯下二十丸駐景丸治肝腎俱虛眼常昏暗多見黑花或生障翳視物不明迎風有淚久服補肝腎增目力車前子熟乾地黃淨洗酒蒸焙各三兩菟絲子酒浸別研為末五兩上為末煉蜜為丸如梧桐子大每服三十丸溫酒下空心晚食前日二服密蒙花散治風氣攻注兩眼昏暗眵淚羞明瞼生風粟隱澀難開或癢或痛漸生翳膜視物不明及久患偏頭疼牽引兩眼漸覺細小昏澀隱痛並暴赤腫痛並皆療之密蒙花淨石決明用鹽同東流水煮一伏時漉出研粉木賊杜蒺藜炒去尖羌活去蘆菊花去土各等分上為細末每服一錢臘茶清調下食後日二服羚羊角散治大人小兒一切風熱毒上攻眼目暴發赤腫或生瘡疼痛隱澀羞明羚羊角鎊黃芩升麻甘草炙車前子各十兩梔子仁草龍膽各五兩決明子二十兩上為末每一錢食後溫熱水調下日進三服小兒可服半錢秦皮散治大人小兒風毒赤眼腫痛癢澀眵淚昏暗羞明秦皮滑石桂府者搗碎黃連去須各十兩上為細末每用半錢沸湯泡去滓溫熱頻洗鎮肝丸治肝經不足內受風熱上攻眼目昏暗癢痛隱澀難開堆眵多淚怕日羞明時發腫赤或生障翳並宜服之蔓荊子去白皮地膚子人參茺蔚子決明子白茯苓去皮遠志去心防風去蘆叉各一兩青葙子地骨皮柴胡去蘆山藥車前子柏子仁炒玄參甘菊甘草炙各半兩細辛去苗一分上為末蜜水煮糊丸如梧桐子大每服二十丸米飲下食後日二服菊睛丸治肝腎不足眼目昏暗瞻視不明茫茫漠漠常見黑花多有冷淚久服補不足強目力枸杞子三兩巴戟去心一兩甘菊花揀四兩蓯蓉酒浸去皮炒切焙二兩上為細末煉蜜丸如梧桐子大每服三十丸至五十丸溫酒或鹽湯下空心食前服紹興續添方菩薩散治男子婦人風氣攻注兩眼昏暗眵淚羞明瞼眥腫癢或時赤痛耳鳴頭眩荊芥穗一兩半蒼朮米泔浸一宿去皮銼炒白蒺藜炒防風銼炒各二兩甘草炒一兩上併為細末不拘時入鹽少許沸湯或酒調下一大錢神妙撥雲散治男子婦人風毒上攻眼目昏暗翳膜遮障怕日羞明多生熱淚隱澀難開眶癢赤痛瞼眥紅爛瘀肉侵睛但是一切風毒眼疾並皆治之羌活防風柴胡甘草炒各一斤上為末每服二錢水一盞半煎至七分食後臨睡時服薄荷茶調菊花苗湯下亦得忌醃藏鮓醬濕面炙爆發風毒物等寶慶新增方草龍膽散治上焦受於風熱氣毒攻衝眼目暴赤磣澀羞明腫痛多眵迎風有淚翳膜攀睛胬肉隱痛並皆治之又方見後川芎不見火香附炒去毛各四兩龍膽草洗去蘆草決明子微炒甘草炙木賊洗淨去節菊花去梗各二兩上為細末每服二錢用麥門冬熟水入砂糖少許同調食後服或米泔調服亦得食後或臨睡服之蟬花散治肝經蘊熱風毒之氣內搏上攻眼目翳膜遮睛赤腫疼痛昏暗視物不明隱澀難開多生眵淚內外障眼蟬蛻洗淨去土穀精草洗去土白蒺藜炒菊花去梗防風不見火草決明炒密蒙花去枝羌活黃芩去土蔓荊子去白皮山梔子去皮甘草炒川芎不見火木賊草淨洗荊芥穗各等分上為末每服二錢用茶清調服或用荊芥湯入茶少許調服亦得食後及臨臥時服淳祐新添方春雪膏治肝經不足內受風熱上攻眼目昏暗癢痛隱澀難開昏眩赤腫怕日羞明不能遠視迎風有淚多見黑花並皆療之腦子研二錢半蕤仁去皮殼壓去油二兩上用生蜜六錢重將腦子蕤仁同搜和每用銅箸子或金銀叉股大小眥時復少許點之及治連眶赤爛以油紙塗藥貼吳直閣增諸家名方流氣飲治肝經不足內受風熱上攻眼目昏暗視物不明常見黑花當風多淚怕日羞明堆眵赤腫隱澀難開或生障翳倒睫拳毛眼眩赤爛及婦人血風眼及時行暴赤腫眼眼胞紫黑應有眼病並宜服之大黃炮川芎菊花去枝牛蒡子炒細辛去苗防風去苗山去皮白蒺藜炒去刺黃芩去蘆甘草炙玄參去蘆蔓荊子去白皮荊芥去梗木賊去根節各一兩蒼朮米泔浸一宿炒控二兩草決明一兩半上搗羅為末每服二錢半臨臥用冷酒調下如嬰兒有患只令乳母服之洗肝散治風毒上攻暴作赤目腫痛難開隱澀眵淚昏暗羞明或生翳膜並皆治之當歸去蘆薄荷去梗羌活去蘆防風去蘆山梔子仁甘草炙大黃煨川芎各二兩上為末每服二錢冷水或熟水調下食後日服見效菊花散理肝氣風毒眼目赤腫昏暗羞明隱澀難開攀睛瘀肉或癢或痛漸生翳膜及治暴赤腫痛悉皆治之白蒺藜炒去刺羌活去蘆不見火木賊去節蟬蛻去頭足翅各三兩菊花去梗六兩上為細末每服二錢食後臨臥茶清調下常服明利頭目洗肝去風忌發風醃藏炙爆等物明睛散能治外障退翳膜療風毒上攻睛疼赤腫或瞼眥癢時多熱淚昏澀赤芍藥當歸去蘆洗焙黃連去須滑石細研上件各五兩銼碎碾為細末入研滑石拌勻每用半錢沸湯點澄清去渣熱洗忌一切醃藏魚鮓酒面等毒物續添諸局經驗祕方蟬花無比散治大人小兒遠年近日一切風眼氣眼攻注眼目昏暗瞼生風粟或痛或癢漸生翳膜侵睛遮障視物不明及久患偏正頭風牽搐兩眼漸漸細小連眶赤爛及小兒瘡疹入眼白膜遮睛赤澀隱痛並皆治之常服祛風退翳明目蛇蛻微炙一兩蟬蛻去頭足翅二兩羌活當歸洗焙石決明用鹽同東流水煮一伏時漉出搗研如粉川芎各三兩防風去叉枝茯苓去皮甘草炙各四兩芍藥赤者十三兩蒺藜炒去刺半斤蒼朮浸去皮炒十二兩上為末每三錢食後米泔調服茶清亦得忌食發風毒等物明睛地黃丸治男子婦人肝臟積熱肝虛目暗膜入水輪漏睛眵淚眼見黑花視物不明混睛冷淚翳膜遮障及腎臟虛憊肝受虛熱及遠年日近暴熱赤眼風毒氣眼並皆治之兼治乾溼腳氣消中消渴及諸風氣等疾由腎氣虛敗者但服此能補肝益腎驅風明目其效不可具述生乾地黃焙洗熟乾地黃洗焙各一斤牛膝去蘆酒浸三兩石斛去苗枳殼去瓤麩炒防風去蘆叉各四兩杏仁去皮尖麩炒黃細研去油二兩上為細末煉蜜為丸如梧桐子大每服三十丸空心食前溫酒吞下或用飯飲鹽湯亦得忌一切動風毒等物洗眼紫金膏治遠年日近翳膜遮障攀睛胬肉昏暗淚多瞻視不明或風氣攻注瞼生風粟或連眶赤爛怕日羞明隱澀難開並能治之硃砂別研乳香別研硼砂別研赤芍藥當歸洗焙各一分雄黃研飛二錢麝香別研半錢黃連去須半兩上搗羅為細末入研藥拌勻再擂煉蜜搜和為丸如皂莢子大每次用一丸安淨盞內以沸湯泡開於無風處洗藥冷閉目少時候三兩時再煨令熱依前洗一貼可洗三五次不得犯銅鐵器內洗如暴赤眼腫者不可洗之草龍膽散治眼暴赤腫痛風氣熱上衝睛疼連眶瞼眥赤爛瘀肉侵睛時多熱淚及因叫怒逆損肝氣久勞瞻視役損眼力風砂塵土入眼澀痛致成內外障翳及一切眼患悉皆治之蒺藜子炒去刺草龍膽各六兩赤芍藥半斤甘草炙羌活防風去叉枝各三兩菊花去枝半兩茯苓去皮四兩上搗為末每服二錢食後臨臥溫酒調下湯泡散治肝經不足受客熱風壅上攻眼目赤澀睛疼瞼爛怕日羞明夜臥多淚時行暴赤兩太陽穴疼頭旋昏眩視物不明漸生翳膜並皆治之赤芍藥當歸洗焙黃連去須上等分搗羅為細末每用二錢極滾湯泡乘熱熏洗冷即再溫洗一日三五次洗以瘥為度忌醃藏毒物其說云凡眼目之病皆以血凝滯使然故以行血藥合黃連治之血得熱即行故乘熱洗用無不效驗還睛丸治男子女人風毒上攻眼目赤腫怕日羞明多饒眵淚隱澀難開眶癢赤痛瞼眥紅爛瘀肉侵睛或患暴赤眼睛疼不可忍者並服立效又治偏正頭痛一切頭風頭目眩暈皆治之白朮生用菟絲子酒浸別研青葙子去土防風去蘆甘草炙羌活去苗白蒺藜炒去尖密蒙花木賊去節上各等分為細末煉蜜為丸如彈子大每服一丸細嚼白湯吞下空心食前日三服曾青散治一切風熱毒氣上攻兩眼多生眵淚怕日羞明隱澀難開眶爛赤腫或癢或痛及時行暴赤眼睛昏澀痛悉皆治之白姜炮防風去蘆各一兩曾青四兩蔓荊子去皮二兩上為細末每用少許末搐入鼻中立有功效祕傳羊肝丸治丈夫婦人肝經不足風毒上攻眼目昏暗淚出羞明怕日隱澀難開或癢或痛又治遠年日近內外障眼攀睛胬肉針刮不能治者此藥治之白羊子肝一具淨洗去膜黃連去須搗羅為末上將羊肝先入沙盆內杵爛旋次入黃連末拌擂乾溼得所為丸如梧桐子大每服十四丸食後以溫漿水吞下連作五劑瘥但是諸般眼疾及障翳青盲者皆主之禁食豬肉及冷水治目方用黃連者多矣此方最為奇異劉禹錫云有崔承元者因官治一死罪囚而活出之囚後數年以病目致死一旦崔忽為內障所苦喪明逾年後半夜嘆息獨坐時聞階除間悉窣之聲崔問為誰曰是昔所蒙活囚今故報恩至此遂以此方告訖而沒崔以此方合服不數月眼復明因傳此方於世治咽喉口齒龍石散治大人小兒上膈壅毒口舌生瘡咽嗌腫塞疼痛妨悶每用少許摻貼患處咽津小兒瘡疹毒氣攻口齒先用五福化毒丹掃後仍再用此藥摻貼立效硃砂研飛二兩半寒水石燒通赤二斤生腦子研二錢半上為末每日五七次用夜臥摻貼妙如聖湯治風熱毒氣上攻咽喉咽痛喉痹腫塞妨悶及肺癰咳嗽咯唾膿血胸滿振寒咽乾不渴時出濁沫氣息腥臭久久吐膿狀如米粥又治傷寒咽痛苦桔梗炒一兩甘草炒二兩上為粗末每服二錢水一盞煎至七分去渣溫服小兒時時呷服食後臨臥硼砂丸治大人小兒風壅膈熱咽喉腫痛舌頰生瘡口乾煩渴麝香一兩研硼砂研甘草浸汁熬膏各十兩牙硝枯研二兩梅花腦別研三分寒水石燒通赤紅五十兩上為末用甘草膏子和搜每兩作四百丸每服一丸含化咽津常服化痰利膈生津止渴麝臍散治牙齒動搖風蚛疼痛齦肉宣露涎血臭氣常服令牙齒堅牢解骨槽毒氣牛膝去蘆十斤木律四十四兩黃茄細切二十個郁李仁二十兩麝香空皮子細銼一百個以上五味搗碎入罐子內上用瓦子蓋口留一小竅用鹽泥固濟燒令通赤候煙白色即住火取出以新土罨一伏時取出後入下項藥升麻細辛去苗各十斤上件為細末每用少許揩患處須臾溫水漱口臨臥更貼少許咽津亦無妨玉屑無憂散治咽喉腫痛舌頰生瘡風毒壅塞熱盛喉閉或因誤吞硬物諸骨鯁刺涎滿氣急或至悶亂不省人事並皆療之玄參去蘆荊芥穗滑石研黃連去毛縮砂去殼白茯苓炒令黃貫衆去蘆甘草炙山豆根各一兩寒水石研飛二兩硼砂二錢上為細末每服一錢乾摻舌上後以新水咽下不拘時候寶慶新增方如聖勝金鋌治急喉閉纏喉風飛揚單蛾雙蛾結喉重舌木舌腮頷腫痛屢經用藥不能吞水粥者又方見後硫黃細研川芎臘茶薄荷去枝梗川烏炮硝石研生地黃各二兩上為細末裂生蔥自然汁搜和為鋌每服先用新汲水灌漱吐出次嚼生薄荷五七葉微爛用藥一鋌同嚼極爛以井水咽下甚者連進三服即愈重舌腮腫先服一鋌次以一鋌安患處其病隨藥便消又治冒暑伏熱不省人事用生薄荷水調研一鋌灌下即蘇如行路常含一鋌即無伏熱之患口舌生瘡不能合口並食熱物如上法服訖用水灌漱嚼薄荷片十葉如泥吐出再水灌漱嚼藥一鋌含口內聚涎裹之覺涎滿方吐出如此服三鋌便能食酒醋遇食鹹酸鮓脯炙爆喉中生泡須掐破吐血方省薄荷數葉以一鋌同嚼井水吞下砂淋熱淋小便出血同車前草七葉生薑小塊研爛水調去渣嚼藥一鋌以水送下此藥分陰陽去風熱化血為涎化涎為水常帶隨身備急一鋌可活一人命小兒只服半鋌淳祐新添方硼砂散治大人小兒卒患喉痹閉塞不通腫痛生瘡語聲不快風壅痰毒鼻衄出血山藥生六斤腦子研七兩牙硝生二十四兩麝香研四兩甘草硼砂研各二十兩上為細末每服半錢如茶點服吳直閣增諸家名方赴筵散治風牙蚛牙攻注疼痛晝夜不止痛不可忍睡臥不安牙齦宣露動搖欲脫或腮頷浮腫齦爛血出並能治之良薑去蘆草烏去皮細辛去土葉荊芥去梗上件四味各二兩碾為末每用少許於痛處擦之有涎吐出不得吞咽良久用溫鹽湯灌漱其痛即止常使揩牙用腐炭末一半相和常用止牙宣口氣永無牙疾吹喉散治三焦大熱口舌生瘡咽喉腫塞神思昏悶並能治之蒲黃一兩盆硝八兩青黛一兩半上件用生薄荷汁一升將盆硝青黛蒲黃一處用瓷罐盛慢火熬令乾研細每用一字或半錢摻於口內良久出涎吞之不妨或喉中腫痛用筒子入藥半錢許用力吹之無不立效續添諸局經驗祕方如聖勝金鋌治證服餌與前如聖勝金鋌同品味小異朴硝四兩川芎一兩硫黃細研一兩半貫衆二兩薄荷葉荊芥穗嫩茶各半兩上件為末裂生蔥自然汁搜和為鋌服藥湯使如前方五香散治咽喉腫痛諸惡氣結塞不通急宜服之木香沉香雞舌香薰陸香各一兩麝香別研三分上搗羅為末入麝香研令勻每服二錢水一中盞煎至六分溫服不拘時候如神散治風牙蚛牙攻疰疼痛日夜不止睡臥不安或牙齦動搖連頰浮腫不拘久近並皆治之川椒去目及閉口者微炒出汗用露蜂房微炙上搗羅為細末每用一錢水一盞入鹽少許同煎至八分乘熱漱之冷即吐出一服立效玉池散治風蛀牙痛腫癢動搖牙齦潰爛宣露出血口氣等疾當歸去蘆藁本地骨皮防風白芷槐花炒川芎甘草炙升麻細辛去苗各等分上為末每用少許揩牙痛甚即取二錢水一盞半黑豆半合生薑三片煎至一盞稍溫漱口候冷吐之荊芥湯治風熱肺壅咽喉腫痛語聲不出或如有物哽荊芥穗半兩桔梗二兩甘草炙一兩上為粗末每服四錢水一盞姜三片煎六分去渣食後溫服細辛散治風蚛牙疼牙齦宣爛牙齒動搖腮頷浮腫皆能治之紅椒去目炒鶴蝨牙皂蓽茇古方治牙疼為要藥縮砂去殼各半兩荊芥去梗細辛去苗各一兩白芷草烏各二兩上搗為細末每用少許於痛處擦之有涎吐出不得咽少時用溫水漱口頻頻擦之立有神效
