body:
  text: 卷之五治諸虛附骨蒸膃肭臍丸補虛壯氣暖背祛邪益精髓調脾胃進飲食悅顏色治五勞七傷真氣虛憊臍腹冷痛肢體痠疼腰背拘急腳膝緩弱面色黧黑肌肉消瘦目暗耳鳴口苦舌乾腹中虛鳴脅下刺痛飲食無味心常慘慼夜多異夢晝少精神小便滑數時有餘瀝房室不舉或夢交通及一切風虛痼冷並宜服之膃肭臍一對慢火酒炙令熟硇砂研飛二兩精羊肉熟切碎爛研羊髓取汁各一斤沉香神麯炒各四兩以上六味用無灰好酒一斗同於銀器內慢火熬成膏候冷入下項藥陽起石用漿水煮一日細研飛過焙乾用人參去蘆補骨脂酒炒鍾乳粉煉成者巴戟去心川芎肉豆蔻去殼紫蘇子炒枳殼去瓤麩炒木香蓽澄茄葫蘆巴炒天麻去苗青皮去白丁香茴香舶上炒各二兩肉桂去粗皮檳榔蒺藜子炒大腹子各二兩半山藥一兩半蓯蓉洗切片焙四兩白豆蔻去殼一兩大附子炮去皮臍用青鹽半斤漿水一斗五升煮候水盡切焙乾八兩上件藥各依法修事搗羅為末入前膏內搜成劑於臼內搗千餘杵丸如梧桐子大每服二十丸空心溫酒下鹽湯亦得菟絲子丸治腎氣虛損五勞七傷少腹拘急四肢痠疼面色黧黑唇口乾燥目暗耳鳴心忪氣短夜夢驚恐精神困倦喜怒無常悲憂不樂飲食無味舉動乏力心腹脹滿腳膝痿緩小便滑數房室不舉股內濕癢水道澀痛小便出血時有餘瀝並宜服之久服填骨髓續絕傷補五臟去萬病明視聽益顏色輕身延年聰耳明目又方用龍齒三分遠志去苗心半兩黑豆煮不用石龍芮澤瀉肉蓯蓉菟絲子淨洗酒浸澤瀉鹿茸去毛酥炙石龍芮去土肉桂去粗皮附子炮去皮各一兩石斛去根熟乾地黃白茯苓去皮牛膝酒浸一宿焙乾續斷山茱萸肉蓯蓉酒浸切三分五味子桑螵蛸酒浸炒芎藭覆盆子去枝葉萼各半兩上為細末以酒煮麵糊為丸如梧桐子大每服二十丸溫酒或鹽湯下空心服如腳膝無力木瓜湯下晚食前再服金釵石斛丸治真氣不足元臟虛弱頭昏面腫目暗耳鳴四肢疲倦百節痠疼腳下隱痛步履艱難肌體羸瘦面色黃黑鬢髮脫落頭皮腫癢精神昏困手足多冷心胸痞悶繞臍刺痛膝脛痠疼不能久立腰背拘急不得俯仰兩脅脹滿水穀不消腹痛氣刺發歇無時心懸噫醋嘔逆噁心口苦咽乾吃食無味恍惚多忘氣促喘乏夜夢驚恐心忪盜汗小便滑數或水道澀痛一切元臟虛冷之疾並能治之常服補五臟和血脈駐顏色潤髮進食肥肌大壯筋骨川椒去目微炒出汗葫蘆巴炒巴戟天去心地龍去土炒各四兩蒼朮去浮皮烏藥各十六兩川烏頭炮去皮臍羌活去蘆茴香炒赤小豆馬藺子醋炒金鈴子麩炒石斛去根各八兩青鹽二兩上為細末酒煮麵糊為丸如梧桐子大每服二十丸溫酒下或鹽湯亦得空心食前服之何首烏丸補暖腑臟祛逐風冷利腰膝強筋骨黑髭發駐顏容何首烏三斤用銅刀或竹刀切如棋子大木杵臼搗牛膝去苗銼一斤上件藥以黑豆一斗淨淘洗曝乾用甑一所先以豆薄鋪在甑底然後薄鋪何首烏又鋪豆又薄鋪牛膝如此重重鋪令藥豆俱盡安於釜上蒸之令豆熟為度去黑豆取藥曝乾又換豆蒸之如此三遍去豆取藥候乾為末蒸棗肉和丸如梧桐子大每服三十丸溫酒下食前服忌蘿蔔蔥蒜此藥性溫無毒久服輕身延年不老石南丸治風毒腳弱少力腳重疼痹腳腫生瘡腳下隱痛不能踏地腳膝筋攣不能屈伸項背腰脊拘急不快風毒上攻頭面浮腫或生細瘡出黃赤汁或手臂少力或口舌生瘡牙齦宣爛齒搖發落耳中蟬聲頭眩氣促心腹脹悶小便時澀大便或難赤芍藥薏苡仁赤小豆當歸去蘆石南葉牽牛子麻黃去根節陳皮去白杏仁去皮尖雙仁炒大腹皮連子用川芎各二兩牛膝去苗五加皮各三兩萆薢獨活去蘆杜仲銼炒木瓜各四兩上為細末以酒浸蒸餅為丸如梧桐子大每服十丸至十五二十丸木瓜湯下早起日中臨臥各一服常服補益元氣令人筋骨壯健耳目聰明婦人血氣亦可服之不拘時候八味丸治腎氣虛乏下元冷憊臍腹疼痛夜多漩溺腳膝緩弱肢體倦怠面色黧黑不思飲食又治腳氣上衝少腹不仁及虛勞不足渴欲飲水腰重疼痛少腹拘急小便不利或男子消渴小便反多婦人轉胞小便不通並宜服之牡丹皮白茯苓澤瀉各三兩熟乾地黃八兩山茱萸山藥各四兩附子炮去皮臍肉桂去粗皮各二兩上為末煉蜜丸如梧桐子大每服十五丸至二十五丸溫酒下空心食前日二服久服壯元陽益精髓活血駐顏強志輕身黃耆丸治丈夫腎臟風毒上攻頭面虛浮耳內蟬聲頭目昏眩項背拘急下注腰腳腳膝生瘡行步艱難腳下隱疼不能踏地筋脈拘攣不得屈伸四肢少力百節痠痛腰腿冷痛小便滑數及癱緩風痹遍身頑麻又療婦人血風肢體癢痛腳膝緩弱起坐艱難並宜服之黃耆杜蒺藜去圓川楝子茴香炒川烏炮去皮臍赤小豆地龍去土炒防風去蘆叉各一兩烏藥二兩上為細末酒煮麵糊為丸如梧桐子大每服十五丸溫酒鹽湯亦得婦人醋湯下空心服茴香丸治丈夫元臟久虛冷氣攻衝臍腹絞痛腰背拘急面色萎黃飲食減少及膀胱小腸氣痛並腎臟風毒頭面虛浮目暗耳鳴腳膝少力腫痛生瘡婦人血臟虛冷食減少力肢體疼痛並宜服之久服補虛損除風冷壯筋骨明耳目威靈仙洗去土川烏炮去皮臍陳皮去白防風去苗川楝子麩炒萆薢各三兩烏藥去土五兩川椒去目閉口炒出汗二兩赤小豆茴香炒各八兩地龍去土炒七兩上為細末以酒煮麵糊為丸如梧桐子大每服空心及晚食前溫酒下二十丸鹽湯亦得小腸氣痛炒生薑茴香酒下腳轉筋木瓜湯下婦人血臟虛冷溫醋湯下臍腹絞痛滑泄冷痢濃煎艾湯下五補丸補諸虛安五臟堅骨髓養精神地骨皮白茯苓去皮牛膝去苗酒浸一宿熟乾地黃人參各一兩上為末煉蜜為丸如梧桐子大每服三十丸溫酒下空心食前服稍增至五十丸日二服服至十日及半月覺氣壅即服七宣丸服七宣丸二三日覺氣散即還服五補丸久服去百病髭發黑潤無比山藥丸治丈夫諸虛百損五勞七傷頭痛目眩手足逆冷或煩熱有時或冷痹骨疼腰髖不隨飲食雖多不生肌肉或少食而脹滿體無光澤陽氣衰絕陰氣不行此藥能補經脈起陰陽安魂魄開三焦破積聚厚腸胃強筋練骨輕身明目除風去冷無所不治赤石脂茯神去皮木巴戟去心熟乾地黃酒浸盡山茱萸牛膝去苗酒浸澤瀉各一兩山藥二兩五味子六兩蓯蓉酒浸四兩杜仲去皮炒菟絲子酒浸各三兩上件為末煉蜜和搜為丸如梧桐子大每服二十丸至三十丸食前溫酒下溫米飲亦得服之七日後令人身輕健四體潤澤唇口赤手足暖面有光悅消食身體安和音聲清響是其驗也十日後長肌肉此藥通中入腦鼻必痠疼勿怪大山蕷丸治諸虛百損五勞七傷肢體沉重骨節痠疼心中煩悸唇口乾燥面體少色情思不樂咳嗽喘乏傷血動氣夜多異夢盜汗失精腰背強痛臍腹弦急嗜臥少起喜驚多忘飲食減少肌肉瘦瘁又治風虛頭目眩暈心神不寧及病後氣不復常漸成勞損久服補諸不足愈風氣百疾白朮麥門冬去心白芍藥杏仁去皮尖麩炒黃防風去蘆叉芎藭各一兩半大豆黃卷炒熟乾地黃肉桂去粗皮曲炒當歸酒浸各二兩半桔梗白茯苓去皮柴胡各一兩二錢半乾薑炮七錢半甘草炙七兩大棗一百個蒸熟去皮核阿膠炒人參各一兩七錢半白蘞半兩山蕷七兩半上為末煉蜜與蒸棗同和丸如彈子大每服一丸溫酒或米飲化下嚼服亦得食前常服養真氣益精補髓活血駐顏定志丸治心氣不定五臟不足恍惚振悸憂愁悲傷差錯謬忘夢寐驚魘恐怖不寧喜怒無時朝瘥暮劇暮瘥朝劇或發狂眩並宜服之遠志去苗及心菖蒲各二兩人參白茯苓去皮各三兩上為細末煉蜜丸如梧桐子大硃砂為衣每服七丸加至二十丸溫米飲下食後臨臥日三服常服益心強志令人不忘黃耆建中湯治男人女人諸虛不足小腹急痛脅肋䐜脹臍下虛滿胸中煩悸面色萎黃唇口乾燥少力身重胸滿短氣腰背強痛骨肉痠疼行動喘乏不能飲食或因勞傷過度或因病後不復並宜服之黃耆肉桂去粗皮各三兩甘草炙二兩白芍藥六兩上為粗散每服三錢水一盞半入生薑三四片大棗一枚同煎一中盞濾去滓入餳少許再煎令溶稍熱服空心食前人參黃耆散治虛勞客熱肌肉消瘦四肢倦怠五心煩熱口燥咽乾頰赤心忪日晚潮熱夜有盜汗胸脅不利減食多渴咳唾稠黏時有膿血天門冬去心三十兩半夏湯洗七次薑汁製知母桑白皮銼炒赤芍藥黃耆紫菀甘草爁各十五兩白茯苓去皮柴胡去苗秦艽去土生乾地黃地骨皮各二十兩人參桔梗各十兩鱉甲去裙醋炙一兩上為粗末每服二大錢以水一盞煎至七分去滓溫服食後成煉鍾乳粉主五勞七傷咳逆上氣治寒嗽通音聲明目益精安五臟通百節利九竅下乳汁益氣補虛損療腳弱疼冷下焦傷竭強陰久服延年益壽好顏色不老令人有子鍾乳不拘多少上取韶州者無問厚薄但顏色明淨光澤者即堪入煉唯黃赤兩色不任用欲煉亦不限多少置鍾乳於金銀器中即以大鐺中著水沉金銀器於鐺水中煮之常令如魚眼沸水減即添若薄乳三日三夜即得若粗肥厚管者即七日七夜候乳色變黃白即熟如疑生更煮滿十日最佳煮訖出金銀碗其鐺內煮乳黃濁水棄之勿令人服服必損人咽喉傷人肝肺令人頭痛兼復下利不止其有犯者食豬肉即愈棄此黃水訖更著清水准前更煮經半日許即出之其水色清不變即止乳無毒矣即於瓷缽中用玉錘著水研之其缽及錘須夾白練袋籠口稍長作之使錘得轉兼通上下每日著水攪令勻調勿使著錘缽即封系練袋自作字記勿使人開一即免纖塵入中二即免研人竊吃研覺乾澀即是水盡即更添水常令如稀米泔狀乳細者皆浮在上粗者沉在下復繞錘缽四邊研之不及者即粗細不勻為此每日須一開或二開攪括令勻勿使著錘即得勻熟免有粗細研至四五日狀若乳汁研揩視之狀如書中白魚膩即成自然光白便以水洗之不隨水落者即熟若得水而落者即未成更須研之以不落為限熟訖澄取曝乾每服稱半兩分為三服用溫酒調下空腹服更量病輕重增減兼可合和為鍾乳丸散玉霜丸治真氣虛憊下焦傷竭臍腹弦急腰腳軟痛精神困倦面色枯槁或亡血盜汗遺瀝失精大便自利小便滑數肌肉消瘦陽事不舉久服續骨聯筋秘精堅髓延年保命卻老還童安魂定魄換肌秘氣輕身壯陽益壽住世天雄十兩長大者以酒浸七日了掘一地坑以半稱炭火燒坑通赤速去炭火令淨以醋二升潑於地坑內候乾乘熱便投天雄在內以盆合土擁之經宿取出去皮臍磁石醋淬七次更多為妙硃砂飛研澤瀉洗酒浸一宿炙牛膝去苗酒浸焙乾石斛去根炙蓯蓉去皮酒浸一宿炙乾巴戟穿心者各二兩茴香炒肉桂去粗皮各一兩家韭子微炒菟絲子酒浸一伏時蒸過曬乾杵羅為末去輕浮者各五兩牡蠣大煅搗為粉紫梢花如無以木賊代之各三兩鹿茸用麻茸連頂骨者先燎去毛令淨約三寸以來截斷酒浸一伏時慢火炙令脆半兩白龍骨一斤黏舌者細研如粉以水飛過三度日中曬乾用黑豆一斗蒸一伏時以夾絹袋盛日曬乾上件一十六味搗羅為細末煉酒蜜各半和丸如梧桐子大每服三十丸空心晚食前溫酒下常服補真氣壯陽道預知子丸治心氣不足志意不定神情恍惚語言錯妄忪悸煩郁愁憂慘慼喜怒多恐健忘少睡夜多異夢寤即驚魘或發狂眩暴不知人並宜服之枸杞子淨白茯苓去皮黃精蒸熟硃砂研水飛預知子去皮石菖蒲茯神去木人參去蘆柏子仁地骨皮去土遠志去心山藥各等分上件一十二味搗羅為細末煉蜜丸如龍眼核大更以硃砂為衣每服一丸細嚼人參湯下不計時候紹興續添方安腎丸治腎經久積陰寒膀胱虛冷下元衰憊耳重唇焦腰腿腫疼臍腹撮痛兩脅刺脹小腹堅疼下部濕癢夜夢遺精恍惚多驚皮膚乾燥面無光澤口淡無味不思飲食大便溏泄小便滑數精神不爽事多健忘常服補元陽益腎氣肉桂去粗皮不見火川烏炮去皮臍各十六兩桃仁麩炒白蒺藜炒去刺巴戟去心山藥茯苓去皮肉蓯蓉酒浸炙石斛去根炙萆薢白朮破故紙各四十八兩上為末煉蜜為丸如梧桐子大每服三十丸溫酒或鹽湯下空心食前小腸氣炒茴香鹽酒下麝香鹿茸丸益真氣補虛憊治下焦傷竭臍腹絞痛兩脅脹滿飲食減少肢節煩疼手足麻痹腰腿沉重行步艱難目視茫茫夜夢鬼交遺泄失精神情不爽陽事不舉小便滑數氣虛腸鳴大便自利虛煩盜汗津液內燥並宜服鹿茸火燎去毛酒浸炙七十兩熟乾地黃淨洗酒浸蒸焙十斤附子炮去皮臍一百四十個牛膝去苗酒浸一宿焙一斤四兩杜仲去粗皮炒去絲三斤半五味子二斤山藥四斤肉蓯蓉酒浸一宿三斤上為末煉蜜為丸如梧桐子大每一斤丸子用麝香末一錢為衣每服二十粒溫酒下鹽湯亦得食前服嘉定十年十二月申明改正妙香散治男子婦人心氣不足志意不定驚悸恐怖悲憂慘慼虛煩少睡喜怒不常夜多盜汗飲食無味頭目昏眩常服補益氣血安神鎮心麝香別研一錢木香煨二兩半山藥薑汁炙茯神去皮木茯苓去皮不焙黃耆遠志去心炒各一兩人參桔梗甘草炙各半兩辰砂別研三錢上為細末每服二錢溫酒調服不拘時候寶慶新增方養氣丹治諸虛百損脾元耗憊真陽不固三焦不和上實下虛中脘痰飲上攻頭目昏眩八風五痹或猝暴中風痰潮上膈言語謇澀神昏氣亂狀若癱瘓及奔豚腎氣上衝胸腹連兩脅膨脹刺痛不可忍者陰陽上下氣不升降飲食不進面無精光肢體浮腫五種水氣腳氣上衝腰背倦痛夜夢鬼交覺來盜汗胃冷心疼小便滑數牽引小腹足膝緩弱步履艱難婦人血海久冷赤白帶下歲久無子及陰毒傷寒面青舌卷陰縮難言四肢厥冷不省人事者急服百丸用生薑大棗煎湯灌之即便回陽命無不活或觸冒寒邪霍亂吐瀉手足逆冷六脈沉伏唇口青黑腹脅攻刺及男子陽事痿怯腳膝痠疼腹臍虛鳴大便自滑兼療膈胃煩壅痰飲虛鳴百藥不愈者常服助養真氣生陽逐陰溫平不僭消磨冷滯克化飲食使五臟安寧六腑調暢百病不侵出入道途宜將此藥隨行緩急服餌大有功效禹餘糧石火煉七次醋淬七次為末紫石英火煅一次赤石脂火煅一次各半斤代赭石火煅七次醋淬七次為末一斤磁石火煅十次醋淬十次半斤以上五石各貯之各研為細末又以水研之挹其清者置之紙上紙用筲箕盛欲使細末在紙上而水滴在下挹盡而止既干各用藏瓶盛貯以鹽水紙筋和泥固濟陰乾以好硬炭五十斤分為五處每一處用炭十斤燒紅作一爐子煅此五藥以紙灰蓋之兩日後火盡灰冷則再煅如此三次埋地坑內兩日出火毒再研入後藥附子炮去皮臍二兩肉蓯蓉淨洗酒浸一宿焙乾一兩半當歸酒浸一宿焙乾茴香炒破故紙酒炒香熟木香不見火肉桂去粗皮巴戟鹽湯浸打去心肉豆蔻麵裹煨丁香山藥鹿茸酥炙白茯苓去皮沉香遠志去心各一兩以上各如法修制同研為末卻入乳香別研五靈脂去砂別研沒藥去砂石研各一兩以上三味入眾藥同研卻入硃砂或煅或蒸陽起石略煅或只用酒煮鍾乳粉各一兩以上三味別研臨時入上同入研過羅為細末用糯米粉煮糊為丸每兩作五十丸陰乾入布袋內擦令光瑩每服五丸至十丸空心用溫酒吞下或姜鹽湯或棗湯下亦可婦人用艾醋湯吞下樸附丸治脾元虛弱飲食遲化食必多傷腹痛腸鳴臟腑滑泄晝夜無度胃氣虛損不美飲食嘔噦惡涎此藥性溫兼治翻胃噁心及久患脾泄冷瀉之人最宜服此厚朴去粗皮薑汁製附子炮去皮各一斤神麯炒八兩乾薑炮三斤上為細末酒煮麵糊丸如梧桐子大每服三十丸空心食前米飲或鹽湯下亦得川楝散治膀胱小腸氣痛臍下撮疼上衝心腹面色萎黃腳下隱痛四肢倦怠不思飲食夜多旋溺外腎瘙癢川楝子蒸去皮核破故紙炒茴香炒各四兩乾薑炮一兩葫蘆巴酒浸炒三兩附子炮去皮臍一兩半上為細末每服二錢空心食前熱酒調下雙和湯治男子婦人五勞六極七傷心腎俱虛精血氣少遂成虛勞百骸枯瘁四肢倦怠寒熱往來咳嗽咽乾行動喘乏面色痿黃略有所觸易成他疾或傷於冷則宿食不消脾疼腹痛瀉痢吐逆或傷於熱則頭旋眼暈痰涎氣促五心煩熱或因飢飽動作喜怒驚恐病隨而至或虛脹而不思食或多食而不生肌肉心煩則虛汗盜汗一切虛勞不敢服燥藥者並宜服之常服調中養氣益血育神和胃進食補虛損白芍藥七兩半當歸洗酒浸黃耆蜜炙川芎熟地黃淨洗酒蒸各三兩甘草炙肉桂去皮不見火各二兩二錢半上為細末每服二錢水一盞半生薑三片棗子一枚煎至六分空心食前服忌生冷果子等物平補鎮心丹治丈夫婦人心氣不足志意不定神情恍惚夜多異夢忪悸煩郁及腎氣傷敗血少氣多四肢倦怠足脛痠疼睡臥不隱夢寐遺精時有白濁漸至羸瘦又方見後酸棗仁去皮隔紙炒二錢半車前子去土碾破白茯苓去皮五味子去枝梗肉桂去粗皮不見火麥門冬去心茯神去皮各一兩二錢半天門冬去心龍齒熟地黃洗酒蒸山藥薑汁製各一兩半人參去蘆半兩硃砂細研為衣半兩遠志去心甘草炙一兩半上為末煉蜜丸如梧桐子大每服三十丸空心飯飲下溫酒亦得加至五十丸常服益精髓養氣血悅色駐顏翰林劉活庵云平補鎮心丹方有二此方有五味子白茯苓車前子肉桂人參酸棗仁非惟可以治心氣不足而白濁消渴尤為切要之藥局方無此