如血或因酒色過度上盛下虛心火炎上肺金受克口舌乾燥漸成消渴睡臥不安四肢倦怠男子五淋婦人帶下赤白及病後氣不收斂陽浮於外五心煩熱藥性溫平不冷不熱常服清心養神秘精補虛滋潤腸胃調順血氣黃芩麥門冬去心地骨皮車前子甘草炙各半兩石蓮肉去心白茯苓黃耆蜜炙人參各七兩半上銼散每三錢麥門冬十粒水一盞半煎取八分去滓水中沉冷空心食前服發熱加柴胡薄荷煎獨活寄生湯治腎氣虛弱腰背疼痛此病因臥冷濕地當風所得不時速治流入腳膝為偏枯冷痹緩弱疼重或腰痛腳重攣痹宜急服此獨活三兩桑寄生古今錄驗用續斷即寄生亦名非正續斷當歸酒浸焙乾白芍藥熟地黃酒浸蒸牛膝去蘆酒浸細辛去苗白茯苓去皮防風去蘆秦艽去土人參桂心不見火芎藭杜仲制炒斷絲甘草炙各二兩上為銼散每服四大錢水一盞半煎七分去滓空心服氣虛下痢除地黃並治新產腹痛不得轉動及腰腳攣痛痹弱不得屈伸此湯最能除風消血肘後方有附子一枚無寄生人參甘草當歸近人將治歷節風並腳氣流注甚有效淳祐新添方人參養榮湯治積勞虛損四肢沉滯骨肉痠疼吸吸少氣行動喘啜小腹拘急腰背強痛心虛驚悸咽乾唇燥飲食無味陰陽衰弱悲憂慘慼多臥少起久者積年急者百日漸至瘦削五臟氣竭難可振復又治肺與大腸俱虛咳嗽下痢喘乏少氣嘔吐痰涎白芍藥三兩當歸陳皮黃耆桂心去粗皮人參白朮煨甘草炙各一兩熟地黃制五味子茯苓各七錢半遠志炒去心半兩上銼散每服四錢水一盞半生薑三片棗子二枚煎至七分去滓溫服便精遺泄加龍骨一兩咳嗽加阿膠甚妙鹿茸大補湯治男子婦人諸虛不足產後血氣耗傷一切虛損鹿茸制黃耆蜜炙當歸酒浸白茯苓去皮蓯蓉酒浸杜仲炒去絲各二兩人參白芍藥肉桂石斛酒浸蒸焙附子炮五味子半夏白朮煨各一兩半甘草半兩熟乾地黃酒蒸焙三兩上㕮咀每服四錢姜三片棗一個水一盞煎七分空心熱服養腎散治腎氣虛損腰腳節骨疼痛膝脛不能屈伸久病腳膝緩弱每服用一字空心豆淋酒下服訖麻痹少時須臾疾隨藥氣頓愈骨中痛嚼胡桃肉酒調下甚者三五服風寒濕悉治之全蠍半兩天麻三錢蒼朮制一兩附子炮去皮臍草烏頭生去皮臍各二錢上為細末空心溫酒調下參香散治心氣不寧諸虛百損肢體沉重情思不樂夜多異夢盜汗失精恐怖煩悸喜怒無時口乾咽燥渴欲飲水飲食減少肌肉瘦瘁漸成勞瘵常服補精血調心氣進飲食安神守中功效不可具述人參山藥黃耆制白茯苓去皮石蓮肉去心白朮煨各一兩烏藥縮砂仁橘紅乾薑炮各半兩丁香南木香檀香各一分沉香二錢甘草炙三分上為銼散每服四錢水一大盞生薑三片棗一個煎七分去滓空心服一法有炮附子半兩吳直閣增諸家名方震靈丹紫府元君南嶽魏夫人方出道藏一名紫金丹此丹不犯金石飛走有性之藥不僭不燥奪造化沖和之功大治男子真元衰憊五勞七傷臍腹冷疼肢體痠痛上盛下虛頭目暈眩心神恍惚血氣衰微及中風癱緩手足不遂筋骨拘攣腰膝沉重容枯肌瘦目暗耳聾口苦舌乾飲食無味心腎不足精滑夢遺膀胱疝墜小腸淋瀝夜多盜汗久瀉久痢嘔吐不食八風五痹一切沉寒痼冷服之如神及治婦人血氣不足崩漏虛損帶下久冷胎臟無子服之無不愈者禹餘糧火煅醋淬不計遍以手捻得碎為度紫石英赤石脂丁頭代赭石如禹餘糧炮製各四兩以上四味並作小塊入甘鍋內鹽泥固濟候乾用炭一十斤煅通紅火盡為度入地坑埋出火毒二宿滴乳香別研五靈脂去沙石研沒藥去沙石研各二兩硃砂水飛過一兩上件前後共八味併為細末以糯米粉煮糊為丸如小雞頭大曬乾出光每一粒空心溫酒下冷水亦得常服鎮心神駐顏色溫脾腎理腰膝除屍疰蠱毒闢鬼魅邪癘久服輕身漸入仙道忌豬羊血恐減藥力婦人醋湯下孕婦不可服極有神效不可盡述來復丹鐵甕城八角杜先生方一名正一丹此藥配類二氣均調陰陽奪天地衝和之氣乃水火既濟之方可冷可熱可緩可急善治榮衛不交養心腎不升降上實下虛氣閉痰厥心腹冷痛臟腑虛滑不問男女老幼危急之證但有胃氣無不獲安補損扶虛救陰助陽為效殊勝硝石一兩同硫黃併為細末入定鍋內以微火慢炒用柳篦子不住手攪令陰陽氣相入不可火太過恐傷藥力再研極細名二氣末太陰玄精石研飛舶上硫黃用透明不夾沙石者各一兩五靈脂須擇五臺山者用水澄去沙石日乾青皮去白陳皮去白各二兩上用五靈脂二橘皮為細末次入玄精石末及前二氣末拌勻以好滴醋打糊為丸如豌豆大每服三十粒空心粥飲吞下甚者五十粒小兒三五粒新生嬰兒一粒小兒慢驚風或吐利不止變成虛風搐搦者非風也胃氣欲絕故也用五粒研碎米飲送下老人伏暑迷悶紫蘇湯下婦人產後血逆上搶悶絕並惡露不止及赤白帶下並用醋湯下常服和陰陽益精神散腰腎陰濕止腹肋冷疼立見神效應諸疾不辨陰陽證者並宜服之靈異不可具紀養正丹出寶林真人谷伯陽傷寒論中一名交泰丹卻邪輔正助陽接真治元氣虛虧陰邪交蕩正氣乖常上盛下虛氣不升降呼吸不足頭旋氣短心神怯弱夢寐驚悸遍體盜汗腹痛腰疼或虛煩狂言口乾上喘翻胃吐食霍亂轉筋咳逆不定又治中風涎潮不省人事陽氣欲脫四肢厥冷如傷寒陰盛自汗唇青脈沉最宜服之及婦人產後血氣身熱月候不均帶下腹痛悉能治療常服濟心火強腎水進飲食水銀硫黃研細硃砂研細黑錫去滓稱與水銀結砂各一兩上用黑盞一隻火上熔黑錫成汁次下水銀以柳枝子攪勻次下硃砂攪令不見星子放下少時方入硫黃末急攪成汁和勻如有焰以醋灑之候冷取出研如粉極細用糯米粉煮糊為丸如綠豆大每服二十丸加至三十粒鹽湯下此藥升降陰陽既濟心腎空心食前棗湯送下神效不可具述黑錫丹丹陽慈濟大師受神仙桑君方治脾元久冷上實下虛胸中痰飲或上攻頭目徹痛目瞪昏眩及奔豚氣上衝胸腹連兩脅膨脹刺痛不可忍氣欲絕者及陰陽氣上下不升降飲食不進面黃羸瘦肢體浮腫五種水氣腳氣上攻及牙齦腫痛滿口生瘡齒欲落者兼治脾寒心痛冷汗不止或卒暴中風痰潮上膈言語艱澀神昏氣亂喉中痰響狀似癱瘓曾用風藥吊吐不出者宜用此藥百粒煎薑棗湯灌之壓下風涎即時蘇省風涎自利或觸冒寒邪霍亂吐瀉手足逆冷唇口青黑及男子陽事痿法腳膝痠軟行步乏力臍腹虛鳴大便久滑及婦人血海久冷白帶自下歲久無子血氣攻注頭面四肢並宜服之兼療膈胃煩壅痰飲虛喘百藥不愈者常服克化飲食養精神生陽逐陰消磨冷滯除濕破癖不動真氣使五臟安寧六腑調暢百病不侵歌曰陰損陽衰實可傷縱調榮衛亦難將氣羸血運痰生者試聽桑君為發揚又歌夫妻合會功成四鈴子沉香一兩賒木附葫蘆陽起破桂茴肉豆等無差梧桐酒糊精修煉返老還童事可嘉沉香鎊附子炮去皮臍葫蘆巴酒浸炒陽起石研細水飛茴香舶上者炒破故紙酒浸炒肉豆蔻麵裹煨金鈴子蒸去皮核木香各一兩肉桂去皮只須半兩黑錫去滓稱硫黃透明者結砂子各二兩上用黑盞或新鐵銚內如常法結黑錫硫黃砂子地上出火毒研令極細余藥並杵羅為細末都一處和勻入研自朝至暮以黑光色為度酒糊丸如梧桐子大陰乾入布袋內擦令光瑩每服三四十粒空心姜鹽湯或棗湯下婦人艾醋湯下玉華白丹唐沖虛先生三品制煉方曾經進宣政間繫上品丹清上實下助養根元扶衰救弱補益臟腑治五勞七傷夜多盜汗肺萎虛損久嗽上喘霍亂轉筋六脈沉伏唇口青黑腹脅刺痛大腸不固小便滑數夢中遺泄肌肉瘦瘁目暗耳鳴胃虛食減久瘧久痢積寒痼冷諸藥不愈者服之如神白石脂淨瓦閣起火煅紅研細水飛左顧牡蠣七錢洗用韭葉搗鹽泥固濟火煅取白者陽起石用甘鍋於大火中煅令通紅取出酒淬放陰地令乾各半兩鍾乳粉煉成者一兩上四味各研令極細如粉方拌和作一處令勻研一二日以糯米粉煮糊為丸如雞頭大入地坑出火毒一宿每服一粒空心濃煎人參湯放冷送下熟水亦得常服溫平不僣不燥澤肌悅色祛除宿患婦人久無妊者以當歸熟地黃浸酒下便有符合造化之妙或久冷崩帶虛損臍腹撮痛艾醋湯下服畢以少白粥壓之忌豬羊血綠豆粉恐解藥力尤治久患腸風臟毒續添諸局經驗秘方金鎖正元丹治真氣不足元臟虛弱四肢倦怠百節痠疼頭昏眩痛目暗耳鳴面色黃黑鬢髮脫落頭皮腫癢精神昏困手足多冷心胸痞悶繞臍切痛膝脛痠疼不能久立或腳弱隱痛步履艱難腰背拘急不能俯仰腹痛氣刺兩脅虛脹水穀不消大便不調嘔逆噁心飲食減少恍惚多忘氣促喘乏夜多異夢心忪盜汗小便滑數遺精白濁一切元臟虛冷之病並能治之五倍子茯苓去皮各八兩紫巴戟去心十六兩補骨脂酒浸炒十兩肉蓯蓉淨洗焙乾葫蘆巴炒各一斤龍骨硃砂別研各三兩上為細末入研藥令勻酒糊為丸如梧桐子大每服十五丸至二十丸空心食前溫酒吞下或鹽湯亦得秘傳玉鎖丹治心氣不足思慮太過腎經虛損真陽不固漩有遺瀝小便白濁如膏夢寐頻泄甚則身體拘倦骨節痠疼飲食不進面色黧黑容枯肌瘦唇口乾燥虛煩盜汗舉動乏力一本尚有此藥性溫不熱大有神效十字茯苓去皮四兩龍骨二兩五倍子六兩上為末水糊為丸每服四十粒空心用鹽湯吞下日進三服此藥性溫不熱極有神效巴戟丸補腎臟暖丹田興陽道減小便填精益髓駐顏潤肌治元氣虛憊面目黧黑口乾舌澀夢想虛驚眼中冷淚耳作蟬鳴腰胯沉重百節痠疼項筋緊急背胛勞倦陰汗盜汗四肢無力及治婦人子宮久冷月脈不調或多或少赤白帶下並宜服之良薑六兩紫金藤十六兩巴戟三兩青鹽二兩肉桂去粗皮吳茱萸各四兩上為末酒糊為丸每服二十丸暖鹽酒送下鹽湯亦得日午夜臥各一服十補丸治真氣虛損下焦傷竭臍腹強急腰腳疼痛亡血盜汗遺泄白濁大便自利小便滑數或三消渴疾飲食倍常肌肉消瘦陽事不舉顏色枯槁久服補五臟行榮衛益精髓進飲食附子炮去皮臍肉桂去粗皮巴戟去心破故紙炒乾薑炮遠志去心薑汁浸炒菟絲子酒浸別研赤石脂煅厚朴去粗皮薑汁炙各一兩川椒去目及閉口者炒出汗二兩上為末酒糊丸如梧桐子大每服三十丸至五十丸溫酒鹽湯任下正元散治下元氣虛臍腹脹滿心脅刺痛泄利嘔吐自汗陽氣輕微手足厥冷及傷寒陰證霍亂轉筋久下冷利少氣羸困一切虛寒並宜服之紅豆炒乾薑炮陳皮去白各三錢人參白朮甘草炙茯苓去皮各二兩肉桂去粗皮川烏炮去皮各半兩附子炮去皮尖山藥薑汁浸炒川芎烏藥去木乾葛各一兩黃耆炙一兩半上為細末每服二錢水一盞姜三片棗一個鹽少許煎七分食前溫服常服助陽消陰正元氣溫脾胃進飲食茯菟丸治心氣不足思慮太過腎經虛損真陽不固溺有餘瀝小便白濁夢寐頻泄菟絲子五兩一本作十兩白茯苓三兩一本作五兩石蓮子去殼二兩一本作三兩一本有遼五味子去梗七兩上為細末酒一本用淮山藥六兩煮糊為丸如梧桐子大每服三十丸一本作五六十丸空心鹽湯下常服鎮益心神補虛養血清小便
