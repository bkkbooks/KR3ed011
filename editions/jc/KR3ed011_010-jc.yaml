body:
  text: 卷之十治小兒諸疾附諸湯諸香外有治療諸方互見各類返魂丹治小兒諸風癲癇潮發瘛瘲口眼相引項背強直牙關緊急目睛上視及諸病久虛變生虛風多睡昏困荏苒不解速宜服之當歸酒浸切焙微炒烏犀鎊各二兩乾薑炮枳殼去瓤麩炒白朮泔浸一宿微炒人參去蘆木香不見火茯苓去皮丁香不見火厚朴去皮薑汁炙熟藁本去土天竺黃細研敗龜酒醋塗炙黃蔓荊子去白桑螵蛸微炒何首烏泔浸一宿煮過切焙白芷虎骨酒醋炙令黃晚蠶蛾微炒各三分縮砂仁麻黃去根節麝香別研羌活去蘆羚羊角鎊半夏湯洗七次薑汁浸三宿焙乾炒黃川烏頭燒令通紅留煙少許入坑以盞蓋新土圍食傾防風去蘆白花蛇酒浸一宿炙令熟去皮骨用肉白殭蠶去絲嘴微炒檳榔白附子微炮天南星湯洗生薑自然汁煮軟切焙炒黃藿香葉去土阿膠碎炒萆薢微炙肉桂去粗皮細辛去苗陳皮去瓤微炒槐膠烏蛇酒浸一宿炙熟取肉用沉香不見火乾蠍微炙獨活去苗天麻酒洗切焙各一兩硃砂細研水飛石斛去根雄黃細研水飛肉豆蔻去殼微炒牛黃別研龍腦別研水銀附子水浸後炮去皮臍蟬殼去土微炒川芎各半兩烏鴉一個去嘴翅足膩粉別研一分狐肝三具臘月採取同烏鴉一個入新甕內以瓦盆蓋頭用泥固濟炭火一斤燒令通赤煙盡出候冷研細用硫黃研細用瓷盞盛慢火養成汁入水銀急炒如青泥成砂再研半兩金箔二十片為衣上如法修事搗研令細煉白蜜合和入酥再搗三五千下丸如梧桐子大每一歲兒一丸溫薄荷自然汁化下不計時候定命丹治小兒急慢驚風天吊撮口潮發搐搦奶癇壯熱昏塞不省青黛研半錢蟾酥乾者酒浸一宿一錢乾蠍全者七個微炒麝香研一字白附子炮為末半分天南星炮為末一分上件細研令勻以粟米粥和丸如綠豆大別以青黛為衣每服一丸荊芥薄荷湯下後困睡無疑但有患者先化半丸滴入鼻中嚏噴者必瘥一本不用天南星八珍丹治小兒驚風壯熱精神昏憒嘔吐痰涎驚悸恍惚或發瘛瘲目睛上視甘草炒天麻去蘆硃砂研飛天南星牛膽制各五兩牛黃研一分膩粉研雄黃飛各一兩一分天漿子微炒三百五十個銀箔七十片為衣上為細末入研藥勻煉蜜為丸如豌豆大以銀箔為衣每服一歲兒服一丸薄荷湯化下疾證未退可再服之更量兒大小加減奶食後服太一銀硃丹治小兒驚風壯熱涎盛發癇手足搐搦目睛上視及風壅痰實心膈滿悶嘔吐痰涎大便秘澀黑鉛煉十遍稱三兩與水銀結砂子分為小塊同甘草水煮半日候冷取出研去草不用水銀結砂子鐵粉各三兩甘草同鉛煮十兩天南星炮為末三分硃砂飛研半兩膩粉研一兩上同研勻以麵糊為丸如麻子大每一歲兒服一丸用薄荷蜜湯下微利為度未利再服乳食後軟金丹治小兒驚風壯熱多睡驚掣精神昏憒痰涎壅塞手足搐搦目睛上視項背強硬牙關緊急使君子炒為末兗墨燒研青黛細研麝香細研膩粉研各一分胡黃連為末一分寒食麵七錢半天漿子七個炒為末上合研勻以白麵糊為丸如小豆大每服一丸煎金銀薄荷湯化下五歲以上可服二丸更量大小虛實加減不計時候鶴頂丹治大人小兒風壅痰實咽膈不利口乾煩渴睡臥不安及中暑頭痛躁渴不解麝香研二兩半硃砂研飛一百兩牙硝枯研一百二十五兩寒水石粉一百一十兩甘草炒為末三十五兩上合研勻煉蜜搜和每一兩二錢作十丸大人溫生薑水化下一丸如治中暑入生龍腦少許同研細新水化下小兒一丸分四服更量大小加減又治小兒臟腑積熱心神不寧夜臥狂叫口舌生瘡用薄荷自然汁化下並食後服至聖丹治一切驚風天吊目睛上視手足搐搦狀候多端用藥一丸用溫水化滴鼻中令噴嚏三五次更用薄荷湯下二丸即愈如久患五疳腹脹頭大四肢瘦小好吃泥土不思奶食愛咬指甲時撏眉毛頭髮稀疏肚上青筋及久患瀉痢並用米飲下二丸如久患疳蛔咬心發歇疼痛並用苦楝子煎湯下二丸如鼻下赤爛口齒疳蟲並口瘡等用兒所吃奶汁研二丸塗在患處疳眼雀目用白羊子肝一枚以竹刀子批開入藥二丸在內以麻縷纏定用淘米泔煮熟空心食之仍令乳母常忌毒魚大蒜雞鴨豬肉等熊膽用溫水化入藥蘆薈研膩粉同水銀研硃砂研飛各一分麝香研半分蟾酥乾者酒浸一宿龍腦研鉛霜研各一字雄黃研飛青黛研胡黃連末各半兩白附子炮二錢水銀一錢與膩粉同研不見米星上為末入研藥勻用熬過獖豬膽汁浸蒸餅為丸如黃米大湯使如前此藥退驚治風化蟲殺疳除百病進乳食若隔三兩日進一服永無百病不染橫夭之疾凡有患與服必見功效定吐救生丹治小兒伏熱生涎心膈煩躁壯熱霍亂乳食不下嘔噦噁心或發吐逆山大戟漿水煮切焙乾為末一十五兩乳香別研丁香為末各五兩粉霜研膩粉研碎各七兩半龍腦研二兩半水銀黃蠟黑鉛與水銀同結砂子各一十兩半上件合研令勻每熔蠟一兩入蜜二錢半和為丸如黃米大每一歲兒服一丸如煩躁研生脂麻馬齒水下如吐逆煎丁香馬齒湯下更量虛實加減食後臨臥服之此藥除熱化涎下膈止吐逆若胃虛傷冷嘔吐不止者不可服凡小兒吐逆宜速療之久不止遂為慢驚常宜收此藥備急五福化毒丹治小兒蘊積毒熱驚惕狂躁頰赤咽乾口舌生瘡夜臥不寧譫語煩渴頭面身體多生瘡癤桔梗微炒玄參洗焙各六兩青黛研牙硝枯人參去蘆各二兩茯苓去皮五兩甘草炒一兩半銀箔八片為衣麝香研半錢金箔八片為衣上為細末入研藥勻煉蜜為丸每兩作十二丸每一歲兒一丸分四服用薄荷水化下及瘡疹後餘毒上攻口齒涎血臭氣以生地黃自然汁化一丸用雞翎掃在口內熱疳肌肉黃瘦雀目夜不見物陳粟米泔水化下食後臨臥服靈砂歸命丹治小兒蘊積邪熱潮熱不除頰赤口乾心膈煩躁痰涎不利睡臥不安或發驚癇涎潮搐搦又療積滯不消下利多日腹中㽲痛煩渴嘔噦服藥調和不能愈者並可服之巴豆去心膜皮炒熟研如面油三百一十五粒牛黃研龍腦研麝香研膩粉研各三兩辰砂研飛九兩金箔研九十片上合研勻煉黃蠟六兩入白沙蜜三分同煉令勻為丸如綠豆大每服二丸金銀薄荷湯下更量歲數加減如驚癇搐搦用龍腦膩粉蜜湯下服藥先以冷水浸少時服之見效尤速大天南星丸治小兒急慢驚風涎潮發搐目睛上視口眼相引牙關緊急背脊強直精神昏塞連日不省龍腦研牛黃研乳香研各一錢天南星牛膽制者半兩人參天麻去蘆防風去蘆各一分硃砂研三錢乾蠍十四個湯浸潤去土微炒為末麝香研一錢半上件研杵令勻煉蜜和丸如大雞頭大每服一丸荊芥薄荷湯化下量兒大小以意加減服不計時候五疳保童丸治小兒五疳蓋其骨肉輕軟腸胃微細若乳哺有節則臟腑相調或乳母寒溫失理飲食無常醉飽喜怒及小兒百晬以後五歲以前乳食漸多不擇生冷好餐肥膩甘酸之物即成五疳一曰肝疳其候搖頭揉目白膜遮睛流汗遍身合面而臥目中澀癢肉色青黃發立頭焦筋青腦熱腹中積聚下痢頻多久而不痊轉甚羸瘦二曰心疳其候渾身壯熱吐痢無常頰赤面黃胸膈煩滿鼻乾心躁口舌生瘡痢久不痊多下膿血有時盜汗或乃虛驚三曰脾疳其候腹多筋脈喘促氣粗乳食不多心腹脹滿多啼咳逆面色萎黃骨立毛焦形枯力劣胸膈壅悶水穀不消口鼻常干好吃泥土情意不悅愛暗憎明腸胃不和痢多酸臭四曰肺疳其候咳嗽氣逆皮毛乾焦饒涕多啼咽喉不利揉鼻咬甲壯熱憎寒口鼻生瘡唇邊赤癢腹內氣脹乳食漸稀大腸不調頻頻泄痢糞中米出皮上粟生五曰腎疳其候肌肉消瘦齒齦生瘡寒熱時作口鼻乾燥腦熱如火腳冷如冰吐逆既增乳食減少瀉痢頻並下部開張肛門不收疳瘡癢痛以上疾狀並皆治療黃連去須白鱔頭炙令焦黃無即炒白蕪荑充代草龍膽去蘆雄黃研飛青橘皮去瓤五倍子夜明砂微炒各一兩蟾頭一枚炙令黃色苦楝根天漿子微炒胡黃連麝香青黛研熊膽研蘆薈研各一兩一本有蝦蟆灰蝸牛微炒上為細末都研令勻用糯米飯和丸如麻子大每服一歲兒一丸不計時候溫米飲下日進三服尤妙一方有蝸牛微炒一分熊膽丸殺疳退驚治壯熱昏憒嘔吐痰涎頰赤面黃鼻乾目澀有時盜汗或即虛驚荏苒不除乳食不進熊膽研胡黃連木各二錢使君子麩炒為末天漿子麩炒各七個青黛研一錢寒食麵三錢麝香研一分細墨燒淬半錢上件一處同研勻用白麵糊和丸如黍米大每服五丸至七丸米飲下不計時候虎睛丸治小兒驚風壯熱痰涎壅滯精神昏憒睡多驚啼或發搐搦目睛直視茯神去木天麻去苗膩粉研天竺黃研胡黃連各五兩硃砂研飛二兩麝香研白附子炮天南星炮各三兩青黛研七兩使君子一百個天漿子微炒四十個上為細末以麵糊為丸如梧桐子大每一歲兒服一丸薄荷湯化下更量虛實加減乳食後服天麻防風丸治一切驚風身體壯熱多睡驚悸手足抽掣精神昏憒痰涎不利及風溫邪熱並宜服之白殭蠶去絲嘴炒乾蠍炒各半兩天麻去苗防風去苗人參各一兩硃砂研飛雄黃研麝香研甘草炙各一分牛黃一錢上為細末煉蜜為丸如梧桐子大每服一丸至二丸薄荷湯化下不拘時候化蟲丸治小兒疾病多有諸蟲或因腑臟虛弱而動或因食甘肥而動其動則腹中疼痛發作腫聚往來上下痛無休止亦攻心痛叫哭閤眼仰身撲手心神悶亂嘔噦涎沫或吐清水四肢羸困面色青黃飲食雖進不生肌膚或寒或熱沉沉嘿嘿不的知病之去處其蟲不療則子母相生無有休止長一尺則害人胡粉炒鶴蝨去土檳榔苦楝根去浮皮各五十兩白礬枯十二兩半上為末以麵糊為丸如麻子大一歲兒服五丸溫漿水入生麻油一二點調勻下之溫米飲下亦得不拘時候其蟲細小者皆化為水大者自下進食丸治乳食不消心腹脹滿壯熱喘粗嘔吐痰逆腸鳴泄瀉米穀不化或下痢赤白腹痛後重及食症乳癖痃氣痞結並皆治之代赭石燒醋淬研當歸去蘆微炒硃砂研飛枳殼去瓤麩炒微黃木香各半兩麝香細研一分巴豆霜半分上件藥搗羅為末入研藥勻麵糊為丸如麻子大每一歲兒服一丸溫米飲下更量虛實加減服之食後服金箔鎮心丸治小兒風壅痰熱心神不寧驚悸煩渴唇焦頰赤夜臥不安譫語狂妄紫河車用黑豆煮軟切作片焙乾二十五兩山藥一百五十兩牙硝枯十五兩甘草爁人參去蘆茯苓去皮各五十兩硃砂研飛一百兩龍腦研十兩麝香研五兩金箔一千二百箔為衣上為細末煉蜜為丸每一兩半作五十丸以金箔為衣每服一丸薄荷湯化下含化亦得食後臨臥常服安鎮心神散敗邪熱涼咽膈止驚啼比金丸治小兒驚風體熱喘粗涎嗽心忪頰赤大小便不利夜臥不穩滑石膩粉研各十五兩青黛研二兩半天南星炮一十二兩半巴豆七百個去皮去霜上為細末以麵糊為丸如麻子大每服一歲一丸薄荷溫水下如急驚風頭熱足冷口噤面青筋脈抽掣上膈頑涎疾狀甚者加一二丸煎桃符湯下疏利下蘊毒熱涎立便安愈小兒瘡疹後餘毒不解宜與服食後香連丸治小兒冷熱不調泄瀉煩渴米穀不化腹痛腸鳴或下痢膿血裡急後重夜起頻並不思乳食肌肉消瘦漸變成疳白石脂龍骨乾薑炮黃連去須微炒白礬煅各半兩上件藥搗羅為末醋煮麵糊和丸如麻子大每一歲兒服十丸米飲下乳食前服如煩渴煎人參湯下更量兒大小以意加減日三四服紫霜丸治乳哺失節宿滯不化胸腹痞滿嘔吐噁心便利不調乳食減少又治傷寒溫壯內挾冷實大便酸臭乳食不消或已得汗身熱不除及變蒸發熱多日不解因食成癇先寒後熱代赭石醋淬細