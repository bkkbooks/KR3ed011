body:
  text: 卷下論諸氣證候附脾胃積聚論一切氣證皆由憂戚中或盛怒中動傷真氣致陰陽不和結氣於胸膈之間壅滯不快飲食不下遂成膈噎之疾可與勻氣散五膈寬中散膈氣散沉香降氣湯分氣紫蘇飲七氣湯嘉禾散丁香煮散分心氣飲小降氣湯之類論氣虛腫滿氣虛腫滿者因脾氣停滯脾經受濕氣不流行致頭面虛浮四肢腫滿腹肚膨脹如鼓上喘氣急者可與茯苓散五苓散三和散分氣紫蘇飲木香分氣丸俞山人降氣湯小降氣湯蘇子降氣湯曹脾散嘉禾散喘甚者可與潤金散款肺散大便祕者與三和散小便不通五苓散論乾溼腳氣腳氣有數種痛不可忍者謂之寒煩悶發渴者謂之熱腫而重者謂之濕用隨證治之不可一概論也濕腫者可與黃耆建中湯小續命湯風濕者可與朮附湯熱而發渴者可與紫雪衝心悶者可與三和散麻仁丸降氣湯搶腰痛者可與大烏沉湯論小腸氣疾小腸氣膀胱奔豚疝氣等疾皆因腎氣虛弱膀胱久冷風濕乘之傷於腎經氣滯不散小腹刺痛腎經偏吊未可驟服補藥先用疏導發散可與蘇子降氣湯五苓散蟠蔥散鹽煎散川楝散大沉香丸茴香丸仍炒茴香燒鹽細嚼熱酒送下或五香散正元散蓽澄茄散之類小便不通者與雞舌香散或五苓散如痛稍退只用平胃散送下茴香丸調理論症積氣塊症積氣塊皆因氣虛及寒氣熱氣怒氣恚氣喜氣憂氣愁氣內結積聚堅牢如杯心腹絞痛不能飲食用藥漸漸消磨不能宣利可與七氣湯丁香丸青木香丸木香推氣丸挨積丸蓬煎丸積氣不散腹脅膨脹可與積氣丸三稜煎丸心下堅硬結塊衝心可與溫白丸脹滿不思食者與養脾丸消食丸嘉禾散四君子湯論脾胃諸疾久病脾泄腸滑不禁日久無度虛羸者可與平胃散空心送下茴香湯兼服訶黎勒丸丁香豆蔻散服諸藥不效者可多與人參豆蔻散有驗更有一種大便如故只是每日早晨水瀉一二行日間都無事可服金鎖正元丹瀉止即住服論心脾疼證婦人心脾疼及血氣刺痛者可與蓬煎丸拈痛丸其拈痛丸性熱不可輕用如得見沉寒痼冷端的方可用之蟠蔥散雞舌香散鹽煎散如意丸皆可選用若痛連腰背或小腸氣刺痛及虛弱老人宜大沉香丸兩丸作一服立效丈夫熱酒下婦人醋湯下如不吃酒薑湯下更可與和氣散調和脾胃論脾痛嘔逆脾胃痛甚嘔逆不納食者或加喘急者可與七氣湯加吐者與人參藿香湯瀉者與大沉香丸人參豆蔻散建中湯忽暴心痛者與蘇合香丸撞氣沉香丸論心脾腹痛心脾腹痛多有積或有寒積者可與溫白丸或保安丸虛老人不可多服此二藥只與木香推氣丸或感應丸小獨聖丸理痛丸洗消去積次與正氣散嘉禾散曹脾散人參煮散蓽澄茄散蟠蔥散鹽煎散雞舌香散撾脾散建中散有寒者與大沉香丸兩丸作一服次與蓬煎丸溫中良薑丸丁香煮散四柱散論胸膈不快胸膈不快氣滯者可與沉香降氣湯烏沉湯青木香丸七氣湯和氣散或人參丸紅丸子小理中丸撞氣沉香丸丁沉丸順氣丸三稜散如意丸蓬煎丸若煩悶甚大便祕者與青木香丸脾痛者可與蓬煎丸之類論脾虛翻胃脾虛翻胃不納食及湯藥不下者可與膈氣散人參木香散參苓白朮散五膈寬中散噫氣吞酸脾痛者可與如意丸思食丸之類論宿患心腹痛有積塊氣塊症癖日久發歇不常者不可取轉宜漸次消磨可與感應丸溫白丸挨積丸蓬煎丸小理中丸少吃數丸常服漸漸消磨更與和脾散嘉禾散參苓白朮散四君子湯思食丸健脾湯建中散平胃散之類助其脾胃久而能去其根若痛有休止或往來上下胸中慒悶時吐冷沫中脘不快嘔逆噁心者恐是蟲痛可與集效丸或九痛丸其九痛丸有利性不可多服若卒然心腹暴痛膨急不得息往來攻衝悶絶噁心者恐是疰忤鬼氣可與蘇合香丸若虛弱臟寒人可將蘇合香丸捏作餅子用火尉斗蓋之將藥餅安尉斗上爆令藥極熱以去其腦子性依法服之若痛而不休胸膈塞悶嘔吐不定粥藥不下者可與順氣散送下青木香丸如無順氣散五積散送下亦得及九痛丸三稜散大沉香丸論腹脹心膨腹脹者若因傷寒或寒熱瘴瘧或瀉痢大病之後只是吃食後便腹脹心膨不美飲食噫醋吞酸縱食些小亦覺膨脹者切不可用消食克化之藥若用藥動下轉加困重去生便遠也但可與正氣散嘉禾散參苓白朮散四君子湯曹脾散人參煮散大小養脾丸蓽澄茄散思食丸蓬煎丸如意丸瀉者與人參豆蔻散丁香散但得氣壯自能飲食加倍膨脹自愈論痰飲咳嗽論痰飲證候諸痰飲不化留滯胸脘令頭目昏眩嘔惡不快腹中漉漉有聲可與消飲丸倍術丸五苓散有寒者與理中丸青州白丸子俞山人降氣湯中酒渴及停飲嘔逆噁心者及頭痛或飲酒過多背痛連腰痛不思飲食與新法半夏湯消飲丸倍術丸辰砂化痰丸生氣湯快氣湯半夏丸天南星丸大養氣丸橘皮半夏湯小降氣湯論咳嗽喘急大抵咳嗽皆從肺出醫家細論發藥大略有三有因寒者有風者有熱者風寒則從外至熱則從內起風寒則諸經自受其邪熱則諸經腑臟或熏乘而為病風則散之寒則溫之熱則調之瀉是瀉肺經非瀉腑臟也當用葶藶桑白皮之類是也因風者遇風則嗽甚因寒者值寒則嗽劇因熱者過熱則嗽即發更有一驗甚的但問遇夜飲酒時夜間如何若吃酒後嗽甚則有熱也吃酒了嗽減則有寒也涎青白者有寒稠黃者有熱隨證發藥凡感風寒暴嗽咳唾稠黏胸膈不利可與金沸草散半夏丸款花膏華蓋散五嗽丸潤肺丸款肺散青金丸小兒潤肺散款冬花散論寒嗽反復冷嗽或吐青痰遇夜嗽甚者可與細辛五味子湯養中湯五嗽丸俞山人降氣湯人參藿香湯胡椒理中丸溫肺細辛湯鍾乳補肺湯消飲丸倍術丸丁香半夏丸分心氣飲參苓白朮散惡風有寒者與小青龍丸兼服款肺散人參款花膏論熱嗽胸膈不快氣壅上盛臉赤口舌乾者可與金沸草散大阿膠丸人參養肺丸清心飲子人參款花膏半夏丸華蓋散人參潤肺丸風痰上膈壅熱咽乾及吐血者可與辰砂化痰丸大阿膠丸蠟煎丸人參養肺丸金沸草散青州白丸子川芎丸雞蘇丸久病嗽及虛老人宜與溫肺丸人參補肺湯丁香半夏丸人參藿香湯化痰丸寒熱相交秋冬之間多有此證可與款冬花散半夏丸華蓋散人參款花膏人參潤肺丸小兒潤肺丸青金丸潤金散一貼作二服老人尤宜服喘急氣促睡臥不得者與定喘湯瑞應丸蠟煎散降氣湯款花散潤金散人參養肺丸華蓋散之類唾膿血者與款冬花散九仙散論諸虛證候附痼冷論諸虛不足皆因腎氣虛憊下元積冷腰背疼痛肢體倦怠面色無光精神不爽唇口乾燥眼暗耳鳴小便滑數夜多異夢盜汗失精不思飲食日漸羸瘦可與菟絲子丸安腎丸八味丸無比山藥丸黃耆建中湯茴香丸脾胃虛弱者兼服壯胃藥虛損甚者可與麝香鹿茸丸沉香鹿茸丸法煉黑錫丹金鎖正元丸張走馬玉霜丸正元散沉香鱉甲散椒附丸四柱散下虛洞泄者四柱散正元散丁香豆蔻散治心氣不足神思恍惚言語錯謬驚悸不定夜多異夢可與定志丸降氣丹鎮心丸人參黃耆散妙香散烏沉湯參苓白朮散治小便白濁夢泄遺精可與平補鎮心丹降心丹威喜丸定志丸冷憊虛損甚精冷滑不固者與金鎖正元丹腰股痛者與青娥丸甚者與神應丸黃耆丸乳香丸活絡丹安腎丸返風應痛丸如耳鳴者黃耆丸立效虛勞發熱至午後熱甚者空心服安腎丸八味丸山藥丸沉香鱉甲散參苓白朮散嘉禾散食後服人參當歸散若嗽涎黃或有血者臨臥服人參養肺丸因虛勞用力太過吐血不止者與祕傳降氣湯或小降氣湯多加人參煎服前狀發熱甚者與逍遙散骨中熱者與人參黃耆散虛弱老人可與黃耆建中湯常服虛汗盜汗心忪氣短者可與牡蠣散止汗散黃耆建中湯大山藥丸人參當歸散加小麥煎服自汗不止者朮附湯正元散心熱盜汗可與辰砂妙香散論沉寒痼冷皆因元氣虛損下冷上盛致水火不交陰陽失序手足厥冷及傷寒陰證霍亂轉筋下痢久瀉脈候沉微者與黑錫丹來復丹金液丹附子理中丸金鎖正元丹四神丹論積熱證候附咽喉口齒眼目論積熱咽喉痛上焦壅熱心經煩渴腮頷結核者可與玉屑無憂散牛黃涼膈丸消毒犀角飲四順飲解毒丸積熱三黃丸口舌生瘡可與碧雪龍腦飲玉屑無憂散甘露飲硼砂丸咽喉腫痛咽物有礙者可與如聖湯八正散四順飲龍腦飲甘露飲洗心散牛黃涼膈丸犀角飲薄荷煎石龍散積熱小便不利者可與導赤丸五淋散大便不通服清心飲三黃丸洗心散論喉閉喉風證自其風邪客於喉間氣鬱而熱則壅遏而為喉疼自其熱氣生於肺胃風毒蘊隆則腫結而為喉痹其證若懸癰生於上齶雖不關於咽喉所以暴腫者抑亦熱氣使然也咽喉懸癰關要所繫病不急療皆能殺人也喉閉纏喉風者可與解毒丸洗心散玉屑無憂散碧雪甚者解毒雄黃丸論牙齒疼痛牙齒疼痛其證不一有熱痛者滿口齒浮因上膈有熱而痛者有虛痛者皆因腎經虛憊虛熱之氣上攻而痛有風蚛牙痛者須用仔細詳證方可服藥齒齦浮腫口內氣熱滿口齒浮而動此熱證也可與四順飲甘露飲洗心散龍腦飲清心飲子八正散次煎升麻葛根湯灌漱吐去兼吃些小不妨腎經虛憊虛熱之氣上攻齒痛及老弱人齒痛者可與黃耆丸安腎丸鹿茸丸八味丸次用赴筵散擦之以升麻葛根湯灌漱風注牙齒疼痛後生壯實者可與細辛散赴筵散揩擦去風吐出痰良久以升麻葛根湯灌漱即吐次與黑神丸乳香丸白龍丸飲酒齒痛者以井花水洗漱或百藥煎泡湯冷含咽或縮砂嚼敷通用論眼目諸證候眼目昏暗視物不明不腫不痛不赤亦無翳膜此內障證候也或見黑花或有冷淚者是脾腎俱虛不可便服涼藥只可與明眼地黃丸菊睛丸駐景丸還睛丸綿鳩丸決明丸尋常肝有風熱眼癢澀昏暗有淚視物不見只可與菩薩散決明散還睛丸撥雲丸菊花散密蒙花散腎風眼癢四生散秦皮散湯泡散紫金膏洗春雪膏點外障翳膜侵睛胬肉久病者空心可與駐景丸菊睛丸食後服決明丸撥雲散菩薩散密蒙花散祕傳羊肝丸點剝膜膏良久用紫金膏洗或春雪膏暴赤眼昏澀疼痛羞明下熱淚不可點亦不可洗只可與還睛丸洗心散洗肝散八正散甘露飲菩薩散撥雲散睛痛不可忍者與羌活散還睛丸兩丸只作一服立止並治頭風痛神效瞼眥赤爛視物不明昏暗有淚者肝有風也可與菩薩散撥雲散洗肝散菊花散密蒙花散決明散次用紫金膏洗春雪膏點論諸血熱妄行凡吐血衄血不止昏眩目黃者可與龍腦雞蘇丸薄荷煎四物湯加荊芥煎論瀉痢證候論瀉疾證候暴瀉水瀉此二證秋夏間多有之皆因飲食所傷及食生冷之物暴瀉不住須用仔細詢問若噫氣吞酸乾嘔氣臭者此是傷食也可先與感應丸一二服次與理中丸人參豆蔻散守中金丸來復丹溫胃丸以上藥性皆溫甚者與附子理中丸理中丸四柱散已寒丸溫中良薑丸二姜丸火輪散朝真丹正元散金液丹二氣丹以上藥性皆熱丁香豆蔻散微熱澀固須用仔細審實無傷食者不可與感應丸便用止瀉藥吐瀉有腹痛者可與服木香推氣丸沉香丸丁香丸感應丸久病虛弱年高及氣弱人臟腑泄瀉久不止者可與人參豆蔻散厚腸丸參苓白朮散不換金正氣散四君子湯之類論霍亂吐瀉證霍亂吐瀉有冷熱二證寒多不渴者可與理中丸姜附湯來復丹霍亂吐瀉有熱煩躁而渴者可服香薷散五苓散嘉禾散參苓白朮散四君子湯霍亂吐瀉後調理脾胃可與參苓白朮散嘉禾散五苓散四君子湯調氣散之類渴者與參苓白朮散止之多服尤佳出冷汗手足軟者加金液丹二氣丹朝真丹未效者灸氣海若吐瀉定熱藥皆止只用溫藥理脾論痢疾證候皆因飲食失調動傷脾胃水穀相拌運化失宜留而不利冷熱相搏遂成痢疾冷氣相搏其色白熱氣相搏其色赤治之法皆用溫藥調和脾胃次隨證治之大抵人說證須用仔細詢問有裡急後重者腹痛者或不痛者頻頻登廁一日三五次至五七次無物者又說大便不通既裡急後重臍腹痛不止不問老少孕婦皆是痢也非無物出不識此證只言大便不通可仔細辨之病人登廁才有三兩點物或赤或白或如魚腦者此皆痢證也凡痢下赤白或純膿或鶩溏若先臍腹撮痛遇痛即痢下下後痛止者此為積痢可與木香推氣丸感應丸各進兩三服次隨痢顏色治之下痢赤白可與駐車丸黃連阿膠丸厚腸丸胃風湯下痢白多赤少者與厚腸丸駐車丸人參豆蔻散下痢白少赤多者與黃連阿膠丸萬金丸金屑丸下痢純赤或鮮血者可與服黃連阿膠丸地榆散萬金飲加麥門冬子煎純血痢須是審問仔細若下鮮血者是有熱遇下痢時微覺後重者是有熱也下痢純白滑泄者此是冷證可與丁香豆蔻散訶黎勒丸駐車丸若下瘀血或紫黑色者此是虛冷之甚遇痢下時微滑當與駐車丸厚腸丸丁香豆蔻散痢下赤白連綿日久愈而復發腹中時痛諸藥不瘥者可與木香推氣丸不二丸駐車丸厚腸丸感應丸下痢日夜頻並虛滑者可與丁香豆蔻散四柱散相兼服更有一種脾毒下血與熱毒痢一般證候但不心煩口不乾渴不喜冷余者相似可與王氏博濟方內敗毒散以槐花枯礬二味為末烏梅煎服若只下痢臍腹不撮痛者乃無積滯不須先服感應丸論腸風痔瘻證腸風下血臟毒下血或祕有熱者可與三黃丸黃連阿膠丸濃煎木香湯吞下有熱者與雞蘇丸腸風黑散金屑丹萬應丸四物湯加荊芥並防風煎諸痔發作與釣腸丸未破者驅毒散更用豬膽汁塗之論癰疽諸證附瘡癬論癰疽發背諸赤腫毒不問四肢手足頭面初發便可與漏蘆湯三仙散托裡散保安膏乳香內消膏導赤丸四順飲通氣散癰疽發大便不通可與麻仁丸三黃丸壯實者與神功丸須用通利三五行方得毒氣退也已破膿血出不快者可與三仙散漏蘆湯托裡散保安膏乳香內消膏貼之瘡口久不合者可與桃仁散麒麟散論惡瘡疥癬一切無名惡瘡漏瘡臁瘡冷瘡久年不愈者可與桃仁散麒麟散保安膏貼之風毒熱瘡一名腎臟風瘡汁膿胞濕爛浸淫者可與何首烏散四生丸胡麻散四順飲大便祕者與皂莢煎丸桃仁散以滑肌散敷之遍身生瘡瘙癢或生癮疹者先服通大便藥可與皂莢煎丸神功丸麻仁丸何首烏散四順飲四生丸消風散胡麻散滑肌散黃耆丸白龍丸瘡干痛者與玉龍摩風膏湯火燒成瘡者與佛手散疥疽頑癬與摩風膏白龍丸滑肌散清心丸論婦人諸疾論月經諸疾皆因月經不調或前或後或多或少或淋瀝不止或閉塞不通肢體倦怠困乏少力飲食無味常服補者可服四物湯熟乾地黃丸內補當歸丸琥珀丸當歸建中湯沉香鱉甲散活血丹澤蘭丸益陰丹血海冷憊者可與暖宮丸茴香丸大聖散小白薇丸黑錫丹麝香鹿茸丸內補當歸丸經血過多淋漓不止者與膠艾湯溫經湯小白薇丸烏金散益陰丹澤蘭丸內補當歸丸熟乾地黃丸赤白帶下服諸藥不瘥者可服澤蘭丸兼服平補鎮心丹速效大聖散溫經湯澤蘭散小白薇丸紫石英丸白帶不止腹常冷痛者可與暖宮丸麝香鹿茸丸法煉黑錫丹茴香丸威喜丸澤蘭丸正元散來復丹帶下五色者可與益陰丹滋血湯伏龍肝散崩漏下血過多頭目昏眩舉頭欲倒者可與芎藭湯膠艾湯烏金散琥珀丸暖宮丸大聖散內補當歸丸崩中敗血連日不止與滋血湯血氣虛憊久冷崩漏下赤白五色不定或如豉汁可與溫經湯伏龍肝散四物湯月經不通及室女月脈不行者可與蒲黃散逍遙散大聖散黑神散琥珀澤蘭煎通真丸活血丹四物湯地黃丸血風勞胸膈不利經脈澀四肢煩痛心悸者可與人參荊芥散熟乾地黃丸逍遙散血風氣虛頭旋及産前産後頭旋者可與保生丸四物湯膠艾湯虛勞發熱及寒熱俱發者可與黃耆鱉甲散逍遙散地黃丸澤蘭丸荊芥散嘉禾散參苓白朮散熱未退者與人參當歸散極妙氣壯者可與逍遙散痰嗽或有血者臨臥服人參養脾丸氣壯年少女人骨中作熱者可與熟乾地黃丸食前服食後服人參黃耆散疝瘕陰中冷痛或頭風入腦寒痹筋攣血閉無子漏下赤白者可與熟乾地黃丸鍾乳澤蘭丸牡丹煎丸婦人無子或諸虛上熱下冷百病皆生者可與小白薇丸禹餘糧丸陽起石丸先有寒冷心腹刺痛或腫或寒下痢不止及少氣者可與吳茱萸湯活血湯血風攻注五心煩熱遍身瘙癢或生癮疹或發赤腫可與人參荊芥散人參當歸散消風散四物湯加荊芥煎逍遙散甚者可與服皂莢煎丸血氣凝滯者可服青木香丸疏通開導論産前藥忌産前所忌損動胎氣藥物盧醫周鼎集為歌曰蚖蟹水蛭地膽蟲烏頭附子及天雄躑躅野葛螻蛄類烏喙側子與虻蟲牛黃水銀並巴豆大戟蛇蛻及蜈蚣牛膝藜蘆加薏苡金石錫粉對雌雄牙朴芒硝牡丹煎蜥蜴飛生更䗪蟲代赭蚱蟬胡腦麝芫花薇蘅草三稜槐子牽牛並皂角桃子蠐螬和茅根檔根硇砂與乾漆亭長溲流莽草中蘧麥茼茹蟹爪甲蝟皮鬼箭赤頭紅馬刀石蠶衣魚等半夏南星通草同乾薑蒜雞及鴨子驢馬兔肉不須供切忌婦人産前用此時宜記在心中論産前諸疾妊娠三兩月日心中煩憒頭目眩重顛倒不安嘔吐煩悶此惡阻病只可與人參丁香散半夏茯苓湯茯苓丸小七香丸藥丁香妊娠下血胎動不安名曰漏胎可與安胎飲四物湯膠艾湯保生丸琥珀丸澤蘭丸臨産月常服滑胎散安胎飲保生丸産難或橫或逆或三二日不産者及胎死腹中或胞衣不下可與花蕊石散或用保安膏一貼作一服丸如梧桐子大溫酒吞下如未下再服産婦生理不順橫生逆生者可與服兔髓丸産兒已出但胞衣不下臍腹堅脹急痛者可與服牛膝湯論産後諸疾皆因新産去血過多津液燥少陰陽俱虛臟腑怯弱切不可發汗及轉積令吐瀉藥亦不可服太燥熱藥補之只可用溫和藥漸次加減調理不可取目前之急亂投湯藥反生他疾罪福非輕切宜戒之新産血氣俱虛不可太補恐增寒熱當令惡露去盡為佳可與黑神散大聖散澤蘭散蒲黃散産後去血過多昏迷暈悶精神錯亂皆因去血過多氣血無所主可與芎藭湯大聖散飯飲調下不效者與花蕊石散保安膏産婦常用聞醋炭氣為佳産後忽然發熱渾身拘急者可與四物湯兼用人參當歸散逍遙散産後腹中塊上下作痛者皆由惡露未盡新血與敗血相搏可與黑神散蒲黃散依前煎兼與蓬煎丸琥珀丸産後惡露方下忽然斷絶寒熱往來晝靜暮劇語言狂亂如見鬼神狀此因熱入血室可與琥珀丸四物湯淨加柴胡一錢重煎服如不退者用小柴胡湯加生地黃三兩莖捶碎同煎服産後去血多津液少陰陽皆虛凡有傷寒時氣之疾雖當發汗者切不可太過但可與輕骨散五積散敗毒散神朮散和解散大聖散之類産後六七日忽然臍腹作痛皆因呼吸之間冷氣乘虛而入可與當歸建中湯理中丸通真丸溫經湯大沉香丸鹽煎散不退者與服平胃散吞下茴香丸産後腹痛甚者可與花蕊石散太嶽活血丹産後煩渴欲飲冷者皆因去血過多陰氣衰少客陽乘之當助其內可與四物湯每服加烏梅兩個同煎渴不止與五苓散熟湯調服産後驚風狂言亂語如對神鬼精神不定者可與龍虎丹三丸作一服研好硃砂溫酒調下兼服琥珀丸産後血風頻增昏沉不省身如針刺發隨梳落或遍身虛腫者可與龍虎丹三丸作一服用當歸煎酒嚼下如瘙癢者兼服人參荊芥散産後乳汁不行者不可服諸行血藥致生他病只可服滋養血氣藥自然血脈旺盛乳汁自調可與四物湯熟乾地黃丸白薇丸內補當歸丸益陰丹大順散澤蘭散之類産後大便不通或祕澀者緣內無津液腸胃乾燥切不可用猛烈藥下之恐生他疾可與四物湯加青皮去白每服入半錢拌勻同煎服更不通者可與麻仁丸三和散論小兒諸疾論小兒疹痘證小兒患瘡疹其證乍熱乍涼呵缺煩悶咳嗽噴嚏耳鼻冷及腳冷但只惡熱不惡風渾身熱甚者或發搐或不搐一向發熱者此乃痘疹也可與升麻葛根湯惺惺散消毒犀角飲已瀉者不可與他藥只服惺惺散論小兒瘡癬證渾身疥瘡及濕奶癬可與清心飲頭瘡等疾消毒飲化毒丹通用之次用蔥鹽湯洗拭乾以無比散摻之論小兒雀目證雀目日間都無事遇夜不見物者是雀目也可時常與五福化毒丹臨臥用粟米飲調下
