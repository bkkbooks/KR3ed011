body:
  text: 卷之九治婦人諸疾附産圖外有治療諸方互見各類熟乾地黃丸治婦人風虛勞冷一切諸疾或風寒邪氣留滯經絡氣血冷澀不能溫潤肌膚或風寒客於腹內則脾胃冷弱不能克消水穀或腸虛受冷大便時泄或子臟挾寒久不成胎月水不調乍多乍少或月前月後或淋瀝不止或閉斷不通積聚癥瘕面體少色飲食進退肌肉消瘦百節痠疼時發寒熱漸至羸損帶漏五色陰中冷痛時發腫癢月水將行臍腹先痛皮膚皺澀癮疹瘙癢麻痹筋攣面生皯𪒟發黃脫落目淚自出心忪目眩及産後勞損未復肌瘦寒熱顏色枯黑飲食無味漸成蓐勞並皆治之熟乾地黃酒浸五味子揀淨柏子仁微炒別研芎藭各一兩半澤蘭去梗二兩一分禹餘糧火燒紅醋淬七遍細研防風去蘆叉肉蓯蓉酒浸一宿白茯苓去皮厚朴去粗皮薑汁炙白芷乾薑炮山藥細辛去苗卷柏去根各一兩當歸去蘆酒浸炒藁本去蘆洗甘草炙各一兩三分蜀椒去目及閉口者微炒去汗牛膝去苗酒浸一宿人參續斷蛇床子揀淨微炒蕪荑炒杜仲去粗皮炙黃艾葉炒各三分赤石脂煅醋淬石膏煅研飛各二兩肉桂去粗皮石斛去根白朮各一兩一分紫石英煅醋淬研飛三兩上件藥搗羅為末煉蜜和搗五七百杵丸如梧桐子大每服三十丸溫酒或米飲下空心食前服常服養血補氣和順榮衛充實肌膚調勻月水長髮駐顏除風去冷令人有子溫平不熱無毒妊娠不宜服之澤蘭丸治産後勞傷臟腑虛羸未復氣血不調肢體瘦弱困乏少力面色萎黃心常驚悸多汗嗜臥飲食不進産後百日內每日常服壯氣益血暖下臟進飲食黃耆澤蘭去梗牛膝去苗酒浸一宿人參去蘆赤石脂煅各一兩附子炮去皮臍木香萆薢白茯苓去皮續斷各三分肉桂去粗皮芎藭白朮乾薑炮當歸去蘆銼微炒甘草炙微赤各半兩熟乾地黃淨洗酒蒸焙一兩半上為末煉蜜丸如梧桐子大每三十丸溫米飲下空心食前鍾乳澤蘭丸補虛羸益血氣治衝任虛損月水不調臍腹㽱痛腰腿沉重四肢倦怠百節痠痛心忪恍惚憂恚不樂面少光澤飲食無味除下臟風冷治帶下三十六疾崩中漏下五色子宮久冷無子及數墮胎或因産勞損衝任血氣虛羸肌瘦嗜臥久服補暖元臟潤澤肌膚長髮去皯除頭風令人有子鍾乳粉三兩澤蘭二兩二錢半蕪荑炒半兩麥門冬去心焙一兩半山茱萸一兩二錢半艾葉醋炒七錢半防風一兩七錢半柏子仁炒別搗人參去蘆石膏研飛石斛去根熟乾地黃酒蒸各一兩半芎藭甘草微炙赤牛膝去蘆酒浸焙白芷山藥當歸去蘆炒藁本細辛去苗不見火肉桂去粗皮各一兩上為細末煉蜜和為丸如梧桐子大每服三十丸至五十丸溫酒或米飲下空心食前日二服人參荊芥散治婦人血風勞氣身體疼痛頭昏目澀心怔煩倦寒熱盜汗頰赤口乾痰嗽胸滿精神不爽或月水不調臍腹㽱痛痃癖塊硬疼痛發歇或時嘔逆飲食不進或因産將理失節淹延瘦瘁乍起乍臥甚即著床荊芥穗羚羊角鎊酸棗仁微炒生乾地黃枳殼麩炒去瓤稱人參鱉甲醋浸去裙炙黃肉桂去粗皮白朮柴胡各七兩半甘草銼爁芎藭赤芍藥牡丹皮當歸防風去苗叉各五兩上為粗末每服三錢水一盞半生薑三片煎至八分去渣熱服不拘時日二服常服除一切風虛勞冷宿病有孕不宜服牡丹煎丸治婦人衝任本虛少腹挾寒或因産勞損子臟風寒搏於血氣結生瘕聚塊硬發歇臍腹刺痛脅肋緊張腰膝疼重拘攣腫滿背項強急手足麻痹或月水不調或瘀滯澀閉或崩漏帶下少腹冷疼寒熱盜汗四肢痠痛面色萎黃多生皯𪒟羸乏少力心多驚悸不欲飲食延胡索縮砂仁各半兩赤芍藥牡丹皮各一兩山茱萸乾薑炮各半兩龍骨細研水飛熟乾地黃酒浸檳榔羌活各二兩藁本去土五味子人參白芷當歸去蘆酒浸乾山藥澤瀉續斷細者肉桂去粗皮白茯苓白朮附子去皮臍木香牛膝去苗酒浸一宿焙萆薢炮為末炒熟各一兩石斛去根酒浸三兩上為細末煉蜜和丸如梧桐子大每服二十丸至三十丸溫酒或醋湯下空心食前日二服妊娠不宜服椒紅丸治婦人血氣不調腑臟怯弱風冷邪氣乘虛客搏臍腹冷疼脅肋時脹面色痿黃肌體羸瘦怠惰嗜臥不思飲食常服補虛損暖下臟逐痼冷進飲食沉香莪朮訶黎勒煨去核椒紅微炒出汗當歸去蘆酒浸微炒附子炮去皮臍白朮各一兩麝香一分別研丁香肉豆蔻炮高良薑去蘆麻油炒各半兩上為細末入麝香勻酒煮麵糊丸如梧桐子大每服三十丸用溫酒下空心食前熟乾地黃散治婦人勞傷血氣腑臟虛損風冷邪氣乘虛客搏肢體煩痛頭目昏重心多驚悸寒熱盜汗羸瘦少力飲食不進丹參去蘆頭防風去蘆叉當歸去蘆微炒細辛去苗藁本去蘆洗芎藭各半兩人參熟乾地黃酒灑蒸焙白茯苓去皮肉桂去粗皮白朮各一兩續斷附子炮去皮臍黃耆去蘆各三分上為粗散每服四錢水一盞半入生薑半分棗三個擘破煎至一盞濾去渣食前溫服安息活血丹治衝任不足下焦久寒臍腹㽱痛月事不勻或來多不斷或過期不來或崩中去血或帶下不止面色痿黃肌肉瘦瘁肢體沉重胸脅脹滿氣力衰乏飲食減少一切血氣虛寒並宜服之吳茱萸湯浸七遍焙乾微炒安息香搗碎入好酒研澄去渣銀器內慢火熬成膏柏子仁炒山茱萸去核延胡索桃仁去皮尖麩炒微黃色虎杖當歸杜仲去粗皮銼炒附子炮去皮臍木香各二十兩澤蘭葉乾薑炮肉桂去粗皮艾葉微炒黃耆去蘆牡丹皮各二斤半肉蓯蓉酒浸焙厚朴去粗皮薑汁炙令熟各五斤上為細末以前安息香膏入白麵同煮作糊和丸如梧桐子大每服三十丸食前以溫酒下醋湯亦得吳茱萸湯治婦人臟氣本虛宿挾風冷胸膈滿痛腹脅㽱刺嘔吐噁心飲食減少身面虛浮惡寒戰栗或泄痢不止少氣羸困及因而生産臟氣暴虛邪冷內勝宿疾轉甚並皆治之桔梗去苗防風去苗叉乾薑炮甘草炙當歸去苗微炒細辛去苗各半兩熟乾地黃三分吳茱萸湯洗七遍微炒二兩上為粗散每服三錢水一盞煎至八分細濾去渣熱服空心食前伏龍肝散治氣血勞傷衝任脈虛經血非時忽然崩下或如豆汁或成血片或五色相雜或赤白相兼臍腹冷痛經久未止令人黃瘦口乾飲食減少四肢無力虛煩驚悸伏龍肝即灶心土也赤石脂各一兩熟乾地黃酒浸一宿艾葉微炒各二兩甘草炙肉桂去粗皮各半兩當歸去苗炒乾薑炮各三分芎藭三兩麥門冬去心一兩半上為粗散每服四錢水一盞半入棗三個擘破煎至七分去渣食前溫服溫經湯治衝任虛損月候不調或來多不斷或過期不來或崩中去血過多不止又治曾經損娠瘀血停留少腹急痛發熱下利手掌煩熱唇乾口燥及治少腹有寒久不受胎阿膠蛤粉碎炒當歸去蘆芎藭人參肉桂去粗皮甘草炒芍藥牡丹皮各二兩半夏湯洗七次二兩半吳茱萸湯洗七次焙炒三兩麥門冬去冬五兩半上為粗末每服三錢水一盞半入生薑五片煎至八分去渣熱服空心食前服禹餘糧丸治婦人帶下久虛胞絡傷敗月水不調漸成崩漏氣血虛竭面黃體瘦臍腹裡急腰膝疼重肢體煩痛心忪頭眩手足寒熱不思飲食桑寄生柏葉微炒當歸去蘆微炒厚朴去粗皮塗薑汁炙乾薑炮白朮鱉甲醋浸去裙炙黃附子炮去皮臍各一兩禹餘糧燒醋淬七遍飛研白石脂各二兩狗脊去毛白芍藥各三分吳茱萸湯洗七次微炒半兩上為細末煉蜜和丸如梧桐子大每服三十丸溫酒或米飲下空心食前服逍遙散治血虛勞倦五心煩熱肢體疼痛頭目昏重心忪頰赤口燥咽乾發熱盜汗減食嗜臥及血熱相搏月水不調臍腹脹痛寒熱如瘧又療室女血弱陰虛榮衛不和痰嗽潮熱肌體羸瘦漸成骨蒸甘草微炙赤半兩當歸去苗銼微炒茯苓去皮白者芍藥白白朮柴胡去苗各一兩上為粗末每服二錢水一大盞燒生薑一塊切破薄荷少許同煎至七分去渣熱服不拘時候白薇丸補調衝任溫暖子宮治胞絡傷損宿受風寒久無子息或受胎不牢多致損墮久服去下臟風冷令人有子秦椒去目及閉口者微炒出汗半兩白薇去苗熟乾地黃當歸去蘆銼微炒薑黃各一兩七錢半牡蒙藁本去苗及土各一兩二錢半禹餘糧火煅酒淬七遍研二兩人參柏子仁微炒桑寄生附子炮去皮臍肉桂去粗皮五味子去梗吳茱萸湯浸微炒石斛去根甘草炙微赤牛膝去苗酒浸一宿焙乾防風去苗叉芎藭各一兩半上為細末入研藥勻煉蜜為丸如梧桐子大每服三十丸至五十丸溫酒或米飲下空心食前服才覺妊娠即住服已懷孕者尤不宜服之小白薇丸治婦人衝任虛損子臟受寒久無子息及斷續不産此因上熱下冷百病滋生或月水崩下帶漏五色腰腹疼重面黃肌瘦或因産乳不能將護登廁太早或久坐濕地並冷風從下入血臟既虛風邪內乘或月水當行失於調攝傷動胞絡陰陽不和上焦虛陽壅燥下臟邪冷結伏致使胎孕不成冷極傷敗月水不勻飲食減少夜多盜汗面生皯𪒟齒搖發落腳膝疼重舉動少力並宜服之覆盆子去梗菖蒲微炒各三分白龍骨熟乾地黃川椒去目及閉口者微炒出汗白薇去苗各一兩蛇床子炒乾薑炮細辛去苗當歸去蘆微炒車前子芎藭各半兩遠志去心桃仁去皮尖麩炒黃白茯苓去皮藁本去苗人參卷柏去根白芷肉桂去粗皮各三兩麥門冬去心焙一兩半上為細末煉蜜和丸如梧桐子大每服三十丸溫酒或米飲下空心食前常服壯筋骨益血氣暖下臟除風冷令人有子紫石英丸治婦人久冷無子及數經墮胎皆因衝任之脈虛損胞內宿寒疾病經水不時暴下不止月內再行或月前月後及子臟積冷虛羸百病崩漏帶下三十六疾積聚癥瘕臍下冷痛少腹急重小便白濁以上疾證皆令孕育不成以至絶嗣不孕此藥並能主療常服除瘀血溫子臟令人有孕臨産易生及生子充實無病烏賊魚骨燒灰山蕷甘草炙各一兩半天門冬去心焙紫石英研各三兩紫葳辛夷仁熟乾地黃卷柏去根禹餘糧燒醋淬七遍研肉桂去粗皮石斛去根芎藭牡蒙各二兩食茱萸人參續斷當歸去蘆微炒川烏炮去皮臍牡丹皮桑寄生細辛去苗厚朴去粗皮薑汁炙乾薑炮牛膝去苗各一兩一分柏子仁微炒別研一兩半上為細末煉蜜丸如梧桐子大每服三十丸溫酒或溫米飲下空心食前日二服四物湯調益榮衛滋養氣血治衝任虛損月水不調臍腹㽱痛崩中漏下血瘕塊硬發歇疼痛妊娠宿冷將理失宜胎動不安血下不止及産後乘虛風寒內搏惡露不下結生瘕聚少腹堅痛時作寒熱當歸去蘆酒浸炒川芎白芍藥熟乾地黃酒灑蒸各等分上為粗末每服三錢水一盞半煎至八分去渣熱服空心食前若妊娠胎動不安下血不止者加艾十葉阿膠一片同煎如前法或血臟虛冷崩中去血過多亦加膠艾煎陽起石丸治婦人子臟虛冷勞傷過度風寒結搏久不受胎遂致絶子不産此藥服之大益子宮消除積冷陽起石酒浸半日細研二兩吳茱萸湯洗七遍焙微炒三分熟地黃一兩牛膝去苗酒浸焙乾薑炮白朮各三分上為細末煉蜜和搗三百杵丸如梧桐子大每服二十丸至三十丸溫酒或溫米飲下空心食前日二服若覺有妊即住服白朮散調補衝任扶養胎氣治妊娠宿有風冷胎痿不長或失於將理動傷胎氣多致損墮懷孕常服壯氣益血保護胎臟牡蠣燒粉二兩白朮芎藭各四分蜀椒去目及閉口者炒出汗三分上杵為散每服二錢溫酒調服空心食前膠艾湯治勞傷血氣衝任虛損月水過多淋瀝漏下連日不斷臍腹疼痛及妊娠將攝失宜胎動不安腹痛下墜或勞傷胞絡胞阻漏血腰痛悶亂或因損動胎上搶心奔沖短氣及因産乳衝任氣虛不能約制經血淋瀝不斷延引日月漸成羸瘦阿膠碎炒燥芎藭甘草炙各二兩當歸艾葉微