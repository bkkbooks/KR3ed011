調或作寒熱不思飲食杏仁湯浸去皮尖炒人參當歸洗焙赤芍藥甘草炙柴胡去苗桔梗去蘆各一兩地骨皮宣黃連去須胡黃連各一分肉桂去粗皮木香各半兩麝香別研半分鱉甲一枚可重二兩者醋炙黃色為度上為細末用青蒿一斤研爛絞取汁童子小便五升酒五升同熬至二升以來次入真酥三兩白沙蜜三兩再熬成膏冷方下衆藥末搜和令勻丸如梧桐子大每服五十丸溫酒送下不拘時候吳直閣增諸家名方濟危上丹保慶集第二十一論論産後所下過多虛極生風者蓋皆緣婦人以榮血為主因産血下太多氣無所主唇青肉冷汗出目瞑神昏命在須臾者不可誤用風藥急宜服此太陰玄精五靈脂去沙石硫黃老紅色者乳香研以上四味各等分慢火炒結成砂研極細桑寄生須要真者陳皮去白淨稱阿膠蛤粉炒卷柏去根生用以上四味各等分修事了焙乾為末上八味同研用生地黃汁和搗一千下丸如梧桐子大溫酒或當歸酒下二十丸食前服琥珀黑龍丹治産後一切血疾淋露不快兒枕不散積瘕堅聚按之攫手疼痛攻心困頓垂死者但灌藥無有不效驗不可言五靈脂去沙石當歸去蘆川芎乾地黃生者良薑以上各等分入砂盒內赤石脂泯縫紙筋鹽泥固濟封合炭火十斤煅通紅去火候冷開取合子看成黑糟乃取出細研入後藥一本云用椽頭砂盒花乳石煅琥珀研各一分乳香別研硫黃研各一錢半百草霜別研五兩上同為細末米醋煮糊丸如彈子大每服一丸炭火燒通紅投生薑自然汁與無灰酒各一合小便半盞研開頓服立效南嶽魏夫人濟陰丹治婦人血氣久冷無子及數經墮胎皆因衝任之脈虛損胞內宿挾疾病經水不時暴下不止月內再行或前或後或崩中漏下三十六疾積聚癖瘕臍下冷痛小便白濁以上疾證皆令孕育不成以至絶嗣治産後百病百日內常服除宿血生新血令人有孕及生子充實亦治男子亡血諸疾秦艽石斛去根酒浸焙藁本去蘆甘草炙蠶布燒灰桔梗炒各二兩京墨煅醋淬研茯苓去皮人參去蘆木香炮桃仁去皮尖炒各一兩熟乾地黃洗過酒蒸焙香附炒去毛澤蘭去梗各四兩當歸去蘆肉桂去粗皮乾薑炮細辛去苗川芎牡丹皮各一兩半山藥川椒去目炒各三分蒼朮米泔浸去皮八兩大豆黃卷炒半升糯米炒一升一本山藥川椒各云三兩上為細末煉蜜搜每兩作六丸每服一丸細嚼空心食前溫酒醋湯任下琥珀黑散治産婦一切疾病産前胎死産難橫生逆生産後胞衣不下衣帶先斷遍身疼痛口乾心悶非時不語如血暈眼花誤以為暗風乍寒乍熱誤以為瘧疾四肢浮腫誤以為水氣言語顛狂乍見鬼神誤以為邪祟腹脅脹滿嘔逆不定誤以為翻胃大便祕澀小便出血誤以為五淋及惡露未盡經候未還起居飲食便不戒忌血氣之疾聚即成塊散即上衝氣急心疼咳嗽多唾四肢虛熱睡驚盜汗崩中敗證繞臍刺痛或即面赤因變骨蒸皆宜多服若産後鼻衄口鼻黑色氣起喉中喘急中風口噤皆為難治須急服之凡産前宜進一兩服能安神順胎産後雖無疾七日內亦進一二服能散諸病或因驚恐變生他證當連服取效琥珀別研硃砂別研百草霜別研新羅白附子炮松墨燒黑衣灶屋塵也血貓灰鯉魚鱗是也燒為末各半兩麝香研川當歸去蘆白殭蠶炒去絲嘴各一分上為末每服二錢炒薑溫酒和童子小便調下食前滑胎枳殼散治婦人胎氣不足能令胎滑易産常服養胎益氣安和子臟治胎中一切惡疾枳殼去瓤炒二十四兩甘草爁六兩上為細末每服一錢空心沸湯點服入月日進三服術香散治婦人血風臟氣頭目昏暈心煩怔忪手足熱疼經候不調臍腹時痛或多便利飲食減少並宜服之天台烏藥三稜煨蓬莪朮煨川當歸去蘆荊芥穗天麻桂心不見火延胡索厚朴薑汁製炒附子炮去皮臍各一兩上為細末每服一錢生薑汁少許和溫酒調下竹茹湯治妊娠擇食嘔吐頭疼眩暈顛倒痰逆煩悶四肢不和並宜服之橘紅淨去白人參白朮麥門冬子去心各一兩白茯苓厚朴薑汁製各半兩甘草一分上為粗末每服三錢水一盞生薑五片入竹茹一塊如彈子大同煎至七分去渣服之續添諸局經驗祕方琥珀丸治婦人或老或少産前産後百病及療三十六種血冷七疝八瘕心腹刺痛卒中癱瘓半身不遂八風十二痹等手足痠疼乳中毒結瘀血懷胎驚動傷犯不安死胎不出並衣不下並宜服之琥珀研辰砂別研沉香阿膠碎炒肉桂去粗皮石斛去根附子炮去皮臍五味子揀淨川芎各半兩牛膝去苗酒浸一宿當歸去苗炒肉蓯蓉切酒浸一宿焙人參續斷沒藥研各三分熟乾地黃木香各一分上為細末煉蜜和丸如彈子大每服一丸空心暖酒調下午晚食前再服能生精血去惡血若人腹脅疼痛繞臍如刀刺及嘔逆上氣築心痰毒不思飲食用薑汁少許和酒服諸痢及赤白帶血冷崩中下血漏胎下血用生薑與艾銼炒令赤色入酒同煎數沸去渣調服泄瀉不止陳米飲服澀尿諸淋煎通草燈心湯服血運不知人煎當歸酒調服上熱下冷濃煎人參湯服遍身虛腫水氣煎赤小豆湯服産內二毒傷寒及中風角弓反張身如板硬煎麻黃湯服使被蓋出汗月經不通或間雜五色頻並而下斷續不止飲食無味肌膚瘦劣面赤唇焦乍寒乍熱四肢煩疼五心燥熱黑皯遍身血斑赤腫走注及血風勞傷無力用童子小便入薑汁少許調服常服以小便為妙若恐噁心和以半酒如懷胎人於難月一日一服至産下不覺疼痛或病人服至五服十服日倍飲食是藥功效矣其功不能具載略述急用湯使於前皺血丸治婦人血海虛冷百病變生氣血不調時發寒熱或下血過多或久閉不通崩中不止帶下赤白癥瘕癖塊攻刺疼痛小腹緊滿脅肋脹痛腰重腳弱面黃體虛飲食減少漸成勞狀及經脈不調胎氣多損産前産後一切病患無不治療菊花去梗茴香香附炒酒浸一宿焙熟乾地黃當歸肉桂去粗皮牛膝延胡索炒芍藥蒲黃蓬莪朮各三兩上為細末用烏豆一升醋煮候乾焙為末再入醋二碗煮至一碗留為糊丸如梧桐子大每服二十丸溫酒或醋湯下血氣攻刺炒薑酒下症塊絞痛當歸酒下忌鴨肉羊血此藥暖子宮能令有子內灸散治婦人産前産後一切血疾血崩虛憊腹脅㽱痛氣逆嘔吐冷血冷氣凝積塊硬刺痛泄下青白或下五色腹中虛鳴氣滿堅脹瀝血腰疼口吐清水頻産血衰顏色青黃勞傷劣弱月經不調下血墮胎血迷血暈血瘕時發疼痛頭目眩暈惡血上心悶絶昏迷惡露不幹體虛多汗手足逆冷並宜服之茴香藿香丁香皮熟乾地黃洗焙肉桂去粗皮各一兩半甘草炙赤山藥當歸去蘆洗白朮白芷各八兩藁本去蘆乾薑炮川芎黃耆去苗各二兩木香一兩陳皮去白四兩白芍藥十兩上為細末每服三錢水一大盞入生薑五片艾一團同煎至七分空心食前熱服溫酒調下亦得如産後下血過多蒲黃煎服惡露不快加當歸紅花煎服水瀉加肉豆蔻末煎服嘔吐加藿香生薑煎上熱下冷加荊芥煎但是腹中虛冷血氣不和並宜服産後每日一服則百病不生丈夫虛冷氣刺心腹疼痛尤宜服之烏雞煎丸治婦人胎前産後諸般疾患並皆治之烏雄雞一個烏藥石床牡丹皮人參去蘆白朮黃耆各一兩蒼朮米泔浸切焙一兩半海桐皮肉桂去粗皮附子炮去皮臍白芍藥蓬莪朮川烏炮紅花陳皮各二兩延胡索木香琥珀熟乾地黃洗焙肉豆蔻草果各半兩上細銼用烏雄雞一隻湯撏去毛及腸肚將上件藥安放雞肚中用新瓷瓶好酒一斗同煮令乾去雞骨以油簞盛焙乾為細末煉蜜為丸如梧桐子大每服三十丸胎前産後傷寒蜜糖酒下胎前氣悶壯熱炒薑酒下赤白帶下生薑地黃煮酒下産後敗血攻心童子小便炒薑酒吞下産後血塊攻築心腹疼痛延胡索酒下胎前嘔逆薑湯下催生炒蜀葵子酒下安胎鹽酒下室女經脈當通不通四肢疼痛煎紅花酒下血氣攻刺心腹疼痛煎當歸酒下血運棕櫚燒灰酒調吞下血邪研硃砂麝香酒下血悶煎烏梅湯研硃砂下子宮久冷溫酒或棗湯下空腹日一服血風勞人參酒吞下小腹㽱痛炒茴香鹽酒下血散四肢遍身虛浮黃腫赤小豆酒下常服溫酒醋湯任下並空心食前服白堊丹治婦人三十六病崩中漏下身瘦手足熱惡風怯寒咳逆煩滿拘急短氣心脅腰背腹肚與子臟相引痛漏下五色心常恐懼遇恚怒憂勞即發皆是內傷所致並皆治之牡蠣煅研白堊細辛去苗禹餘糧煅醋淬九遍研白石脂煅龍骨煅研各一兩半瞿麥穗附子炮去皮臍烏賊魚骨燒灰芍藥石葦去毛白蘞黃連去毛茯苓去皮肉桂去粗皮白芷當歸去苗乾薑炮人參甘草炙各一兩川椒去目及閉口者炒出汗半兩上為細末煉蜜丸如梧桐子大每服三十丸至五十丸空心溫酒下暖宮丸治證與前暖宮丸同沙參淨洗地榆黃耆桔梗白薇牛膝酒浸一宿杜仲去粗皮薑汁炙厚朴去粗皮薑汁炒白芷各半兩乾薑炮細辛去苗蜀椒去目閉口炒出汗各一分附子大者炮去皮臍一個上為細末煉蜜丸如梧桐子大每服二十三十丸空心溫酒或棗湯吞下及療婦人子宮久寒不成胎孕滋血湯治婦人血熱氣虛經候澀滯不通致使血聚肢體麻木肌熱生瘡渾身痛倦將成勞瘵不可妄服他藥但宜以此滋養通利又治證與前滋血湯同可互觀之馬鞭草荊芥穗各四兩牡丹皮一兩赤芍藥枳殼去心麩炒肉桂去粗皮當歸去苗炒川芎各二兩上粗散每四錢烏梅一個水二盞煎一盞去渣食前空心日四五服有此證服至半月或一月經脈自通百病皆除神效安胎飲治證品味與前安胎飲同一方無半夏地榆有人參桑寄生一方無白朮黃耆半夏地榆有艾葉並各等分上為粗散每服四錢水一盞半煎至八分去渣溫服不拘時益陰丹治婦人血海久虛臟腑怯弱風冷邪氣乘虛客搏膝腹冷痛大便時泄或子臟挾寒久不成孕月水不調乍多乍少或月前月後淋瀝不止帶下五色或閉斷不通結聚疝瘕面體少色飲食進退肌肉消瘦百節痠痛時發寒熱月水將行臍腹先痛皮膚燥澀面生皯𪒟頭皮腫癢發隨梳落或産後勞損未復顏色枯瘁飲食無味漸成蓐勞並能治之方與前南嶽魏夫人濟陰丹同妙應丹一名延齡丹治婦人衆病無所不治晚蠶砂炒鯉魚鱗燒為末當歸去蘆石膏煅研澤蘭去梗附子炮去皮臍木香炮各二兩熟乾地黃洗酒浸蒸焙川芎防風去蘆叉蕪荑炒馬牙硝燒人參黃耆川椒微炒柏子仁微炒別研蟬蛻去足洗焙白薇檳榔不見火各一兩厚朴去粗皮薑製藁本去苗白薑炮甘草炙赤各三兩吳茱萸湯洗七次紅花炒各半兩上為末煉蜜搜和杵數千下丸如彈子大每服一丸血瘕塊痛綿灰酒下催生溫酒吞細下血勞血虛桔梗酒下血崩棕櫚灰酒下血氣痛炒白薑酒血風荊芥酒下血暈悶絶胎死腹中胞衣不下並用生地黃汁童子小便酒各一盞煎二沸調下常服醋湯溫酒化下並空心食前服人參養血丸治女人稟受怯弱血氣虛損常服補衝任調血脈宣壅破積退邪熱除寒痹緩中下堅脹安神潤顏色通氣散悶兼治婦人懷身腹中絞痛口乾不食崩傷眩暈及産出月羸瘦不復常者烏梅肉三兩熟乾地黃五兩當歸去苗二兩人參川芎赤芍藥菖蒲微炒各一兩上為細末蜜搜杵數千下丸如梧桐子大每服五十丸至百丸溫酒米湯下食前服牡丹散治血虛勞倦五心煩熱肢體疼痛頭目昏重心忪頰赤口燥咽乾發熱盜汗減食嗜臥及血熱相搏月水不利臍腹脹痛寒熱如瘧又治室女血弱陰虛榮衛不和痰嗽潮熱肌體羸瘦漸成骨蒸乾漆炒蘇木鬼箭蓬莪朮炮各一分甘草半鹽湯炙半生當歸桂心牡丹皮芍藥陳皮去白紅花延胡索炒沒藥別研令細烏藥各一兩上為末每服二錢水一盞煎至七分不拘時候紅花當歸散治婦人血臟虛竭或積瘀血經候不行或斷續不定時作腹痛腰胯疼重攻刺小腹緊硬室女月經不通並宜服之劉寄奴草五兩當歸去蘆牛膝酒浸甘草炙紫葳紅花蘇木一本作莪朮各二兩赤芍藥九兩肉桂去粗皮白芷各一兩半上為細末每服三錢熱酒調下空心臨臥各一服若血久不行濃煎紅花酒調下有孕不可服烏金散治産後血迷血暈敗血不止淋瀝不斷臍腹疼痛頭目昏眩無力多汗又治崩中下血過多不止並宜服之麒麟竭百草霜亂髮要男子者燒灰松墨煅醋淬鯉魚鱗燒為末延胡索當歸去蘆肉桂去粗皮赤芍藥上等分搗羅為末每服二錢溫酒調下艾煎丸治崩傷淋瀝小腸滿痛人參川芎菖蒲節蜜炒各一兩熟艾糯米飲調作餅焙乾四兩食茱萸湯洗當歸各七錢半白芍藥熟乾地黃各一兩半上為末煮酒糊為丸如梧桐子大每服五十丸酒飲任下常服補榮衛固經脈當歸芍藥散治妊娠腹中絞痛心下急滿及産後血暈內虛氣乏崩中久痢並宜服之當歸茯苓去皮白朮各二兩川芎澤瀉各四兩白芍藥八兩上為末每服二錢溫酒調下食前服常服通暢血脈不生癰瘍消痰養胃明目益津調經散治産後敗血乘虛停積於五臟循經流入於四肢留滯日深腐敗如水漸致身體面目浮腫又治因産敗血上干於心下受觸致心煩躁臥起不安如見鬼神言語顛倒並宜服之當歸去蘆肉桂去粗皮沒藥別研琥珀別研赤芍藥各一兩細辛去苗麝香別研各半兩上搗為細末入研藥勻每服一錢溫酒入生薑汁少許調勻服大抵産後虛浮醫人不識便作水氣治之凡治水氣多以導水藥極是虛人夫産後即虛又以藥虛之是謂重虛往往因致枉夭但服此藥血行腫消既愈調中湯治産後腸胃虛怯寒邪所侵及未滿月飲冷當風乘虛襲留於肓膜散於腹脅腹痛作陳或如錐刀所刺流入大腸水穀不化洞瀉腸鳴或下赤白胠脅䐜脹或走痛不定急宜服之當歸肉桂去粗皮川芎白芍藥附子炮良薑各一兩甘草炙半兩上為銼散每服三錢匕水三盞煎至一盞去滓熱服旋覆湯治産後傷風感寒暑濕咳嗽喘滿痰涎壅塞坐臥不寧旋覆花五味子前胡麻黃去節赤芍藥半夏曲杏仁去皮尖麩炒茯苓去皮甘草炙荊芥去梗上各等分為粗末每服四大錢水一盞半薑五片棗一枚煎至七分去滓食前服黑龍丹治證品味與前琥珀黑龍丹同人參當歸散治産後去血過多血虛則陰虛陰虛生內熱內熱曰煩其證心胸煩滿吸吸短氣頭痛悶亂骨節疼痛晡時輒甚與大病後虛煩相類急宜服之乾地黃人參當歸肉桂去粗皮麥門冬去心各一兩白芍藥二兩上為粗散每服四大錢水二盞先將粳米一合淡竹葉十片煎至一盞去米葉入藥並棗三枚煎七分去滓食前服地黃宜用生乾者虛甚則用熟者當歸養血丸治産後惡血不散發歇疼痛及惡露不快臍腹堅脹兼室女經候不勻赤白帶下心腹腰腳疼痛當歸牡丹皮赤芍藥延胡索各二兩炒肉桂一兩上為細末蜜丸如梧桐子大溫酒米飲下三十丸食前溫服痛甚細嚼咽下四神散治産後留血不消積聚作塊急切疼痛猶如遁尸及心腹絞痛下痢當歸乾薑炮川芎赤芍藥上等分搗為末每服方寸匕溫酒調下當歸黃耆湯治産後腰腳疼痛不可轉側壯熱自汗體強氣短當歸去苗三兩黃耆芍藥各二兩上粗末每四大錢水一盞半薑五片煎七分去滓食前溫服神授散治産後一切疾病不問大小以至危篤者青皮去白桂心牡丹皮陳橘皮去白白芍藥各五兩紅花一兩半百合水浸洗乾薑炮甘草炙當歸川芎各二兩神麯炒人參去蘆麥糵炒各三兩上為末每服二錢水一盞薑三片棗一個煎至七分空心服孕婦不得服一本不用紅花小地黃丸治妊娠酸心吐清水腹痛不能飲食人參去蘆乾薑炮各等分上為末用生地黃汁丸如梧子大每五十丸米湯下食前服交感地黃煎丸治婦人産前産後眼見黑花或即發狂如見鬼狀胞衣不下失音不語心腹脹滿水穀不化口乾煩渴寒熱往來口內生瘡咽中腫痛心虛忪悸夜不得眠産後中風角弓反張面赤牙關緊急崩中下血如豚肝狀臍腹㽱痛血多血少結為癥瘕恍惚昏迷四肢腫滿産前胎不安産後血刺痛皆治之生地黃淨洗研以布裂汁留渣以生薑汁炒地黃渣以地黃汁炒生薑渣各至干堪為末為度生薑淨洗爛研以布裂汁留渣各二斤延胡索拌糯米炒赤去米當歸去苗琥珀別研各一兩蒲黃炒香四兩上為末蜜丸彈子大當歸湯化下一丸食前服加減吳茱萸湯證治與吳茱萸湯同此方極妙防風去蘆叉乾薑炮當歸去蘆酒浸炒牡丹皮桂心不見火茯苓去皮甘草炙麥門冬去心半夏湯洗七次桔梗炒細辛去苗各一兩吳茱萸湯洗七次炒三兩上為粗末每服四錢水一盞半煎七分去渣食前熱服熟乾地黃湯治産後虛渴不止少氣腳弱眼昏頭眩飲食無味熟乾地黃淨洗酒浸蒸焙一兩人參三兩麥門冬去心二兩栝蔞根一兩甘草炙半兩上為銼散每服四錢水二盞糯米一撮生薑三片棗三枚煎七分去渣食前服阿膠枳殼丸治産後虛羸大便祕澀阿膠碎炒枳殼浸去瓤麩炒各二兩滑石研飛為衣半兩上為末煉蜜丸如梧桐子大每服二十丸溫水下半日來未通再服失笑散治産後心腹痛欲死百藥不效服此頓愈蒲黃炒香五靈脂酒研淘去砂土各等分為末上先用釅醋調二錢熬成膏入水一盞煎七分食前熱服增損四物湯易簡方治婦人氣血不足四肢怠惰乏力少氣兼治産後下血過多榮衛虛損陰陽不和乍寒乍熱並皆服之當歸川芎人參乾薑炮甘草炙白芍藥各等分上㕮咀每服四錢水一盞煎至六分去滓熱服若産後寒熱腹中刺痛則有敗血當用五積散加醋煎及大聖散服之若所下過多猶有刺痛亦宜服此二藥一方治經血凝滯腹內血氣作疼用四物湯加莪朮官桂等分名六合湯一方治下血不止及妊婦胎動加熟艾乾薑甘草阿膠黃耆等分名膠艾湯一法治血痢止加膠艾治産後血搏口乾煩渴加栝蔞麥門冬煩熱小便澀大便祕加大黃桃仁湯脅脹加厚朴枳實虛煩不得睡加竹葉人參大渴煩躁加知母石膏一方治婦人血虛心腹㽱痛不可忍者去地黃加乾薑名四神湯大率産後不問下血多少須日進黑神散三服下血少者以大聖散間之至二臘以後腹內略無疼痛方服四物湯建中湯之類若早服之則補住敗血為後患不淺黑神大聖非逐血藥但能推陳致新多服不妨今人往往疑其逐血性寒則不然看其用藥可見矣若惡血去多徐徐補之亦不為晚不可姑息以貽後患且如古方用四順理中丸為産後進食之劑既用蜜丸又倍甘草其甜特甚豈能快脾不若只用理中湯少損甘草素有痰飲者二陳湯之類服之為佳且如妊婦惡阻古方有茯苓丸茯苓湯內有地黃竹茹川芎輩定能定嘔服之則愈見增極大抵惡阻皆由素有痰飲以致之可用二陳湯改名小茯苓湯用之極效不可不知成煉鍾乳散治乳婦氣少血衰脈澀不行乳汁絶少鍾乳粉上用成煉者每服二錢濃煎漏蘆湯調下豬蹄湯治奶婦氣少血衰脈澀不行絶無乳汁豬蹄一隻通草五兩上將豬蹄淨洗依食法事治次用水一斗同通草浸煮得四五升取汁飲如乳不下再服之為妙産圖入月安産圖凡産於入月一日貼於臥閣內正北壁凡安産藏衣方法並於臥閣內分布凡逐月安産藏衣避忌神殺方位並隨節氣更換交得次月節即換次月産圖凡産訖棄沃穢汙不淨之水並隨藏衣之方向不拘遠近棄之切忌向閉肚之方也體玄子借地法咒曰東借拾步西借拾步南借拾步北借拾步上借拾步下借拾步壁方之中肆拾餘步安産借地恐有穢汙或有東海神王或有西海神王或有南海神王或有北海神王或有日遊將軍白虎夫人遠去拾丈軒轅招搖舉高十丈天符地軸入地十丈令此地空間産婦某氏安居無所妨礙無所畏忌諸神擁護百邪逐去急急如律令敕禁草法鋪草及氈褥訖即咒曰鐵鐵湯湯非公所當是王一言得之銅一言得之鐵母子相生俱篾鐵急急如律令禁水法欲産時貯水咒曰南無三寶水水在井中為井水水在河中為河水水在器中為淨水水在法中為真水自知非真莫當真水以淨持濁以正治邪日遊夜煞五土將軍青龍白虎朱雀玄武招搖天狗軒轅女妭天吞地吞懸尸閉肚六甲禁諱十二神王土符伏神各安所在不得動靜不得忌干若有動靜若有忌干施以神咒當攝汝形阿佉尼阿毗羅莫多梨婆地梨娑訶産前將護法按諸家産論云凡産婦入月切忌飲酒恐産時心神昏亂臨産之時不可令旁人喧擾大小倉忙慮致驚動産母只可令熟事産婆及穩審謹卓老成親密三兩人扶侍産母初覺腹痛只宜任意坐臥勉強飲食恐致臨産氣力虛羸若腹痛漸甚唯且熟忍仍可按節次漸服滑胎榆白皮散一二服服藥之法慎勿太早須得其時又旁人不得逼迫且須令人扶策徐徐而行若行步稍難即憑物而立須臾扶策再行直至腹痛連腰相引作陳痛頻即服催生丹一服更且勉強扶行陳痛轉甚難以立認定産時將至即服催生符畢然後安詳上草上草之時慎勿傷早若太早則子在腹中難以轉側又須仔細體候直待兒逼欲生然後令抱腰也抱腰之人不得傾斜則兒得順其理自然易産也又有臥産者亦待臥定背平著席體不摳曲則子不失其道苟或不能依此節適必致産難縱或幸免必須變生諸疾産後將護法按經云婦人非只臨産須憂至於産後大須將理慎勿以産時無他乃縱心姿意無所不犯犯時微若秋毫感病重於嵩岱且才得分娩切忌問是男是女看血下多少隨證服壓血運藥良久吃粥服四順理中丸便令人從心下按至臍腹日五七次若有疾證即隨證服藥粥藥相間頻頻服餌且宜閉目而坐背後倚物左右看承常令直立兩膝雖時眠睡頻令喚覺過一復時方得上床亦須立膝高榰床頭厚鋪裀褥遮圍四向窒塞孔隙恐御賊風一臘之內常聞醋煙以防暈悶一臘之後漸加滋味或以羊肉及雌雞煮取濃汁作糜粥直至百晬常服當歸丸當歸建中湯四順理中丸日各一二服以養臟氣補血脈兩臘之後方得食糜爛肉食滿月之內尤忌任意飲食觸冒風寒恣情喜怒梳頭用力高聲作勞工巧之類及上廁便溺如此節養將攝以至百晬始得氣血和調臟腑平復設不依此即致産後余疾胎神遊方所直方位忌修造主損胎正二三四五六七八九十十一十二床戶門灶自身灶子方廁門戶灶床催生符上件符用水飛硃砂書之貼於房內北壁上遇坐草之時搭於針上就燈燒之不得飛揚溫水調服推婦人行年法生氣方産婦宜向之坐臥及産帳向之開門大吉反支月遇此月即鋪灰上用牛皮或馬驢皮訖鋪草勿令惡血汙地吉禍害月不得於其上産又不得向之大小便避之大吉絶命方不得於其上産又不得向之大小便避之大吉懸尸日遇此日産不得攀繩宜懸馬轡攀之大吉閉肚日臨月至滿月並不得向之大小便及棄不淨之水謹之吉八疰方産帳不得向之開門忌之大吉逐一排行年吉凶方於後按上件七神詳斷吉凶逐日産母生子宜向方子午卯酉日宜向南方寅申巳亥日宜向西北方辰戌醜未日宜向東南方逐月産母忌向方忌下月下凶方生産藏胎衣吉方出廣濟歷逐日日遊神癸巳甲午乙未丙申丁酉在房內北庚子辛丑壬寅在房內南癸卯在房內西甲辰乙巳丙午丁未在房內東六戌六己在房內中央餘日在房外吉
