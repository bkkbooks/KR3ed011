腹㽲痛裡急後重並宜服之草烏三枚各去皮尖一生一炮一燒作灰用上為細末醋糊丸如蘿蔔子大大人五七丸小兒三丸水瀉倒流水下赤痢甘草湯下白痢乾薑湯下續添諸局經驗秘方地榆散治大人小兒脾胃氣虛冷熱不調下痢膿血赤多白少或因腸胃乘虛為熱毒所滲下痢純血臍腹㽲痛裡急後重口燥煩渴小便不利純下鮮血或先經下痢不應服熱藥而誤服熱藥蘊毒不散積於腸間滲而成血者並宜服之地榆炒乾葛各半斤茯苓去皮赤芍藥各六兩乾薑炮二兩當歸去苗三兩甘草炙四兩罌粟殼蜜炒十二兩上搗羅為細末每服二錢用溫熱水調下不拘時候小兒三歲可服半錢更量歲數加減與之若下痢純白或下紫黑血腸滑不禁者皆可服之秘傳斗門散治八種毒痢臟腑撮痛膿血赤白或下瘀血或成片子或有五色相雜日夜頻並兼治噤口惡痢裡急後重久渴不止全不進食他藥不能治者立見神效黑豆炒去皮十二兩乾薑炮四兩罌粟殼蜜炒半斤地榆炒甘草炙各六兩白芍藥三兩上為細末每服二錢水一盞同煎至七分溫服丁香豆蔻散治脾胃虛弱宿寒停積或飲食生冷內傷脾胃泄瀉注下水穀不化胸滿短氣嘔逆噁心臍腹㽲痛脅肋脹滿腹內虛鳴飲食減少及積寒久痢純白或白多赤少日夜無度或脾胃虛寒泄瀉日久愈而復發者並宜服之京三稜炮木香不見火厚朴去粗皮薑汁製芍藥肉豆蔻炮人參乾薑炮茯苓白者去皮各五兩吳茱萸湯洗七次焙甘草炙丁香各三兩半蒼朮去皮七兩上為細末每服三錢水一盞生薑三片棗一個擘破同煎至八分空心食前溫服如不及煎入鹽少許湯點服亦得萬金飲治脾胃虛弱內受風寒或飲食生冷傷於脾胃嘔吐泄瀉臍腹㽲痛脅肋脹滿腸內虛鳴及腸胃受濕膿血相雜下如豆汁或下瘀血裡急後重日夜無度飲食減少漸至瘦弱並能治之陳皮去白甘草半生半炙罌粟殼去蒂蓋半生半蜜炙各等分上為粗末每服四錢先用沸湯泡盅熱又於碗內盛重湯坐盞在內卻抄藥末在盅內用沸湯泡至七分盞上用盞蓋之良久紗綿濾去渣空心食前溫服如神止瀉丸治臟腑虛寒脾胃受濕泄瀉無度腸鳴腹痛不進飲食漸致羸瘦並宜服之半夏湯泡七次去滑蒼朮米泔浸去黑皮焙乾各半斤川烏米泔浸軟去皮切作片焙乾用鹽四兩同炒黃色為度去鹽不用淨稱四兩上為細末薑汁糊為丸如梧桐子大每服五十丸空心食前飯飲吞下神效參香散治大人小兒臟氣虛怯冷熱不調積在臟腑作成痢疾或下鮮血或如豆汁或如魚腦或下瘀血或下紫黑血或赤白相雜或成五色裡急後重日夜頻並臍腹絞痛甚不可忍及噤口疳蠱時瘟諸痢無問新舊並能治之白扁豆炒人參木香各二兩茯苓去皮肉豆蔻去皮各四兩陳皮去白罌粟殼去蒂各十二兩上為細末每服三大錢用溫米飲調下不拘時候立見神效黃耆湯治年高老人大便秘澀綿黃耆陳皮去白各半兩上為細末每服三錢用大麻仁一合爛研以水投取漿一盞濾去滓於銀石器內煎候有乳起即入白蜜一大匙再煎令沸調藥末空心食前服秘甚者不過兩服愈常服即無秘澀之患此藥不冷不燥其效如神痢聖散子治證同前草果去皮石菖蒲去毛白茯苓麻黃去根節厚朴薑汁炙獨活枳殼麩炒藿香白朮細辛洗去葉吳茱萸去梗甘草爁木豬苓去皮蒼朮浸良薑去蘆赤芍藥附子炮去皮臍藁本去蘆柴胡去蘆澤瀉防風去蘆半夏煮各等分上銼為粗散每服三錢水一盞半薤白二條擘碎同煎至八分去滓食前稍溫服老人小兒加減服食忌生冷油膩之物
