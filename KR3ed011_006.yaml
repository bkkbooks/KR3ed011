body:
  text: 卷之六治積熱紫雪療腳氣毒遍內外煩熱不解口中生瘡狂易叫走瘴疫毒癘卒死溫瘧五屍五疰心腹諸疾㽲刺切痛及解諸熱藥毒發邪熱卒黃等並解蠱毒鬼魅野道熱毒又治小兒驚癇百病石膏黃金一百兩寒水石磁石滑石以上四味各三斤搗碎水一斛煮至四斗去滓入下項犀角屑羚羊角屑青木香搗碎沉香搗碎各五兩玄參洗焙搗碎升麻各一斤甘草銼炒八兩丁香一兩搗碎以上八味入前藥汁中再煮取一斗五升去滓入下項朴硝精者十斤硝石四升如缺芒硝亦得每升重七兩七錢半以上二味入前藥汁中微火上煎柳木篦攪不住手候有七升投在木盆中半日欲凝入下項麝香當門子一兩二錢半研硃砂飛研三兩以上二味入前藥中攪調令勻寒之二日上件藥成霜雪紫色每服一錢或二錢用冷水調下大人小兒臨時以意加減食後服紅雪通中散治煩熱黃疸腳氣溫瘴解酒毒消宿食開三焦利五臟爽精神除毒熱破積滯去腦悶治眼昏頭痛鼻塞口瘡重舌腸癰喉閉及傷寒狂躁胃爛發斑等病並宜服之赤芍藥人參去蘆檳榔枳殼去瓤麩炒黃淡竹葉甘草生用木香各二兩羚羊角屑升麻黃芩各三兩梔子去皮葛根桑白皮木通大青去根藍葉各一兩半川朴硝十斤蘇枋六兩硃砂細研一兩麝香細研半兩上藥除硃砂麝香外並細銼以水二斗五升煎至九升去滓更以綿濾過再以緩火煎令微沸然後下朴硝以柳木篦攪勿住手候凝次下硃砂麝香等末攪令勻頓新瓷盆中經宿即成矣細研每服一錢至二錢新汲水調下更量老小虛實臨時加減服凡服靈寶丹者先依上件服法調此藥服訖須臾更以熱茶投令宣瀉一兩行為度後依法服靈寶丹立效涼膈散治大人小兒腑臟積熱煩躁多渴面熱頭昏唇焦咽燥舌腫喉閉目赤鼻衄頷頰結硬口舌生瘡痰實不利涕唾稠黏睡臥不寧譫語狂妄腸胃燥澀便溺秘結一切風壅並宜服之川大黃朴硝甘草爁各二十兩山梔子仁薄荷葉去梗黃芩各十兩連翹二斤半上粗末每二錢水一盞入竹葉七片蜜少許煎至七分去滓食後溫服小兒可服半錢更隨歲數加減服之得利下住服洗心散治風壅壯熱頭目昏痛肩背拘急肢節煩疼熱氣上衝口苦唇焦咽喉腫痛痰涎壅滯涕唾稠黏心神煩躁眼澀睛疼及寒壅不調鼻塞聲重咽乾多渴五心煩熱小便赤澀大便秘滯並宜服之白朮一兩半麻黃和節當歸去苗洗荊芥穗芍藥甘草爁大黃麵裹煨去面切焙各六兩上為細末每服二錢水一盞入生薑薄荷各少許同煎至七分溫服如小兒麩豆瘡疹欲發先狂語多渴及驚風積熱可服一錢並臨臥服如大人五臟壅實欲要溏轉加至四五錢乘熱服之八正散治大人小兒心經邪熱一切蘊毒咽乾口燥大渴引飲心忪面熱煩躁不寧目赤睛疼唇焦鼻衄口舌生瘡咽喉腫痛又治小便赤澀或癃閉不通及熱淋血淋並宜服之車前子瞿麥萹蓄亦名地扁竹滑石山梔子仁甘草炙木通大黃麵裹煨去面切焙各一斤上為散每服二錢水一盞入燈心煎至七分去滓溫服食後臨臥小兒量力少少與之龍腦飲子治大人小兒蘊積邪熱咽喉腫痛赤眼口瘡心煩鼻衄咽乾多渴睡臥不寧及除痰熱咳嗽中暑煩躁一切風壅並宜服之縮砂仁栝蔞根各三兩藿香葉二兩四錢石膏四兩甘草蜜炒十六兩大梔子仁微炒十二兩上為末每服一錢至二錢用新水入蜜調下又治傷寒餘毒潮熱虛汗用藥二錢水一盞入竹葉五六片煎至七分溫服並食後服妙香丸治丈夫婦人時疾傷寒解五毒治潮熱積熱及小兒驚癇百病等疾並皆治之巴豆三百一十五粒去皮心膜炒熟研如面油牛黃研龍腦研膩粉研麝香研各三兩辰砂飛研九兩金箔研九十箔上合研勻煉黃蠟六兩入白沙蜜三分同煉令勻為丸每兩作三十丸如治潮熱積熱傷寒結胸發黃狂走躁熱口乾面赤大小便不通煎大黃炙甘草湯下一丸毒利下血煎黃連湯調膩粉少許如患酒毒食毒茶毒氣毒風痰伏痞吐逆等並用膩粉龍腦米飲下中毒吐血悶亂煩躁欲死者用生人血下立愈小兒百病驚癇急慢驚風涎潮搐搦用龍腦膩粉蜜湯下綠豆大二丸諸積食積熱頰赤煩躁睡臥不寧驚哭瀉利並用金銀薄荷湯下更量歲數加減如大人及婦人因病傷寒時疾陰陽氣交結伏毒氣胃中喘躁眼赤潮發不定再經日數七八日已下至半月日未安醫所不明證候脈息交亂者可服一丸或分作三丸亦可並用龍腦膩粉米飲調半盞已來下此一服取轉下一切惡毒涎並藥丸瀉下如要卻收水洗淨以油單子裹埋入地中五日取出可再與大人小兒依法服一丸救三人即不堪使如要藥速行即用針刺一眼子冷水浸少時服之即效更速龍腦雞蘇丸除煩解勞消穀下氣散胸中鬱熱主肺熱咳嗽治鼻衄吐血血崩下血血淋熱淋勞淋氣淋止消渴除驚悸涼上膈解酒毒又治胃熱口臭肺熱喉腥脾疸口甜膽疸口苦常服聰耳明目開心益智柴胡要真銀州者二兩銼同木通以沸湯大半升浸一二宿絞汁後入膏木通銼同柴胡浸阿膠炒微燥蒲黃真者微炒人參各二兩麥門冬湯洗去心焙乾四兩黃耆去蘆一兩雞蘇淨葉一斤即龍腦薄荷也甘草炙一兩半生乾地黃末六兩後入膏上除別研藥後入外並搗羅為細末將好蜜二斤先煉一二沸然後下生乾地黃末不住手攪時時入絞下前木通柴胡汁慢慢熬成膏勿令焦然後將其餘藥末同和為丸如豌豆大每服二十丸嚼破熱水下不嚼亦得虛勞煩熱消渴驚悸煎人參湯下咳嗽唾血鼻衄吐血將麥門冬湯浸去心煎湯下並食後臨臥服之惟血崩下血諸淋疾皆空心食前服治淋用車前子湯下牛黃涼膈丸治風壅痰實蘊積不散頭痛面赤心煩潮躁痰涎壅塞咽膈不利精神恍惚睡臥不安口乾多渴唇焦咽痛頷頰赤腫口舌生瘡牛黃研一兩一分南星牛膽制七兩半甘草爁十兩柴石英研飛麝香研龍腦研各五兩牙硝枯過研細寒水石粉煅石膏細研各二十兩上為末煉蜜為丸每兩作三十丸每服一丸溫薄荷人參湯嚼下食後服小兒常服半丸治急驚一丸並用薄荷水化下抱龍丸治風壅痰實頭目昏眩胸膈煩悶心神不寧恍惚驚悸痰涎壅塞及治中暑煩渴陽毒狂躁雄黃研飛四兩白石英研飛生犀角麝香研硃砂研飛各一兩藿香葉二兩天南星牛膽制十六兩牛黃研半兩阿膠碎炒如珠三兩金箔研銀箔研各五十片上件為細末入研者藥令勻用溫湯搜和為丸如雞頭實大每服一丸用新汲水化破入鹽少許服食後甘露丸治大人小兒風壅痰熱心膈煩躁夜臥不安譫語狂妄目赤鼻衄口燥咽乾療中暑解熱毒鉛白霜龍腦各三分牙硝枯過三兩甘草炙一兩寒水石粉三十二兩上為細末用糯米糊丸如彈子大每服用生薑蜜水磨下半丸新汲水亦得小兒一丸分五服食後紹興續添方甘露飲治丈夫婦人小兒胃中客熱牙宣口氣齒齦腫爛時出膿血目瞼垂重常欲合閉或即飢煩不欲飲食及赤目腫痛不任涼藥口舌生瘡咽喉腫痛瘡疹已發未發皆可服之又療脾胃受濕瘀熱在裡或醉飽房勞濕熱相搏致生疸病身面皆黃肢體微腫胸滿氣短大便不調小便黃澀或時身熱並皆治之枇杷葉刷去毛干熟地黃去土天門冬去心焙枳殼去瓤麩炒山茵陳去梗生乾地黃麥門冬去心焙石斛去蘆甘草炙黃芩上等分為末每服二錢水一盞煎至七分去滓溫服食後臨臥小兒一服分兩服仍量歲數加減與之桂苓丸消暑丸治證並方見傷寒中暑類寶慶新增方五淋散治腎氣不足膀胱有熱水道不通淋瀝不宣出少起多臍腹急痛蓄作有時勞倦即發或尿如豆汁或如砂石或冷淋如膏或熱淋便血並皆治之又方見後赤茯苓六兩當歸去蘆甘草生用各五兩赤芍藥去蘆銼山梔子仁各二十兩上為細末每服二錢水一盞煎至八分空心食前服消毒麻仁丸治諸般風氣上壅久積熱毒痰涎結實胸膈不利頭旋目運或因酒面炙爆毒食所傷停留心肺浸漬腸胃蘊蓄不散久則內鬱血熱腸風五痔外則發瘡瘍癰疽赤斑遊腫渾身燥悶面上皶赤口乾舌裂咽喉澀痛消中引飲或傷寒時疫口鼻出血煩躁者及風毒下注瘡腫疼痛腳氣衝心悶亂一切風熱毒氣並皆主之杏仁生去皮尖二兩大黃生五兩山梔子仁十兩上三味煉蜜為丸每服三十丸至五十丸夜臥溫湯吞下利下赤毒膠涎為效服時隨意加減此藥甚穩善不損臟腑常服搜風順氣解毒治小兒驚熱以蜜湯化下三五丸極效淳祐新添方導赤散治大人小兒心經內虛邪熱相乘煩躁悶亂傳流下經小便赤澀淋澀臍下滿痛生乾地黃木通甘草生各等分上㕮咀每服三錢水一盞竹葉少許同煎至六分去滓溫服不拘時服吳直閣增諸家名方三黃丸治丈夫婦人三焦積熱上焦有熱攻衝眼目赤腫頭項腫痛口舌生瘡中焦有熱心膈煩躁不美飲食下焦有熱小便赤澀大便秘結五臟俱熱即生疽癤瘡痍及治五般痔疾糞門腫痛或下鮮血黃連去須蘆黃芩去蘆大黃煨各十兩上為細末煉蜜為丸如梧桐子大每服三十丸用熱水吞下如臟腑壅實加服丸數小兒積熱亦宜服之消毒犀角飲治大人小兒內蘊邪熱咽膈不利痰涎壅嗽眼赤瞼腫腮項結核癰腫毒聚遍身風疹癉毒赤瘰及瘡疹已出未出不能快透並皆治療小兒疹痘欲出已出熱未解急進此藥三四服快透消毒應手神效防風去苗八兩荊芥穗甘草炙各一十六兩鼠黏子炒六十四兩上為粗末每服三錢水一盞煎至七分去滓食後溫溫服之續添諸局經驗秘方碧雪治一切積熱咽喉腫痛口舌生瘡心中煩躁咽物妨悶或喉閉壅塞水漿不下天行時疫發狂昏憒並皆治之芒硝青黛石膏煅過研飛寒水石研飛朴硝硝石甘草馬牙硝各等分上將甘草煎湯二升去滓卻入諸藥再煎用柳木篦不住手攪令消熔得所卻入青黛和勻傾入砂盆內候冷結凝成霜研為細末每用少許含化咽津不拘時候如喉閉壅塞不能咽物者即用小竹筒吹藥入喉中頻用神效勝冰丹治三焦壅盛上衝頭目赤熱疼痛口舌生瘡咽喉不利咽物有礙神思昏悶並皆治之白藥子一兩半山豆根紅內消黃藥子甘草炙黃連各二兩麝香研龍腦研各二錢上為末用建盞盛於飯上蒸候冷入腦麝令勻煉蜜丸如雞頭大每一丸含化又用津唾於指甲上磨少許點赤眼立效導赤丸治心腎凝滯膀胱有熱小便不通風熱相搏淋瀝不宣或服補藥過多水道蹇澀出少起數臍腹急痛攻注陰間或心肺壅熱面赤心忪口乾煩渴及癰腫發背血脈瘀閉服此排膿內消腫毒疏導心經邪熱應內蘊風熱五般淋疾並皆治之赤芍藥茯苓去皮滑石各四兩生乾地黃焙木通去節各半斤大黃炒十五兩山梔子仁炒一十二兩上為細末煉蜜為丸如梧桐子大每服二十丸至三十丸食後用溫熱水吞下五淋散治證與前五淋散同木通去節滑石甘草炙各六兩山梔仁炒十四兩赤芍藥茯苓去皮各半斤淡竹葉四兩山茵陳去根日乾二兩上搗羅為末每服三錢水一盞煎至八分空心服麥門冬散治丈夫婦人蘊積邪熱心胸煩悶咽乾口燥睡臥不安或大小腸不利口舌生瘡並皆治之小草去心黃連去須升麻去粗皮犀角屑甘草炙枳殼去瓤炒黃黃芩大青去根各半兩芒硝一兩麥門冬去心三分上為細末每服三錢水一盞煎至七分食後溫服真珠散治丈夫婦人五臟積熱毒氣上攻心胸煩悶口乾舌燥精神恍惚心忪悶亂坐臥不寧並宜服之栝蔞根末琥珀真珠粉寒水石煅醋淬研鐵粉硃砂研飛甘草末生川大黃牙硝枯研上等分各搗為末拌勻每服一錢以竹葉湯溫調下不拘時靈液丹治一切風熱臟腑積熱毒氣上攻胸膈煩躁口舌乾澀心神壅悶咽嗌不利飲食無味並皆治之烏梅