body:
  text: 卷上敕授太醫助教前差充四川總領所檢察惠民局許洪編論處方法夫處方療疾當先診知病源察其盈虛而行補瀉辨土地寒暑觀男女盛衰深明草石甘辛細委君臣冷熱或正經自病或外邪所傷或在陰在陽或在表在裡當須審其形候各異虛實不同尋彼邪由知疾所起表實則瀉表裡實則瀉里在陽則治陽在陰則治陰以五臟所納之藥於四時所用之宜加減得中利汗無誤則病無不瘥矣若不洞明損益率自胸襟畏忌不分反惡同用或病在表而卻瀉里病在裡而卻宣表在陰則瀉陽在陽則瀉陰不能曉了自昧端由病既不瘳遂傷患者深可戒也故為醫者必須澄心用意窮幽造微審疾狀之深淺明藥性之緊緩制方有據與病相扶要妙之端其在於此凡療諸病當先以湯蕩除五臟六腑開通諸脈理順陰陽令中破邪潤澤枯朽悅人皮膚益人氣力水能淨萬物故用湯也若四肢病久風冷發動次當用散散能逐邪風氣濕痹表裡移走居無常處散當平之次當用丸丸藥者能逐風冷破積聚消諸堅症進美飲食調和榮衛能參和而行之者可謂上工故曰醫者意也大抵養命之藥則多君養性之藥則多臣療病之藥則多使審而用之則百不失一矣夫療寒以熱藥療熱以寒藥飲食不消以吐下藥鬼疰蠱毒以蠱毒藥癰腫瘡瘤以瘡瘤藥風濕以風濕藥各隨其宜雷公云藥有三品病有三階藥有甘苦輕重不同病有新久寒溫亦異夫重熱膩酸咸藥石並飲食等於風病為治余病非對輕冷甘苦澀藥草石飲食等於熱病為治余病非對輕熱辛苦淡藥飲食等於冷病為治余病非對其大綱略顯其源流其餘睹其病狀可知臨事制宜當識斯要矣論合和法凡合和湯藥務在精專甄別新陳辨明州土修制合度分兩無差用得其宜病無不愈若真假非類冷熱相乖草石昧其甘辛炮炙失其體性篩羅粗惡分劑差殊雖有療病之名永無必愈之效是以醫者必須殷勤注意再四留心不得委以他人令其修合非但多少不等兼以失本方意搗和之後妍醜難明衆口嘗之衆鼻嗅之精氣一切都盡而將療病固難得效此蓋是合和之盈虛不得咎醫方之淺拙宜加審察又古方藥味多以銖兩及用水皆言升數年代綿歷浸遠傳寫轉見乖訛或分兩少而水數多或水數多而分兩少輕重不等器量全殊若不別其精粗何以明其取捨今則加減合度分兩得中削舊方之參差合今時之行用其方中凡言分者即二錢半為一分也凡言兩者即四分為一兩也凡言斤者即十六兩為一斤也凡言等分者非分兩之分即諸藥斤兩多少皆同為等分也凡煮湯云用水大盞者約一升也一中盞者約五合也一小鐘者約三合也務從簡易庶免參差俾修合煎調臨病濟急不更冗繁易為曉了也凡草有根莖枝葉皮骨花實諸蟲有毛翅皮甲頭足尾骨之屬有須燒炮炙生熟有定一如其法順方者福逆方者殃或須肉去皮或須皮去肉或鬚根莖或須花實依方揀煉事褫理削極令淨潔然後稱定分兩勿得參差藥有相生相殺氣力有強有弱君臣相使若不廣通諸經則不知有好有惡或醫自以意加減不依方分兩使諸藥石強弱相欺入人腹中不能治病更相攻擊草石相反使人迷亂力甚刀劍若調和得意雖未能去病猶得安和五臟於病無所增劇也凡煮湯當以井花水極令淨潔其水數多少不得參差常令文火小沸令藥味出煮之調和必須用意然則利湯欲生少水而多取補湯欲熟多水而少取用新布絞之服湯寧小熱即易消下若冷即令人嘔逆云分再服三服者要令勢力相及並視人之強弱病之輕重為進退增減之不必悉依方說也凡搗羅丸藥用重密絹令細於蜜中和則易熟若羅草藥為散以輕細絹於酒中調服則不泥其石藥亦用細絹羅然後研理數百過視色理和同為佳也凡湯酒中用諸石藥皆細搗羅之如粟米亦可以葛篩令調並新綿裹湯酒中同煎凡合丸散藥先細切曝燥乃搗之有各搗者有合搗者並隨方所言其潤澤藥如天門冬乾地黃之類並細切曝獨搗令遍碎更出細擘曝乾若逢陰雨亦可以微火烘之既燥小停冷乃搗之凡濕藥燥皆大耗當先增分兩須得屑乃稱之為正其湯酒中不須如此也凡漬藥酒皆須細銼用生絹盛之乃入酒密封隨寒暑日數視其濃烈便可漉出不必待服至酒盡也滓可曝燥微搗更漬飲之亦可為散服凡合膏藥初以酒或醋漬令淹浹不用多汁密復勿泄從今旦至明旦亦有止一宿者微火煎之令三上三下以泄其熱勢令藥味得出上之使匝匝沸乃下之使沸靜良久乃止寧欲小小生其中有薤白者以兩頭微焦黃為度有白芷附子者亦令小黃色也豬肪皆勿令經水臘月者彌佳絞膏以新布絞之若是可服之膏膏渣亦可酒煮飲之可摩之膏膏渣則宜以敷病上此蓋欲兼盡其藥力故也膏中用雄黃硃砂麝香乳香鉛丹之輩皆別研如粉候膏畢乃可投中以物疾攪至於凝強勿使沉聚在下不調有水銀胡粉者於膏中研令極細凡修煉神仙延年丸散皆須先淨其室燒香掃灑勿令浪語當使童子搗之務令細熟杵數可至千萬過以多為佳勿令婦女小兒喪孝産婦及痼疾六根不具之人及六畜見之皆不效也其逐急諸小湯藥則不在此例論服餌法夫藥有君臣佐使人有強弱虛實服餌之法輕重不同少長殊途強羸各異或宜補宜瀉或可湯可丸加減不失其宜藥病相投必愈若病在胸膈以上者先食而後服藥病在心腹以下者先服藥而後食病在四肢血脈者宜空腹而在旦病在骨髓者宜飽滿而在夜凡藥勢與食氣不欲相逢食氣消即進藥藥氣散而進食如此消息即得五臟安和非但藥性之多方其節適早晚復須調理今所云先食後食蓋此義也凡服湯欲得稍熱服之則易消下若冷則嘔吐不下若太熱則傷人咽喉務在用意湯必須澄清若濁則令人心悶不解中間相去如步行十里久即再服若太促者前湯未消後湯來沖必當吐逆仍問病者腹中藥消散否乃更進服凡服丸藥補者皆如梧桐子大以二十丸為始從一服漸加至四十丸為限過多亦損人云一日再服者欲得引日多時不闕藥力漸積熏蒸五臟彌久為佳不須頓服為善徒餌名藥獲益甚少也凡服浸酒藥欲得使酒氣相接無得斷絶斷絶則不得藥力多少皆隨性飲之以知為度不可令大醉至吐大損人也凡服毒藥治病先起如黍粟病去而止不去倍之不去十之取去為度今藥中單行一兩種有毒之藥只如巴豆甘遂之輩不可令至盡劑爾如經所說一味一毒服一丸如細麻二味一毒服二丸如大麻三味一毒服三丸如胡豆四味一毒服四丸如小豆五味一毒服五丸如大豆六味一毒服六丸如梧桐子以數為丸而毒中又有輕重只如狼毒鉤吻豈同附子芫花之輩耶凡此之類皆須量用也凡餌湯藥後其粥食肉菜皆須大熟大熟則易消與藥相宜若生則難消復損藥力仍須少食菜於藥為佳亦少進鹽醋乃善亦不得苦心用力及於喜怒是以療病用藥力為首若在食治將息得力太半於藥所以病者務在將息攝養之至可以長生豈止愈病而已哉論用藥法夫濟時之道莫大於醫去疾之功無先於藥人居五行四氣病生暑濕風寒藥分三品七情性有溫平冷熱凡於行用不得差殊庶欲立方便須憑據療之合理病無不痊若自昧新陳莫分真僞用之偏僻使之稀疏著以別名求於奇異未諳體性妄說功能率自胸襟深為造次是以醫不三世不服其藥斯言信有之矣豈不深思者哉又不得用土地所無貴價難市珠珍諸寶希罕所聞縱富貴而無處搜求設貧下而寡財不及或於遠邦求藥或則確執古方不能變通稽於致辨病既深矣藥何療焉繇是醫者必須捨短從長去繁就簡卷舒自有盈縮隨機斟酌其宜增減允當察病輕重用藥精微則可謂上工矣凡藥有君臣佐使以相宣攝合和宜用一君二臣三佐五使又可一君三臣九佐使也又有陰陽配合掌禹錫等按蜀本注云凡天地萬物皆有陰陽大小各有色類尋究其理並有法象故毛羽之類皆生於陽而屬於陰鱗介之類皆生於陰而屬於陽所以空青法木故色青而主肝丹砂法火故色赤而主心雲母法金故色白而主肺雌黃法土故色黃而主脾磁石法水故色黑而主腎余皆以此推之倒可知也子母兄弟掌禹錫等按蜀本注云若榆皮為母厚朴為子之類是也根莖花實草木骨肉又有單行者有相須者有相使者有相畏者有相惡者有相反者有相殺者凡此七情合和之時留意視之當用相須相使者良勿用相惡相反者若有毒者宜制可用相畏相殺者不爾勿合用也掌禹錫等謹按蜀本注云凡三百六十五種有單行者七十一種相須者十二種相使者九十種相畏者七十八種相惡者六十種相反者十八種相殺者三十六種凡此七情合和視之又有酸鹹甘苦辛五味又有寒熱溫涼四氣又有有毒無毒陰乾曝乾採造時月生熟土地所出真僞新陳並各有法也凡採藥時月皆是建寅歲首則從漢太初後所記也其根物多以二月八月採者謂春初津潤始萌未沖枝葉勢力淳濃故也至秋枝葉乾枯津潤歸流於下今即事驗之春寧宜早秋寧宜晚華實莖葉乃各隨其成熟爾歲月亦有早晏不必都依本文也凡本草說陰乾者謂就六甲陰中干之又依遁甲法甲子旬陰中在癸酉以藥著酉地也實謂不必然正是不露日暴於陰影處干之爾所以亦有云曝乾故也今按本草採藥陰乾者皆多惡至如鹿茸經稱陰乾皆悉爛令壞今火干易得且良草木根苗陰之皆惡九月以前採者悉宜日乾十月以後採者陰乾乃好若幸可而用益當為善論三品藥畏惡相反尋萬物之性皆有離合虎嘯風生龍吟云起磁石引針琥珀拾芥漆得蟹而散麻得漆而湧桂得蔥而軟樹得桂而枯戎鹽纍卵獺膽分杯其氣爽有相關感多如此類其理不可得而思之至於諸藥尤能遞為利害先聖既明有所說何可不詳而避之時人為方皆多漏略若舊方已有此病亦應改除假如兩種相當就其輕重擇而除之傷寒赤散吾常不用藜蘆斷下黃連丸亦去其乾薑而施之無不效何忽強以相憎苟令共事乎相反為害深於相惡相惡者謂彼雖惡我我無忿心猶如牛黃惡龍骨而龍骨得牛黃更良此有以制伏故也相反者則彼我交仇必不宜合今畫家用雌黃胡粉相近便自黯妒粉得黃即黑黃得粉亦變此蓋相反之證也藥理既昧所以不效人多輕之今按方處治必恐卒難尋究本草更復抄出其事在此覽略看之易可知驗而本經有直云茱萸門冬者無以辨山吳天麥之異咸宜各題其條又有亂誤處譬如海蛤之與鮀甲畏惡正同又有諸芝使薯蕷薯蕷復使紫芝計無應如此不知何者是非亦且並記當更廣驗正之又神農本經相使正各一種兼以藥對參之乃有兩三於事亦無嫌其有云相得共療其病者既非妨避之禁不復疏出上藥一百二十種為君主養命以應天無毒多服久服不傷人欲輕身益氣不老延年者其上品藥性亦皆能遣疾但其勢大和厚不為倉卒之效然而歲月常服必獲大益病既愈矣命亦兼申天道仁育故云應天一百二十種者當謂寅卯辰巳之月法萬物生榮時也中藥一百二十種為臣主養性以應人無毒有毒斟酌其宜欲遏病補虛羸者其中品藥性療病之辭漸深輕身之說稍薄於服之者祛患當速而延齡為緩人懷性情故云應人一百二十種者當謂午未申酉之月法萬物成熟時也下藥一百二十五種為佐使主治病以應地多毒不可久服欲除寒熱邪氣破積聚愈疾者其下品藥性專主攻擊毒烈之氣傾損中和不可常服疾愈即止地體收殺故云應地一百二十五種者當謂戌亥子醜之月法萬物枯壯時也兼以閏之盈數加之神農本經三品合三百六十五種法三百六十五度一度應一日以成一歲也今所舉其綱目以明藥之品數其本草中唐之所附名醫嘗用加添之藥不在此例也論服藥食忌有術勿食桃李及雀肉胡荽大蒜青魚鮓等物有黎蘆勿食貍肉有巴豆勿食蘆筍羹及野豬肉有黃連桔梗勿食豬肉有半夏菖蒲勿食飴糖及羊肉有地黃勿食蕪荑有細辛勿食生菜有天門冬勿食鯉魚有甘草勿食菘菜及海藻有牡丹勿食生胡荽有商陸勿食犬肉有常山勿食生蔥生菜有空青硃砂勿食生血物有茯苓勿食醋物有鱉甲勿食莧菜服藥不可多食生胡荽及蒜雜生菜又不可食諸滑物果實等又不可多食肥豬犬肉油膩肥羹魚膾腥臊物服藥通忌見死尸及産婦淹穢物論炮炙三品藥石類例玉石部丹砂雄黃雌黃凡使先打碎研細水飛過灰碗內鋪紙滲干始入藥用如別有煅煉各依本方石鐘乳凡使先依法煮候日數足入水細研不滲方可入藥服食白礬凡使用光明者先於鐵銚子內或刀上火中煅過方研細入藥用如生用者各依本方赤石脂白石脂凡使須於炭火中煅通赤取出放冷研細水飛過方入藥用如緩急則研令極細不飛亦得硫黃凡使先細研水飛過方入藥用如別煅煉各依本方陽起石凡使先以炭火燒通赤好酒內淬七遍如只以好酒煮半日亦得並研細水飛過方入藥用磁石凡使先以炭火燒通赤釅醋內淬九遍搗碎羅過細研水飛方入藥用如入湯劑即杵水淘去赤汁使黑鉛凡使先以鐵銚炭火熔開取出瀉於新瓦上濾去渣腳如此一兩番取淨鉛稱用如或結砂子各依本方煅煉黃丹凡使先炒令色變研令極細再羅過方入藥用硝石凡使先研令極細以瓷瓶子盛於炭火中煅令通赤方入藥用如緩急只炒過研細使亦得食鹽凡使先須炒過研細方入藥用石灰凡使須用風化為末者佳先以醋浸一宿漉出候乾用火煅令腥穢氣盡候冷研細方入藥用如別煅煉各依本方伏龍肝即灶中對釜月下土也凡使先火燒赤研細水飛過方入藥用如急用只燒過研使亦得百草霜村莊者良凡使須研令極細再羅過方入藥用滑石凡使先以刀刮下以牡丹皮同煮一伏時取出用東流水研飛過日中曬乾方入藥用如急用只研細亦得禹餘糧紫石英石膏寒水石代赭石燕等凡使並用火煅醋淬七遍搗研水飛令極細方入藥用太陰玄精石凡使用搗碎細研水飛過曬乾方入藥用白堊即白善土也凡使每修事一兩用鹽一分投於鬥水中用銅器中煮十餘沸然後用此沸了水飛過方入藥用免結澀人腸也自然銅凡使用火燒令通赤以醋淬九遍細研羅過用花蕊石凡使當以大火煅過如緩急不煅亦得草部菖蒲用石上生節密者佳凡使須銼碎微炒用或只焙乾亦得菊花凡使須去枝梗焙乾方入藥用人參凡使先去蘆頭銼焙乾稱方入藥用不去蘆令人吐慎之天門冬麥門冬凡使先以湯微潤抽去心焙乾稱用甘草用大者凡使先破開火上微炙黃赤色方入藥用如稍只爁炒亦得或生用亦依本方熟乾地黃凡使用須淨洗過以酒浸一日夜漉出蒸三兩炊焙乾方入藥用如急用只以酒灑蒸過使不蒸亦得不若酒浸蒸過為佳生乾者只生用不用酒浸蒼朮凡使先以米泔浸春五夏三秋七冬十逐日換水日足刮去皮焙乾方入藥用如緩急不浸亦得但稍燥爾菟絲子凡使先以水洗澄汰去沙土了卻以好酒浸一晝夜漉出蒸過乘熱杵為粗末焙乾然後入藥同搗搗之不盡者更以漬經三五日乃出更曬微干搗之須臾悉盡熱即易碎川牛膝凡使先洗去蘆頭銼碎以酒浸一日夜焙乾方用如急切用酒浸蒸過使不蒸亦得柴胡前胡等凡使先去蘆頭洗銼焙乾方入藥用白朮獨活羌活等凡使須銼焙乾方入藥用車前子凡使須微炒燥方入藥用如只焙乾亦得木香凡使不見火須細銼日乾用如為細末薄切微火焙乾使亦不妨然不若曬乾之為妙也山藥川芎等凡使須銼碎焙乾用薏苡仁凡使須以糯米同炒乾用遠志凡使先須去心焙乾方入藥用如不去心令人煩悶更能以甘草湯浸一宿漉出焙乾用尤妙草龍膽凡使先去蘆銼碎用甘草浸一宿漉出曝乾用如緩急不浸亦得澤瀉凡使用酒浸一宿漉出焙乾用不浸亦得或有炮製各依本方石斛凡使先洗去根土用酒浸一宿漉出蒸過曝乾方入藥用如急用不蒸亦得如別有炮製各依本方巴戟天凡使先去心以酒浸一晝夜銼焙乾使如急用不浸亦得黃連凡使先淨去須銼碎用蜜拌慢火炒乾方入藥用蒺藜子凡使須淨揀擇蒸一伏時曬乾於木臼中舂令刺盡用酒拌再蒸取出曝乾用黃耆凡使先須用擘開塗蜜炙微赤色卻蒲切焙乾稱方入藥用肉蓯蓉凡使先須以溫湯洗刮去上粗鱗皮切碎以酒浸一日夜漉出焙乾使如緩急要用即酒浸煮過研如膏或焙乾使亦得防風凡使先須去蘆及叉頭叉尾者洗銼焙乾方入藥用叉頭者令人發狂叉尾者令人發痼疾切宜慎之蒲黃即是蒲上黃花須仔細認勿誤用松黃凡使須用隔三重紙焙令色黃蒸半日卻焙令乾用之妙破血消腫即生使補血止血即炒用之續斷凡使先銼碎用酒浸一伏時漉出焙乾方入藥用如急用不浸亦得細辛凡使先去土並苗焙乾方入藥用五味子凡使先須淨揀去枝杖方用如入湯劑用捶碎使之蛇床子凡使先須慢火微炒過方入藥用山茵陳凡使先須去根土細銼焙乾方入藥用勿令犯火王不留行凡使須先渾蒸一伏時卻下漿水浸一宿至明漉出焙乾方入藥用乾薑凡使先須炮令裂方可入藥用苦參凡使不拘多少先須用濃糯米泔浸一宿漉出蒸一伏時卻細切焙乾用之為妙當歸凡使先須去塵並蘆頭尖硬處一分以來用酒浸一宿漉出焙乾方用或微炒用各依本方若要補血即使頭一節若要止痛破血即用尾若一時用不如不使服食無效也麻黃凡使先去根節寸銼令理通別煮十數沸掠去其沫卻取出碎銼過焙乾用不盡去之令人煩悶如用急只去根節亦得木通凡使先須銼去節方入藥用芍藥凡使須銼碎焙乾方可入藥用蘧麥凡使只用蕊殼不用莖葉若一時使即令人氣咽及小便不禁仙靈脾凡使用羊脂拌炒過候羊脂盡為度每修事一斤用羊脂四兩黃芩凡使先須銼碎微炒過方入藥用狗脊凡使先以猛火燎去毛令淨以酒浸一宿蒸過焙乾用如緩急不酒浸亦得紫菀凡使先須淨洗去土微炒過方入藥用石葦凡使先以粗布拭去黃毛用羊脂炒乾方入藥如緩急微炙過使亦得萆薢凡使先須淨洗以酒浸一日夜焙乾使為妙如緩急不在此限白薇凡使先去苗用糯米泔浸一宿漉出蒸過用艾葉凡使先去枝梗杵成茸以稀糯米粥拌勻焙乾用或慢火炒使恐難搗牛蒡子凡使要淨揀勿令有雜子然後用酒拌蒸一伏時取出焙乾別搗如粉方入藥用天麻凡使先以紙包浸濕於熱灰中煨熟取出以酒浸一宿卻焙乾入藥用阿魏凡使先於淨鉢中研如粉了卻於熱酒器上滾過任入藥用高良薑凡使先銼碎以麻油少許拌勻炒過用百部根凡使用竹刀劈開去心酒浸一宿漉出細銼焙乾用茴香凡使用舶上者淘洗令淨卻以酒浸一宿漉出曝乾炒過用如緩急只炒過用亦得牡丹皮凡使須淨揀酒拌蒸細銼曬乾方入藥用京三稜蓬莪朮凡使先以醋煮銼碎焙乾用或火煻灰中炮熟用亦得補骨脂性本大燥毒熱凡使用酒浸一宿漉出卻用東流水浸三日夜再蒸過曝乾入藥用如緩急只以鹽同炒令香去鹽用亦得縮砂凡使先和皮慢火炒令熱透去皮取仁入藥用附子天雄等凡使先炮裂令熟去皮臍焙乾方入藥烏頭凡使先炮裂令熟去皮臍尖切片焙乾用亦得肉豆蔻凡使先以麵裹於煻灰中炮以面熟為度去面銼焙乾用半夏凡使先以沸湯浸候溫洗去滑如此七遍方用如入湯劑切片完用或尚戟人咽喉可杵為末以生薑等分搗研和為劑淹一宿捏作餅子焙乾使如更杵為末再以姜和劑淹之焙乾尤佳此用合湯妙大黃凡使或蒸過用若煻灰中炮熟用或取猛利即生焙乾用旋覆花一名金沸草凡使須蒸過入藥用緩急不蒸亦得常山凡使銼碎酒浸一晝夜蒸過方入藥用天南星白附子凡使於熱灰中炮裂方入藥用或別有制度各依本方馬兜鈴凡使須微炙過方入藥用骨碎補凡使用刀刮去上黃皮毛令盡細銼用酒拌蒸一日取出曬乾用緩急只焙乾不蒸亦得葫蘆巴凡使微炒過入藥用使君子凡使先於熱灰中和皮炮卻去皮取仁焙乾入藥用桔梗大戟延胡索葶藶子牽牛子等並微炒過方入藥用川芎白芷並銼碎焙乾方入藥用木部肉桂凡使不見火先去粗皮令見心中有味處銼方入藥用如婦人妊娠藥中仍微炒用為妙茯苓豬苓凡使須先去黑皮銼碎焙乾用茯神凡使先去粗皮並中心所抱木銼碎焙乾入藥用酸棗仁凡使先以慢火炒令十分香熟方研破用黃柏凡使先去粗皮蜜塗炙方入藥用乾漆凡使須搗碎炒熟入藥用不爾損人腸胃蔓荊實凡使用酒浸蒸一伏時取出焙乾用杜仲凡使先去上粗皮令淨以生薑汁塗炙令香熟令無絲為度或只銼碎以薑汁拌炒令絲絶亦得沉香檀香凡使先別銼碎搗羅為細末方入藥用桑白皮凡使先銼碎微炒過方入藥用吳茱萸凡使先以沸湯浸洗七次焙乾微炒過方入藥用若治外病不入口者不洗亦得檳榔凡使須取存坐端正堅實者先以刀刮去底細切勿經火恐無力效若熟使不如不用梔子凡使先去皮鬚子用甘草水浸一宿濾出焙乾入藥用枳實枳殼凡使要陳者先以湯浸磨去瓤焙乾以麩炒焦候香熟為度厚朴凡使先刮去粗皮令見赤心以生薑汁炙三次取令香熟為度或只銼碎使薑汁炒亦得山茱萸凡使先用搗碎焙乾用或只和核使亦得大腹皮凡使先須以酒洗再以大豆汁洗過銼碎焙乾方可用巴豆凡使先去殼並心膜爛搗以紙裹壓去油取霜入藥用又一法去殼心膜了以水煮五度換水各煮一沸研不爾令人悶蜀椒凡使先去枝梗並目及閉口者微炒過隔紙鋪在地上以盞蓋令出汗方入藥用皂莢凡使要揀肥長大不蛀者削去皮弦並子塗酥炙令焦黃方入藥用訶黎勒凡使先於煻灰中炮去核取肉酒浸蒸一伏時取出焙乾方入藥用楝實凡使先以酒浸潤俟上皮核剝去虛皮焙乾以麵炒入木臼內杵為粗末羅過去核方入藥用蕪荑凡使先須微炒過方可用龍腦麒麟竭乳香松脂等凡使並須別研令極細方可入藥用獸部龍骨凡使要黏舌者先以酒浸一宿焙乾細搗羅研如粉了以水飛過三度日中曬乾用之如緩急只以酒煮焙乾用亦得他有炮製各依本方麝香牛黃凡使先須別研令細然後入藥用之阿膠及諸膠凡使先搗碎炒候沸燥如珠子方可入藥用鹿茸凡使用茄茸連頂骨者先燎去毛令淨約三寸以來截斷酒浸一日慢火炙令脆方用或用酥塗炙各依本方炮製虎骨凡使先斫開取出內中髓卻塗酒及酥等反復炙令黃赤色方用膃肭臍凡使先用酒浸慢火反復炙令熟方入藥用禽魚蟲部夜明砂即伏翼屎也凡使須微炒過方入藥用白蜜凡使先以火煎掠去沫令色微黃則經久不壞掠之多少隨蜜精粗牡蠣凡使用火煅令通赤候冷細研如粉方可用珍珠凡使要取新淨未曾傷破及鑽透者於臼中搗令細絹羅重重篩過卻更研一二萬下了任用之桑螵蛸凡使先用炙過或蒸過亦得鱉甲龜甲凡使先用醋浸三日去裙慢火中反復炙令黃赤色為度如急用只蘸醋炙候黃色便可用露蜂房凡使先炙過方可用或炒亦得蟬蛻凡使先去嘴足湯浸潤洗去泥土卻曝乾微炒過任用之白殭蠶凡使要白色條直者先去絲嘴微炒過方用或有隻生用者各依本方原蠶蛾凡使去翅足微炒過方入藥用蠶砂亦用炒蝦蟆凡使先以酥塗或酒浸慢火中反復炙令焦黃為度或燒灰存性用他有炮製各依本方蛇蛻凡使先須炙過方可用或燒成灰入藥用各依本方炮製烏蛇白花蛇凡使先以酒浸三日夜慢火上反復炙令黃赤乾燥去皮骨取肉入藥用地龍凡使先搓去土微炒過方用蜈蚣凡使先要炙過方可入藥用斑蝥凡使先去足翼用糯米同炒熟方可入藥用生即吐瀉人天漿子凡使須微炒過用之蜣螂凡使先去頭翅足炙過用之五靈脂凡使先以酒研飛煉淘去沙石曬乾方入藥用果菜部草豆蔻凡使須去皮取仁焙乾用或只和皮煻灰中炮熟去皮用亦得陳皮青皮凡使先以湯浸磨去瓤曝乾麩炒入藥用或急用只焙乾亦得烏梅凡使先洗捶去核取肉微炒過用之木瓜凡使先去瓤並硬子銼碎焙乾入藥用杏仁桃仁凡使先以湯浸去皮尖及雙仁者控干用麵炒令黃赤色為度胡桃凡使去殼以湯浸去皮卻研入藥用之韭子凡使先須微炒過用之亦有生用者胡麻即黑油麻也凡使先炒過用或九蒸九曝用亦得黑豆赤小豆大豆黃卷麥糵神麯白扁豆緑豆等凡使並用炒過方入藥用凡有修合依法炮製分兩無虧勝也
