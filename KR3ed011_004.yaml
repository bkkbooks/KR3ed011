body:
  text: 卷之四治痰飲附咳嗽倍術丸治五飲酒癖一曰留飲停水在心下二曰澼飲水澼在兩脅下三曰痰飲水在胃中四曰溢飲水溢在膈上五臟間五曰流飲水在腸間動搖有聲皆因飲酒冒寒或飲水過多所致此藥並治之乾薑炮肉桂去粗皮各半斤白朮一斤上三味搗篩蜜和丸如梧桐子大每服二十丸溫米飲下加至三十丸食前服日二服消飲丸療酒癖停飲痰水不消滿逆嘔吐目暗耳聾脅下急痛腹中水聲枳實麩炒半兩茯苓去皮乾薑炮各三兩白朮八兩上同為細末煉蜜和丸如梧桐子大每服五十丸溫米飲下不計時候化痰玉壺丸治風痰吐逆頭痛目眩胸膈煩滿飲食不下及咳嗽痰盛嘔吐涎沫天南星生半夏生各一兩天麻半兩頭白麵三兩上為細末滴水為丸如梧桐子大每服三十丸用水一大盞先煎令沸下藥煮五七沸候藥浮即熟漉出放溫別用生薑湯下不計時候服辰砂化痰丸治風化痰安神定志利咽膈清頭目止咳嗽除煩悶白礬枯過別研辰砂飛研各半兩南星炮一兩半夏洗七次薑汁搗作曲三兩上以白礬半夏曲天南星為末合和勻用生薑汁煮麵糊丸如梧桐子大別用硃砂末為衣每服十丸生薑湯下食後服亦治小兒風壅痰嗽一歲兒服一丸捶碎用生薑薄荷湯下金珠化痰丸治痰熱安神志除頭痛眩運心忪恍惚胸膈煩悶涕唾稠黏痰實咳嗽咽嗌不利皂莢仁炒天竺黃白礬光明者放石鐵器內熬汁盡放冷研鉛白霜細研各一兩半夏湯洗七次用生薑二兩洗刮去皮同搗細作餅子炙微黃色四兩生白龍腦細研半兩辰砂研飛二兩金箔為衣二十片上以半夏皂莢子仁為末與諸藥同拌研勻生薑汁煮麵為糊為丸如梧桐子大每十丸至十五丸生薑湯下食後臨臥服玉液丸治風壅化痰涎利咽膈清頭目除咳嗽止煩熱寒水石燒令赤出大毒水飛過三十兩白礬枯過研細半夏湯洗七次為細末各十兩上合研以白麵糊為丸如梧桐子大每服十丸溫生薑湯下食後臨臥服每服三十丸亦得玉芝丸治風壅痰實頭目昏眩咳嗽煩滿咽膈不利嘔吐噁心神志昏憒心忪面熱痰唾稠黏人參去蘆干薄荷葉白茯苓去皮白礬枯過南星米泔浸一伏時焙乾各三十兩半夏湯洗七次為末生薑汁搗和作曲六十兩上為末用生薑汁煮麵糊和丸如梧桐子大每服二十丸生薑湯下食後如痰盛燥熱薄荷湯下桔梗湯除痰下氣治胸脅脹滿寒熱嘔噦心下堅痞短氣煩悶痰逆噁心飲食不下桔梗細銼微炒半夏湯洗七次薑汁製陳皮去瓤各十兩枳實麩炒赤黃五兩上為粗末每服二錢水一中盞入生薑五片同煎至七分去滓溫服不計時候胡椒理中丸治肺胃虛寒氣不宣通咳嗽喘急逆氣虛痞胸膈噎悶腹脅滿痛迫塞短氣不能飲食嘔吐痰水不止款冬花去梗胡椒甘草炙蓽茇良薑細辛去苗陳皮去白乾薑各四兩白朮五兩上為細末煉蜜丸如梧桐子大每服三十丸至五十丸溫湯下溫酒米飲亦得不拘時候日二服備急五嗽丸治五種咳嗽一曰上氣嗽二曰飲嗽三曰鱢嗽四曰冷嗽五曰邪嗽皆由肺受風寒氣不宣通所致無問久新輕重以至食飲不下語聲不出坐臥不安晝夜不止面目浮腫胸脅引痛並宜服之肉桂去粗皮乾薑炮皂莢去皮子炙黃各等分上為細末煉蜜為丸如梧桐子大每服十五丸溫酒下米飲亦得食後服大阿膠丸治肺虛客熱咳嗽氣急胸中煩悸肢體倦疼咽乾口燥渴欲飲冷多吐涎沫或有鮮血肌瘦發熱減食嗜臥又治或因叫怒或即房勞肺胃致傷吐血嘔血並宜服之麥門冬去心丹參貝母炒防風去蘆叉頭柏子仁茯神去木杜仲去粗皮炒百部根各半兩乾山藥阿膠炒茯苓去皮熟乾地黃五味子各一兩遠志去心人參各一分上為細末煉蜜和丸每兩作二十四丸每服一丸水一中盞煎至六分和滓溫服少少頻呷不拘時候百部丸治肺氣不調咳嗽喘急胸膈煩悶唇乾口燥面目浮腫咽嗌不利積久不瘥咯唾膿血者亦宜服之天門冬去心一斤杏仁去皮尖炒黃耆百部根各六兩栝蔞根十六兩紫蘇紫菀去苗洗馬兜鈴各二十二兩黑參八兩肉桂去粗皮四兩上同為細末煉蜜和丸如梧桐子大每服十五丸煎烏梅甘草湯溫下食後服款冬花散治寒壅相交肺氣不利咳嗽喘滿胸膈煩悶痰實涎盛喉中呀呷鼻塞清涕頭痛眩冒肢體倦疼咽嗌腫痛款冬花去梗知母桑葉洗焙各十兩半夏湯洗七遍薑汁製甘草爁各二十兩麻黃去根節四十兩阿膠碎炒如珠子杏仁去皮尖麩炒貝母去心麩炒各二十兩上為粗末每服二錢水一盞入生薑三片同煎至七分去滓食後溫服鍾乳補肺湯治肺氣不足咳嗽上氣胸滿上迫喉咽閉塞短氣喘乏連唾不已寒從背起口中如含霜雪語無音聲甚者唾血腥臭乾嘔心煩耳聞風雨聲皮毛瘁面色白鍾乳碎如米粒桑白皮麥門冬去心各三兩白石英碎如米粒人參去蘆五味子揀款冬花去梗肉桂去粗皮紫菀洗去土各二兩上除白石英鍾乳外同為粗末與白石英等同拌令勻每服四錢水二盞入生薑五片大棗一枚擘破粳米三十餘粒同煎至一盞用綿濾去滓溫服食後華蓋散治肺感寒邪咳嗽上氣胸膈煩滿項背拘急聲重鼻塞頭昏目眩痰氣不利呀呷有聲紫蘇子炒赤茯苓去皮桑白皮炙陳皮去白杏仁去皮尖炒麻黃去根節各一兩甘草炙半兩上七味為末每服二錢水一盞煎至七分去滓溫服食後丁香半夏丸治脾胃宿冷胸膈停痰嘔吐噁心吞酸噫醋心腹痞滿脅肋刺痛短氣噎悶不思飲食肉豆蔻仁木香丁香人參陳皮去白各一分藿香葉半兩半夏湯浸七次薑汁炒三兩上為細末以生薑汁煮麵糊為丸如小豆大每服二十丸生薑湯下不計時候藿香散溫脾胃化痰飲消宿冷止嘔吐治胸膈痞滿腹脅脹痛短氣噎悶咳嘔痰水噎醋吞酸噦逆噁心及治山嵐瘴氣厚朴去粗皮薑汁炙甘草炙半夏切作四片薑汁浸一宿以粟炒黃藿香葉各一兩陳皮去白半兩上為粗散每服二錢水一盞入生薑三片棗一枚同煎七分去滓熱服不計時候日二三服紹興續添方二陳湯治痰飲為患或嘔吐噁心或頭眩心悸或中脘不快或發為寒熱或因食生冷脾胃不和半夏湯洗七次橘紅各五兩白茯苓三兩甘草炙一兩半上為㕮咀每服四錢用水一錢生薑七片烏梅一個同煎六分去滓熱服不拘時候溫肺湯治肺虛久咳寒飲發則喘咳不能坐臥嘔吐痰沫不思飲食白芍藥六兩五味子去梗炒乾薑炮肉桂去粗皮半夏煮熟焙陳皮去白杏仁甘草炒各三兩細辛去蘆洗二兩上件銼粗散每服三大錢水一盞半煎至八分以絹挒汁食後服兩服滓再煎一服一方去白芍藥細辛二味可加減用寶慶新增方麻黃散治丈夫婦人久近肺氣咳嗽喘急上衝坐臥不安痰涎壅塞咳唾稠黏腳手冷痹心脅疼脹兼治傷風咳喘膈上不快訶子皮去核款冬花去蘆枝梗甘草爁各五兩麻黃去根節一十兩肉桂六兩去皮不見火杏仁去皮尖麩炒三兩上為細末每服二錢水一盞入好茶一錢同煎八分食後夜臥通口服如半夜不能煎但以藥末入茶和勻沸湯點或乾嚥亦得忌魚酒炙爆豬肉腥臊物人參養肺丸治肺胃俱傷氣奔於上咳熱熏肺咳嗽氣急胸中煩悸涕唾稠黏或有鮮血上氣喘急不得安臥肢體倦痛咽乾口燥飲食減少漸至瘦弱喘乏或墜墮恐懼渡水跌臥或因叫怒醉飽房勞致傷肺胃吐血嘔血並皆治之黃耆去蘆蜜塗炙人參各一兩八錢白茯苓去皮栝蔞根各六兩杏仁去皮尖麩炒二兩四錢皂角子炒三百個半夏洗為末薑汁作曲四兩炒上為細末煉蜜丸如彈子大每服一丸食後細嚼用紫蘇湯送下如喘急用桑白皮湯下人參訶子丸治大人小兒上膈熱或傷風感冷搏於肺經語聲不出痰涎不利咳嗽喘急日夜不止咯唾稠黏縮砂仁訶子去核藿香去梗龍腦薄荷葉各一兩百藥煎葛粉各八兩甘草五兩烏梅肉三兩人參一兩二錢上為末麵糊為丸每服一二丸含化咽津食後臨臥溫中化痰丸治停痰留飲胸膈滿悶頭眩目運好臥減食咳嗽嘔吐氣短噁心或飲酒過多或引飲無度或過傷生冷痰涎並多嘔噦噁心並宜服之青皮去白良薑去蘆炒乾薑炒陳皮去白各五兩上為細末醋打麵糊丸如梧桐子大每服三五十粒湯飲任下不拘時淳祐新添方新法半夏湯治脾胃氣虛痰飲不散嘔逆酸水腹肋脹痞頭旋噁心不思飲食又方見後縮砂仁神麯炒草果仁橘紅淨洗去白各五兩白豆蔻仁丁香各半兩甘草生炙二兩大半夏四兩湯浸洗七次每個切作二片用白礬末一兩沸湯浸一晝夜漉出別用湯洗去礬俟干一片切作兩片再用生薑自然汁於銀盂中浸一晝夜卻於湯中燉令薑汁幹盡以慢火焙燥為細末再用生薑自然汁搜成餅子日乾或焙乾炙黃勿令色焦上為細末每服一錢先用生薑自然汁調成膏入炒鹽少許沸湯點服丁香五套丸治胃氣虛弱三焦痞澀不能宣行水穀故為痰飲結聚胸膈之間令人頭目昏眩胸膈脹滿咳嗽氣急嘔吐腹疼伏於中脘亦令臂疼不舉腰腿沉重久而不散流入於脾脾惡濕得水則脹脹則不能消化水穀又令腹中虛滿而不食也此藥主之南星每個切作十數塊同半夏先用水浸三日每日易水次用白礬二兩研碎調入水內再浸三日洗淨焙乾半夏切破各二兩乾薑炮白朮良薑茯苓各一兩丁香不見火木香青皮陳皮去白各半兩上為細末用神麯一兩大麥糵二兩同研取末打糊和藥為丸如梧桐子大每服五十丸至七十丸溫熟水下不拘時候常服溫脾胃去宿冷消留滯化飲食闢霧露風冷山嵐瘴癘不正非時之氣但是酒癖停飲痰水不消屢服湯藥不能作效者服之如神縮砂丸溫中散滯消飲進食治胸膈噎悶心腹冷疼大能暖化生冷果食夏月不可缺此縮砂仁一兩高良薑天南星湯洗七次焙乾各四兩上為細末生薑自然汁煮麵糊為丸如梧桐子大每服五十丸至七十丸生薑湯下不拘時候渫白丸治膈脘痰涎不利頭目昏運吐逆涎沫附子一枚六錢重者生去皮臍生硫黃別研天南星生用半夏生用各一兩盆硝玄精石各半兩上為細末入細面三兩令停水和為丸如梧桐子大每服三十丸沸湯內煮令浮漉出生薑湯送下食後破飲丸治一切停飲不散時嘔痰沫頭眩欲倒膈脘不快旋覆花八兩白朮一斤一兩肉桂去粗皮乾薑炮各六兩赤茯苓去皮七兩枳實麩炒二兩上為末麵糊丸如梧桐子大每服五十丸熟水下吳直閣增諸家名方溫中化痰丸治證與前溫中化痰丸同乾薑炮半夏煮各一兩細辛去葉洗胡椒各半兩白朮焙二兩上為細末生薑汁打麵糊為丸如梧桐子大每服三十丸至五十丸湯飲任下不拘時候養中湯治肺胃受寒咳嗽多痰胸滿短氣語聲不出晝夜不止飲食減少不以遠年日近並皆治之半夏曲炙八錢甘草爁肉桂去粗皮各半兩罌粟殼去蒂蓋蜜炙二兩半上為細末每服一大錢水一盞生薑四片同煎至七分通口服不拘時候人參款花膏治肺胃虛寒久嗽不已咽膈滿悶咳嗽痰涎嘔逆噁心腹脅脹滿腰背倦痛或虛勞冷嗽及遠年日近一切嗽病服諸藥不效者並皆治之款冬花去梗人參去蘆五味子去梗炒紫菀去蘆洗桑白皮去赤皮各一兩上為細末煉蜜為丸如雞頭大每服一丸食後細嚼淡薑湯送下或每一大丸分作四小丸含化亦得橘皮半夏湯治肺胃虛弱好食酸冷寒痰停積嘔逆噁心涎唾稠黏或積吐粥藥不下手足逆冷目眩身重又治傷寒時氣欲吐不吐欲嘔不嘔昏憒悶亂或引酒過多中寒停飲喉中涎聲乾噦不止陳皮去白半夏煮各七兩上二件銼為粗散每服三錢生薑十片水二盞煎至一中盞去滓溫服不拘時候留二服滓並作一服再煎服續添諸局經驗秘方人參潤肺丸治肺氣不足咳嗽喘急痰涎不利胸膈煩悶涕唾稠黏唇乾口燥及療風壅痰實頭目昏眩精神不爽或肺胃俱虛久嗽不已漸成虛勞肢體羸瘦胸滿短氣行動喘乏飲食減少或遠年日近諸般咳嗽並皆治之人參款冬花去梗細辛去葉洗杏仁去皮尖麩炒甘草爁各四兩知母六兩肉桂去粗皮桔梗各五兩上為細末煉蜜為丸如雞頭大每服一丸食後細嚼淡薑湯送下含化亦得定喘瑞應丹專治男子婦人久患咳嗽肺氣喘促倚息不得睡臥累年不瘥漸致面目虛浮蟬蛻洗去土足翅炒杏仁去皮尖炒馬兜鈴各二兩煅砒六錢上為細末蒸棗肉為丸如葵子大每服六七丸臨睡用蔥茶清放冷下服後忌熱物半日一本用知母六兩不用馬兜鈴人參清肺湯治肺胃虛寒咳嗽喘急胸膈噎悶腹肋脹滿迫塞短氣喜欲飲冷咽噫隱痛及療肺痿勞嗽唾血腥臭乾嘔煩熱聲音不出肌肉消瘦倦怠減食地骨皮人參去蘆阿膠麩炒杏仁去皮尖麩炒桑白皮去粗皮知母烏梅去核甘草炙罌粟殼去蒂蓋蜜炙上等分㕮咀為粗散每服三錢水一盞半烏梅棗子各一枚同煎至一盞濾去滓溫溫食後臨臥服兩滓留並煎作一服新法半夏湯治脾胃不和中脘氣滯宿寒留飲停積不消心腹刺痛臟腑膨脹嘔吐痰水噫氣吞酸或中酒吐酒噦逆噁心頭疼煩渴倦怠嗜臥不思飲食並宜服之青皮去白乾薑炮各六兩桔梗炒陳皮去白各一兩丁香皮四兩甘草炒十二兩半夏湯洗薑汁製二兩半上為細末每服一錢入鹽一捻沸湯點服不拘時候常服溫和三焦開胃健脾消宿酒進飲食人參定喘湯治丈夫婦人遠年日近肺氣咳嗽上喘氣急喉中涎聲胸滿氣逆坐臥不安飲食不下及治肺感寒邪咳嗽聲重語音不出鼻塞頭昏並皆治之人參切片麻黃去節甘草炙阿膠炒半夏曲各一兩桑白皮五味子各一兩半罌粟殼蜜刷炙二兩上為粗末入人參片拌勻每服三大錢水一盞半入生薑三片同煎至七分去滓食後溫服又治小兒久病肺氣喘急喉中涎聲胸膈不利嘔吐痰沫更量歲數加減服細辛五味子湯治肺經不足胃氣怯弱或冒風邪或停寒有飲咳嗽倚息不得安臥胸滿迫塞短氣減食乾嘔作熱嗽唾結痰或吐涎沫頭目昏眩身體疼重語聲不出鼻塞清涕頭面腳膝時帶虛浮痰咳不止痛引胸脅不問新久並宜服之北細辛去苗半夏洗七次各一兩甘草炙烏梅去核各一兩半五味子罌粟殼去蒂蓋各三兩桑白皮炒二兩上為粗散每服三錢水二盞半生薑十片煎至一盞用紗帛濾去滓溫服留二服滓並作一服再煎茯苓半夏湯治停痰留飲胸膈滿悶咳嗽嘔吐氣短噁心以致飲食不下並宜服之茯苓去皮三兩半夏湯浸七次五兩上為粗末每服四大錢水一大盞生薑七片煎至七分去滓空心服人參藿香湯治男子婦人脾胃氣弱嘔吐噦逆飲食不下手足逆冷涎痰稠黏又治似喘不喘欲嘔不嘔徹心憒憒悶亂不安或瘴瘧諸疾水漿粥藥入口便吐服之立效久病翻胃服之百日痊安此藥溫脾胃化痰飲消宿冷止吐嘔藿香去梗人參切片各六兩半夏湯洗七次薑汁製二兩半上搗為粗末入人參令勻每服三錢水一盞半生薑十片煎至一盞去滓通口服孕婦忌半夏丸治肺氣不調咳嗽喘滿痰涎壅塞心下堅滿短氣煩悶及風壅痰實頭目昏眩咽膈不利嘔吐噁心神思昏憒心忪而熱涕唾稠黏並皆治之白礬枯過十五兩半夏湯洗去滑薑汁罨一宿三斤上搗為細末生薑自然汁為丸如梧桐子大每服二十丸加至三十丸食後臨臥時生薑湯下杏參散除痰下氣治胸脅脹滿上氣喘急倚息不得睡臥神思昏憒宜服之桃仁去皮尖麩炒人參去蘆杏仁去皮尖麩炒桑白皮蜜炒微赤再泔浸一宿焙上等分為細末每服二錢水一盞半姜三片棗一個煎至七分溫服不拘時候杏子湯治一切咳嗽不問外感風寒內傷生冷及虛勞咯血痰飲停積悉皆治療出易簡方人參去蘆半夏湯洗七次茯苓去皮芍藥去粉官桂去皮不見火乾薑炮洗細辛去苗甘草炙五味子去苗各等分上㕮咀每服四錢水一盞半杏仁去皮尖銼五枚姜五片煎至六分去滓食前服或感冒得之加麻黃等分如脾胃素實者用罌粟殼去筋碎銼以醋淹炒等分加之每服添烏梅一個煎服其效尤驗若嘔逆噁心者不可用此一法去杏仁人參倍加麻黃添芍藥如麻黃之數乾薑五味子各增一半名小青龍湯大治久年咳嗽痰涎壅盛夜不得睡仍專治腳氣喘急此方雖有麻黃既有官桂不致於發汗服之不妨一方加麻黃甘草杏仁五味子茯苓等分橘紅倍之尤為切當又一方用紫蘇葉桑白皮麻黃青皮五味子杏仁甘草等分生薑七片烏梅一個煎服久年咳嗽氣虛喘急皆得其宜二方中有麻黃有汗人不宜服之四七湯治喜怒悲思憂恐驚之氣結成痰涎狀如破絮或如梅核在咽喉之間咯不出咽不下此七氣所為也或中脘痞滿氣不舒快或痰涎壅盛上氣喘急或因痰飲中結嘔逆噁心並宜服之出易簡方半夏五兩茯苓四兩紫蘇葉二兩厚朴三兩上㕮咀每服四錢水一盞半生薑七片棗一個煎至六分去滓熱服不拘時候若因思慮過度陰陽不分清濁相干小便白濁用此藥下青州白丸子最為切當婦人惡阻尤宜服之一名厚朴半夏湯一名大七氣湯局方有七氣湯用半夏五兩人參官桂甘草各一兩生薑煎服大治七氣並心腹絞痛然藥味太甜恐未必能止疼順氣一方治七情所傷中脘不快氣不升降腹脅脹滿用香附子炒半斤橘紅六兩甘草一兩煎服尤妙好事者謂其耗氣則不然蓋有是病服是藥也
