body:
  text: 卷中論中風證候中風總論夫風為天地浩蕩之氣正順則能生長萬物偏邪則傷害品類人或中邪固鮮有不致斃者故入臟則難愈如其經絡空虛而中傷者為半身不遂手腳癱瘓涎潮昏塞口眼喎斜肌膚不仁痹瘁攣僻隨其臟氣所為不同或左或右邪氣反緩正氣反急正氣引邪喎僻不遂蓋風性緊暴善行數變其中人也卒其眩人也暈激人涎浮昏人神亂故推為百病長聖人先此以示教太醫編集所以首輪中風也論諸風之由夫中風者皆因陰陽不調臟腑氣偏榮衛失度血氣錯亂喜怒過傷飲食無度嗜欲恣情致於經道或虛或塞體虛而腠理不密風邪之氣中於人也其狀奄忽不省人事涎潮昏塞舌強不能言者可先與通關散搐鼻次服至寶丹此藥性涼稍壯人可與氣虛及年高人不可與服只與後藥卒中風筋急頭眩者可與七寶丹中風半身不遂口眼喎斜筋攣骨痛者可與小續命湯追風應痛丸中風邪氣入臟狂言恍惚與排風湯中風手足癱瘓多與青州白丸子中風項背拘強牙關緊急者可與三五七散中風手足戰掉腰腳緩弱可與活絡丹七寶丹年高腳弱者可與黃耆丸論諸風氣中此病多生於驕貴之人因事激挫忿怒而不得宣泄逆氣上行忽然仆倒昏迷不省人事牙關緊急手足拘攣其狀與中風無異但口內無涎聲此證只是中氣不可妄投取涎發汗等藥反生他病但可與七氣湯分解其氣散其壅結其氣自止七氣湯連進效速更可與蘇合香丸論中風半身不遂皆因風邪中於經絡氣血行遲機關縱緩故手足不遂口眼喎斜可與七寶丹偏風語言謇澀可與小續命湯偏風走注疼痛身體麻木可與活絡丹偏風恍惚不定可與排風湯偏風痰涎盛者可與青州白丸子拘急腳弱口噤者可與龍虎丹癱瘓手足不遂可與透冰丹偏風筋脈攣急可與驅風丸乳香趁痛散乳香丸七寶丹論諸風骨節疼痛皆因風氣入於筋絡及骨節疼痛或攻註腳手痛或拘攣伸屈不得者可與乳香趁痛散追風應痛丸活絡丹乳香丸沒藥丸太岳活血丹皆可服宜先與五香散淋渫次用活血丹塗之論風濕證候皆因腠理虛風與寒濕氣傷之每遇夜間或三四更以來腰背倦痛轉側不得或身體倦痛者為有寒濕也與小續命湯大便秘小便多身疼痛者可與朮附湯若骨節煩疼者可與乳香趁痛散或身體麻木足脛弱者可與追風應痛丸黃耆丸腰痛甚者可與青娥丸論諸風大便不通皆因風邪熱滯腸胃津液乾燥秘澀可與麻仁丸三和散不通即與皂莢丸如通即止之不可久服如氣虛及老人不可與皂莢丸只與麻仁丸三和散四物湯加去白青皮等分同煎秘甚者可與神功丸不可與虛老人服論諸風小便不通皆因小腸積熱膀胱壅滯不利可與導赤散雞蘇丸三黃丸三和散秘甚者與神功丸五苓散論風濕腳氣候皆因風濕毒氣入於腳膝之間其狀或赤腫或冷痛或麻木不仁或腳軟而緩或憎寒壯熱作渴筋脈拘急可與俞山人降氣湯排風湯小續命湯小降氣湯痛者與石南丸追風應痛丸乳香趁痛散腳軟不能行者與黃耆丸木瓜丸小便秘澀與導赤丸五淋散三和散大便秘者與麻仁丸秘甚者與神功丸衝心悶者與三和散搶腰痛者可與大烏沉湯不以輕重皆用五香散淋渫若腳腫生瘡者透冰丹論諸風頭目昏眩皆因痰壅上盛可與青州白丸子頭目昏眩多痰者可與辰砂化痰丸痰盛昏眩可與半夏丸天南星丸心肺有熱與龍腦芎犀丸痰盛項強急與金沸草散痰多膈熱者可與川芎丸心胸不利口苦舌乾可與透冰丹羌活丸防風丸痰甚心忪浮者可與牛黃清心丸痰盛渴嘔者可與天南星丸論諸風瘙癢癮疹皆因血氣不順面如蟲行瞤動血氣凝滯者可與排風湯胡麻散消風散四生丸甚者多服皂莢煎丸何首烏丸論諸風頭痛目暈皆因風虛氣上攻頭目可與太陽丹白龍丸茶調散川芎丸太陽穴痛與急風散塗痛處眼昏頭痛者可與消風散追風散痰熱頭痛者可與防風丸年高虛弱人風寒入腦頭痛發眩者與朮附湯羌活丸三五七散偏正頭風兩太陽穴及眉稜骨痛牽引兩眼昏暗者可與遇仙散論諸風熱上攻面生熱瘡者可與驅風丸龍虎丹排風湯胡麻散何首烏散羌活丸川芎丸白龍丸芎犀丸或如蟲行可與追風散論諸風恍惚驚悸皆因體虛受風邪心氣不足入於心經者與定志丸降心丹平補鎮心丹辰砂妙香散熱者牛黃清心丸論諸風挫枕轉筋皆因氣虛項筋轉側不得筋絡不順疼痛與通關散消風散大三五七散或追風散痰涎盛與白丸子論諸風痰逆嘔吐諸風初發時痰逆嘔吐者可與溫中化痰丸橘皮半夏湯藿香湯半夏散嘔吐者立止可常服論諸風腳膝緩弱皆因夙虛氣血衰弱行止無力可與黃耆丸木瓜丸俞山人降氣湯不赤不腫而痛者可與洗風湯淋沃洗之論破傷風證皆因打撲傷破風入發腫者可與上員散生薑自然汁調藥貼患處內損者與太岳活血丹血不止者與花蕊石散論纏喉風證皆因積熱痰涎上攻咽喉口開不得水漿不下與碧雪竹管子吹入喉中甚者與雄黃解毒丸玉屑無憂散論傷寒證候傷寒總論活人書云傷寒正名有一十六條傷寒傷風傷寒見風傷風見寒風濕中濕風溫濕溫溫毒中暍熱病溫病痓病溫瘧晚發疫癘外證一十六條外有六證相似中暑傷痰食積虛勞瘴瘧腳氣與傷寒相似而實非傷寒此證人不曉皆言即傷寒也若不仔細分辨證候虛實用藥則誤人性命在反掌之間不可不知也論傷寒得病之由凡傷寒初得病便不進飲食發熱一向不止頭痛或渾身痛或自汗惡風憎寒壯熱者乃是傷風傷寒證也便須問病得幾日有汗無汗惡風不惡風或渴或不渴或嘔逆或不嘔逆小便通或不通得幾日須用仔細審問方可用藥傷寒證與雜病不同若不對證妄投藥餌罪犯非輕誤人多矣論傷寒傷風證候凡傷風者皆因脫衣感冒被風吹霎著則灑然骨寒毛起惡風自汗者乃是傷風證也凡風吹則體自寒惡風無汗者是傷寒證也論傷寒表證傷寒初得病一二日頭痛身體痛惡寒或微喘者體虛及老人可與五積散聖散子此二藥病多日及不惡風者不可服並夏秋之間亦不可輕服緣中暑似傷寒若中暑人誤服此二藥如抱薪救火其害非輕切宜審實仔細用藥少壯者夏秋宜用金沸草散來蘇散人參輕骨散蔥白散和解散神朮散之類可服也初得病一二日頭痛發熱身體痛惡寒無汗者可與蔥白散八解散金沸草散人參輕骨散初得病一二日或三日自汗頭痛惡風或嘔者可與升麻葛根湯敗毒散香蘇散蔥白散人參輕骨散和解散神朮散之類皆可用若發汗後熱已退了可與和氣藥嘉禾散正氣散論傷寒重證病人四五日至六七日不惡風寒及發熱煩渴嘔逆手掌中及腋下微有汗出大便不通小便赤得三四日腹中滿微喘狂言譫語者切不可妄投熱藥只可與小柴胡湯一貼先進一服如人行十餘里未通候半日久可又進一服以大便通出燥糞則愈此里證也煩渴者與五苓散或手足冷吐瀉不可與小柴胡湯只服參苓白朮散四君子湯之屬如調理通後恐虛老人須用平補藥可與嘉禾散四君子湯參苓白朮散論和解證候傷寒傷風往來寒熱胸脅間痛乾嘔及大便秘者可用小柴胡湯一貼病重者再服半貼方效或言渴者或小便澀兼服五苓散傷風四五日身發熱惡寒項強而手足溫及大便不通者多用小柴胡湯敗毒散秦艽鱉甲散之類婦人傷寒三五日至七八日月經當行或經水才去作寒熱忽然譫語如見鬼神狀日可夜甚此乃熱入血室也用四物湯等分加柴胡煎服如不退用小柴胡湯兼入生地黃捶碎煎傷寒陽證嘔逆發熱兼參苓白朮散和解散輩乃和解證也論傷寒陽證傷寒陽證面赤作熱發渴至五六日不止或服熱藥過多熱甚發狂煩躁或瀉赤汁膿血者可服三黃丸四順飲洗心散或大便秘結與小柴胡湯之類論傷寒陰證傷寒三二日五七日身體疼痛不可轉側自汗四肢厥冷瀉而不渴或吐逆泄瀉臍腹痛或有咽喉痛者可與理中丸理中湯四肢冷甚腹痛氣急者與姜附湯多加甘草煎及附子理中丸並服更重者用法煉黑錫丹金液丹二氣丹之類隨輕重而用之瀉止四肢暖有寒熱卻用五積散聖散子十華散之類微汗則解不然則毒氣再復便難治也論傷寒陰陽二證有陰厥有陽厥最宜仔細審問傷寒陽證熱氣深則反厥若只認四肢厥冷便投熱藥此害人性命在頃刻間發藥者極用仔細審問如是自疑寧不發藥教他更請醫者看視不可亂髮藥也論傷寒陰厥證若初得病四肢厥冷身上起粟大便不調或瀉或嘔此寒厥也可與理中丸理中湯之類論傷寒陽厥證若初得病身便熱頭痛大便不通至六七日渴甚狂言揭衣被不定迭腳手厥冷此乃熱極而發厥冷必竟少時又卻溫熱切不可便投熱藥且與小柴胡湯之類昔有國醫孫用和一法探之須仔細察審外證方可用藥凡傷寒四肢厥冷當察問病之因若證不明未辨陰陽者且與四味理中丸加甘草再和勻作四順理中丸服探之若是陰厥則服藥了形靜不熱定迭當漸加前件理中湯等若是服四順理中丸了如煩躁不定迭煩渴狂言自揭衣被者此是陽厥不可投熱藥當用前件小柴胡湯之類論傷寒潮熱傷寒五七日至十日以上早晨稍惺惺至申酉前後發熱不惡寒微有汗大便不通三二日或譫語而渴者與小柴胡湯三五服重者五七服以大便微利熱須退有渴者可與五苓散猶有煩躁及熱未退者宜加七寶洗心散或與秦艽鱉甲散調理也論傷寒頭痛傷寒雖退而頭痛不止者諸陽所聚熱毒氣上攻頭痛不止者可與龍腦芎犀丸太陽丹白龍丸川芎丸之類論傷寒發渴傷寒至五七日渴甚或發熱不惡寒大便如常小便赤是胃中虛躁可與五苓散甚者與竹葉湯發熱渴者與柴胡湯仍加栝蔞煎論傷寒嘔逆傷寒嘔逆有三證胃中有寒而嘔逆者可與參苓白朮散五苓散四君子湯胃中亦有熱或發渴口乾或小便赤澀與小柴胡湯或五苓散其小柴胡湯極止熱嘔或少氣吐逆者用竹葉湯立效論傷寒吐逆傷寒吐逆者胃寒吐而身冷或服冷藥太多而不渴大便如常或自利或吐蛔蟲者此胃中寒也可與人參丁香散參苓白朮散四君子湯理中丸人參丸嘉禾散論傷寒發喘傷寒喘急者皆因風寒邪乘於肺經氣上盛發喘可與麻黃湯華蓋散款冬花散人參潤肺丸養肺丸或潤金散款肺皆可服也論傷寒咳嗽傷寒咳嗽者由寒邪乘虛入於肺經或飲水過多停飲咳嗽微喘發熱而渴或不渴或寒熱脅下痛者可與小青龍湯三二服如脅下痛甚者必有停飲於小青龍湯內加入醋炒芫花少許同煎不可多用多則瀉人如發寒熱咳嗽未盡更進小柴胡湯每服加五味子二十粒同煎或與秦艽鱉甲散論傷寒吐血發衄傷寒五七日發鼻衄或吐血者熱盛氣壅則衄血或吐血切不可妄投熱藥可與雞蘇丸薄荷煎煎茅根湯或茅花汁冷送下甚者可與三黃丸如渴兼服五苓散清心散加真蒲黃煎服論傷寒咽喉疼痛傷寒咽喉痛皆因內熱氣秘陽毒上熏則咽喉痛痰盛者可與如聖湯甚者可與四順飲犀角飲洗心散皆可服之論傷寒腹痛傷寒有熱腹痛者三四日大便不通繞臍腹痛或發熱不惡寒或渴者此乃胃中有燥糞故發痛也切不可用熱藥且如正氣散理中湯及諸推積性熱藥皆不可用誤人性命只可與小柴胡湯加芍藥少許同煎一二服如未效可至三四服取大便通為度傷寒腹痛有寒證因服冷藥過多大便自利腹中痛手足冷者可與理中丸甚者與附子理中丸理中湯未效用姜附湯多加甘草煎用諸熱藥即止氣虛及老人傷寒後腹痛大便如常無熱只是腹痛者與黃耆建中湯多服取效論傷寒大小便秘傷寒大便秘者可與麻仁丸未通者與神功丸三黃丸有熱者與四順清涼飲後以參苓白朮散嘉禾散補之小便秘結者與五苓散導赤散五淋散皆可與之論傷寒後自汗傷寒後自汗者可服牡蠣散止汗散兼嘉禾散黃耆建中湯加人參煎服又人參當歸散加小麥同煎論傷寒後自利傷寒後腹痛大便自利手足冷者可服理中丸之類見腹痛條內論傷寒後黃疸傷寒眼睛及遍身發黃疸小便不利或頭上汗出者可與五苓散以山茵陳山梔子各少許銼碎二錢煎湯調多服效論傷寒後腹滿傷寒後腹滿者不思飲食或食後不消化腹脅脹滿者可與勻氣散沉香降氣湯蓬煎丸思食丸參苓白朮散甚者與青木香丸兼嘉禾散四君子湯木香分氣丸木香散木香流氣飲看虛實用之論傷寒後患痢傷寒後患痢多是熱證或下純膿或下純血可與黃連阿膠丸駐車丸血多者與地榆散胃風湯兼服論傷寒中濕證傷寒一身盡痛轉側不得骨節煩疼小便不利大便反快額上汗出此中濕氣也可多服五苓散利小便次用朮附湯兼服之論傷寒後調理傷寒本無補法不可用太溫藥補之若補甚則再發熱但可用微溫藥調理只可與參苓白朮散虛弱老人用嘉禾散之類調理論傷暑證候夏月傷暑亦云伏暑謂其人從熱中來便從涼處坐臥不知被外涼冷之氣閉暑熱氣伏在腠理中不能發泄故曰伏暑其證自汗惡寒或背惡寒而渴或面垢如未洗面人或板齒燥當門二齒乾是伏暑也嘔逆而渴者及臥不及席也是傷暑也可與五苓散桂花丸大順散香薷散發熱甚者可與香薷散竹葉湯枇杷葉散小柴胡湯冷服立效論傷暑吐瀉中暑嘔吐發熱悶亂或霍亂吐瀉可與消暑丸五苓散桂苓丸香薷散之類論停痰證候有痰在胸膈之間亦能憎寒壯熱惡風自汗咽喉不利只是頭不痛身體不疼者可與金沸草散消飲丸辰砂化痰丸倍術丸之類皆可與論傷食證候病有頭痛發熱惡寒或腹滿吐逆身體不痛只是四肢倦怠其證非傷寒也此是傷食在腸胃之間可與感應丸獨聖丸蓬煎丸嘉禾散思食丸諸傷食藥皆可服氣虛老人可服五積散吞下青木香丸順氣散之類論瘴瘧證候論寒熱瘴瘧證凡瘴瘧病雖是時行之疾然老少虛實受病有淺深大率不同有發熱不寒渾身似火頭痛煩渴譫語者有發寒不熱嘿嘿昏倦四肢厥冷臍腹疼痛有外寒內熱有外熱內寒有寒熱相半有啞不能言者有吐有瀉有吐瀉俱作當隨證用藥若只言瘴病一概治之萬一不能取效也若發時熱多寒少或內熱外寒但熱不寒渾身如火頭痛煩渴心胸躁悶譫語亂言大小便秘澀發作無時者可與小柴胡湯敗毒散升麻葛根湯來蘇散蔥白散神朮散煩渴者與五苓散竹葉湯譫語心悶者與五苓散入辰砂細研和勻冷熱水調服兼與大至寶丹及小兒金箔丸兩三丸作一服頭痛者與太陽丹白龍丸茶調散之類或熱少寒多或內寒外熱或寒熱相半或骨節痠痛臍腹作痛者可與不換金正氣散人參輕骨散正氣散聖散子五積散香蘇散建中散草果飲嘉禾散或來蘇散之類或不熱只是寒或吐或瀉或吐瀉俱作四肢厥冷汗出如雨嘿嘿昏倦者可與朮附湯四柱散嘉禾散或鹿茸丸二姜丸十華散若服前藥吐瀉不止四肢厥冷自汗如雨小便頻數者與參苓白朮散吞來復丹三十丸至五十丸甚者姜附湯合和五苓散同煎服渴者與參苓白朮散此一證二廣及漳州界上多有之余處無此證發藥須用仔細詢問的實不可輕用誤人性命切記不可輕發熱藥若發作有時或連日或隔日或三五日一發發則熱多寒少或但熱不寒者於未發前先與小柴胡湯敗毒散之類至發日卻服露天飲或聖飲子勝金丸嘔逆有痰涎者常山飲消暑丸之類有效如神若熱少寒多或只寒不熱或寒熱相半者於未發前可多與不換金正氣散建中湯正氣散平胃散和脾散嘉禾散之類至發日五更初卻服常山飲草果飲發久者克效餅靈瘧丹老者及怯弱者不可服自宜斟酌孕婦患瘧疾難為用藥但只可與草果飲兼用平胃散入鹽少許用溫酒調服瘴瘧瘥後吃粥或爛飲更常調和脾胃可與黃耆建中湯四君子湯嘉禾散參苓白朮散曹脾散撾脾散健脾湯平胃散和氣散思食丸大小養脾丸切忌生冷酒果房色洗浴半月傷寒十勸一傷寒頭疼又身熱便是陽證不可服熱藥傷寒傳三陰三陽共六經內太陰病頭不疼身不熱少陰病有反發熱而無頭疼厥陰病有頭疼而無發熱即是陽證若醫者妄投熱藥決致死亡一傷寒當直攻毒氣不可補益邪氣在經絡中若隨證攻之三四日痊安醫者必謂生須正氣卻行補益使毒氣流熾必多致殺人一傷寒不思飲食不可服溫脾胃藥傷寒不思飲食自是常事終無餓死之理如理中丸之類不可輕服若陽病服之致熱氣增重或至不救一傷寒腹痛亦有熱證不可輕服溫暖藥難經云痛為實故仲景論腹滿時痛之證有曰痛甚者加大黃夫痛甚而反加大黃意可見也唯身冷厥逆而腹痛者是陰證須消息每見醫者多緣腹痛便投熱藥而殺人一傷寒自利當看陰陽證不可例服補藥及止瀉藥自利惟身不熱手足溫者屬太陰身冷四逆者屬少陰厥陰外其餘身熱下利皆是陽證當隨證依仲景法治之每見醫者多緣下利便投暖藥及止瀉藥而殺人一傷寒胸脅痛及腹痛不可妄用艾灸常見村落間有此證無藥便用艾灸多致毒氣隨火而盛膨脹發喘而死不知胸脅痛自屬少陽腹脹滿自屬太陰此外惟陰證可灸一傷寒手足厥冷當看陰陽不可一例作陰證治有陽厥有陰厥醫者少能分辨陽厥而投熱藥殺人速於用刃蓋陽病不至於極熱不能發厥仲景所謂熱深則厥深是也熱深而更與熱藥寧有復活之理但看初得病而身熱至三四日後熱氣已深大便秘小便赤或譫語昏憒及別有熱證而反發厥者必是陽厥也宜急用承氣湯下之若初得病身不熱大便不秘自引衣蓋身或下利或小便數不見熱證而厥逆者即是陰厥也方可用四逆湯之類二厥所以使人疑者緣其脈皆沉然陽厥脈沉而弱又陽厥脈時復指爪卻溫陰厥常冷此為可別一傷寒病已在裡即不可用藥發汗傷寒病須看表里如發熱惡寒則是在表正宜發汗如不惡寒反惡熱即是里證若醫者一例發汗則所出之汗不是邪氣皆是真氣邪氣未除而真氣先涸死者多矣又有半在表半在裡之證及無表裡之證不惟皆不可下仍不可汗當隨證治而消息之一傷寒飲水為欲愈不可令病人姿飲過度病人大渴當為之水以消熱氣故仲景以飲水為欲愈人見如此說遂令病者縱飲因而為嘔為喘為咳逆為下利為腫為悸為水結為小便不利者多矣且如病人慾飲一碗只可與半碗飲之常令不足為喜矣一傷寒病初瘥不可過飽及勞動或食羊肉行房事與食諸骨汁及飲酒病方愈脾胃尚弱食而過飽不能消化病即再來謂之食復病方愈血氣尚虛勞動太早病即再來謂之勞復又傷寒食羊肉行房事者並死食諸骨汁飲酒者再病
