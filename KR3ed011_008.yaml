body:
  text: 卷之八治雜病耆婆萬病丸治七種癖塊五種癲病十種注忤七種飛屍十二種蠱毒五種黃病十二種瘧疾十種水病八種大風十二種𤸷痹並風入頭眼暗漠漠及上氣咳嗽喉中如水雞聲不得臥飲食不作肌膚五臟滯氣積聚不消壅閉不通心腹脹滿連及胸背鼓脹氣堅結流入四肢或腹叉心膈氣滿時定時發十年二十年不瘥五種下痢疳蟲蛔蟲寸白蟲諸蟲上下冷熱久積痰飲令人多眠睡消瘦無力蔭入骨髓便成滯疾身體氣腫飲食嘔逆腰腳痠疼四肢沉重不能久行久立婦人因產冷入子臟臟中不淨或閉塞不通胞中瘀血冷滯出流不盡時時疼痛為患或因此斷產並小兒赤白下痢及狐臭耳聾鼻塞等病服此藥以三丸為一劑服不過三劑萬病悉除說無窮盡故以萬病丸名之瘧病未發前服一丸未瘥如前更服芍藥肉桂去粗皮芎藭不見火川椒去目及閉口者微炒去汗乾薑炮防風去蘆巴豆去心膜炒當歸去蘆生屑角鎊桔梗芫花醋炒赤茯苓去皮桑白皮炒人參去蘆黃芩黃連去須禹餘糧醋淬研飛蒲黃微炒前胡去蘆大戟銼炒葶藶炒麝香研細辛去苗雄黃研飛硃砂研飛紫菀去蘆甘遂牛黃研各一兩蜈蚣十二節去頭足炙芫青二十八枚入糯米同炒候米色黃黑去頭足翅用石蜥蜴去頭尾足炙四寸上為細末入研藥勻煉蜜為丸如小豆大若一歲以下小兒有疾者令乳母服兩小豆大亦以吐利為度近病及卒病用多服積久疾病即少服常服微溏利為度卒病欲死服一二丸取吐利即瘥卒中惡口噤服二丸漿一合下利即瘥五注鬼刺客忤服二丸男女邪病歌哭腹大如妊身服二丸日三夜一間食服之蠱毒吐血腹痛如刺服二丸不瘥更服瘧病未發前服一丸未瘥更服諸有痰飲者服三丸冷癖服三丸日三服皆間食常令微溏利宿食不消服二丸取利瘕症積聚服二丸日三服拘急心腹脹滿心痛服三丸上氣嘔逆胸滿不得臥服二丸不瘥更服大痢服二丸日三服疳濕服二丸以一丸如杏仁大和醋二合灌下部中水病服三丸日再服間食服之瘥止人弱即隔日服頭痛惡寒服二丸復取汗傷寒天行服二丸日三服間食服之小便不通服二丸不瘥明日再服大便不通服三丸又內一丸下部中即通耳聾聤耳以綿裹如棗核塞之鼻衄服二丸癰腫疔腫破腫內一丸如麻子大日一敷之根亦自出犯疔腫血出以豬脂和塗有孔內孔中瘥癩瘡以酢泔洗訖取藥和豬脂敷之漏瘡有孔以一丸內孔中和豬脂敷上痔瘡塗綿筋上內孔中日別易瘥止瘰癧以酢和塗上瘥癬瘡以布揩令汗出以酢和塗上日一易瘥止胸背腰脅腫以醋和敷腫上日一易又服二丸諸冷瘡積年不瘥以酢和塗之惡刺以一丸內瘡孔中即瘥蝮蛇螫以少許內螫處若毒入腹心煩欲絕者服三丸蜂螫以少許敷之瘥婦人諸疾胞衣不下服二丸小兒驚癇服一丸如米許以塗乳令嗍之看兒大小加減小兒客忤服一丸如米和乳塗乳頭令嗍之以意量之蠍螫以少許敷之瘥小兒乳不消心腹脹滿服一丸如米許塗乳頭令嗍之即瘥神應丸治腎經不足風冷乘之腰痛如折引背膂俯仰不利轉側亦難或因役用過多勞傷於腎或因寢冷濕地氣傷腰或因墜墮傷損或因風寒客搏皆令腰痛並皆治之威靈仙去土二十兩當歸肉桂去粗皮各十兩上為末以酒煮麵糊為丸如梧桐子大每服十五丸溫酒或煎茴香湯下食前服婦人煎桂心湯下加至二十丸有孕婦人不得服忌食茗集效丸治因臟腑虛弱或多食甘肥致蛔蟲動作心腹攪痛發作腫聚往來上下痛有休止腹中煩熱口吐涎沫即是蛔咬宜服此藥若積年不瘥服之亦愈又療下部有蟲生痔癢痛大黃銼炒十五兩木香不見火檳榔訶黎勒煨去核酒浸焙乾附子炮去皮臍羌活炒研一本作蕪荑鶴蝨炒乾薑炮各十兩半上為末煉蜜為丸如梧桐子大每服三十丸食前橘皮湯下婦人醋湯下乳香丸治諸痔下血肛邊生肉或結核腫疼或生瘡癢痛或大便艱難肛腸脫出又治腸風下血無問新久及諸瘻根在臟腑悉能治之枳殼去瓤麩炒牡蠣火煅蓽澄茄芫青去頭翅足糯米炒以米黃色為度大黃蒸焙鶴蝨炒各半兩白丁香乳香研各一分上為末粟米糊丸如梧桐子大每服十丸至十五丸如治腸風臘茶清下諸痔煎薤白湯下諸瘻煎鐵屑湯下並食前服解毒雄黃丸解毒治纏喉風及急喉痹卒然倒僕失音不語或牙關緊急不省人事鬱金雄黃研飛各一分巴豆去皮出油十四個上為末醋煮麵糊為丸如綠豆大用熱茶清下七丸吐出頑涎立便蘇省未吐再服如至死者心頭猶熱灌藥不下即以刀尺鐵匙斡開口灌之藥下喉嚨無有不活吐瀉些小無妨及治上膈壅熱痰涎不利咽喉腫痛赤眼癰腫一切毒熱並宜服之如小兒患喉嚨赤腫及驚熱痰涎壅塞服二丸或三丸量兒大小加減克效餅子治一切瘧病發作有時先覺伸欠乃作寒慄鼓振頤頷中外皆寒腰脊俱痛寒戰既已內外皆熱頭痛如破渴欲飲冷或痰積胸中煩滿欲嘔或先熱後寒或先寒後熱或寒多熱少或熱多寒少或寒熱相半或但熱不寒或但寒不熱或一日一發或隔日一發或一發後六七日再發並能主之甘草爁綠豆末荷葉爁各五兩定粉研龍腦研麝香研各半兩金箔二十五片為衣信砒醋煮二兩半硃砂研飛一兩一分上為末煉蜜搜和每兩作二十丸捏扁以金箔為衣每服一餅子以新汲水磨化日發者未發前服之間日者不發夜服隔數日發者前一日夜服連日者凌晨服烏梅丸治臟寒蛔蟲動作上入膈中煩悶嘔吐時發時止得時即嘔常自吐蛔有此證候謂之蛔厥此藥主之又治久痢烏梅三百個黃柏炙細辛去苗肉桂去粗皮附子炮去皮臍人參去蘆各六兩蜀椒去目及閉口者微炒出汗用當歸去蘆各四兩乾薑炮十兩黃連去須十六兩上異搗篩合治之以醋浸烏梅一宿去核蒸之五斗米下飯熟搗成泥和藥令相得內臼中與煉蜜杵二千下丸如梧桐子大每服十五丸溫米飲下食前服神助散舊名葶藶散治十種水氣面目四肢遍身俱腫以手按之隨手而起咳嗽喘急不得安臥腹大腫脹口苦舌乾小便赤澀大便不利澤瀉二兩椒目一兩半豬苓去黑皮二兩黑牽牛微炒取末二兩半葶藶炒香別研三兩上為細末每服以蔥白三莖漿水一盞煎至半盞入酒半盞調藥三錢絕早面向東服如人行十里久以漿水蔥白煮稀粥至蔥爛入酒五合熱啜量人啜多少須啜一升許不得吃鹽並面自早至午當利小便三四升或大便利喘定腫減七分隔日再服既平之後必須大將息及斷鹽房室等三年立效散治下焦結熱小便黃赤淋閉疼痛或有血出及大小便俱出血者亦宜服之山梔子去皮炒半兩瞿麥穗一兩甘草炙三分上為末每服五錢至七錢水一碗入連須蔥根七個燈心五十莖生薑五七片同煎至七分時時溫服不拘時候必勝散治男子婦人血妄流溢吐血衄血嘔血咯血熟乾地黃小薊並根用人參蒲黃微炒當歸去蘆芎藭烏梅去核各一兩上件藥搗羅為粗散每服五錢水一盞半煎至七分去渣溫服不拘時候釣腸丸治久新諸痔肛邊腫痛或生瘡癢時有膿血又治腸風下血及肛門脫出並宜服之栝蔞二枚燒存性蝟皮兩個銼碎罐內燒存性雞冠花銼微炒五兩胡桃取仁一十五個不油者入罐內燒存性白礬枯綠礬枯白附子生用天南星生用枳殼去瓤麩炒附子去皮臍生用訶子煨去皮半夏各二兩上為細末以醋煮麵糊為丸如梧桐子大每服二十丸空心臨臥溫酒下遠年不瘥者服十日見效久服永除根本小可腸風等疾一二年內者只十服瘥永不發動石葦散治腎氣不足膀胱有熱水道不通淋瀝不宣出少起數臍腹急痛蓄作有時勞倦即發或尿如豆汁或便出砂石並皆治之芍藥白朮滑石葵子瞿麥各三兩石葦去毛木通各二兩王不留行當歸去蘆甘草炙各一兩上為細末每服二錢煎小麥湯調下食前日二三服牡蠣散治諸虛不足及新病暴虛津液不固體常自汗夜臥即甚久而不止羸瘠枯瘦心忪驚惕短氣煩倦黃耆去苗土麻黃根洗牡蠣米泔浸刷去土火燒通赤各一兩上三味為粗散每服三錢水一盞半小麥百餘粒同煎至八分去渣熱服日二服不拘時候法制熟艾主灸百病陳久黃艾不以多少擇取葉入臼內用木杵輕搗令熟以細篩隔去青渣再搗再篩如此三次別以馬尾羅子隔之更再搗羅候柔細黃熟為度上主灸百病世人著灸多無法度徒忍痛楚罕能愈疾今於聖惠千金外臺等方內摭取點穴分寸作炷大小壯數多少等法於後定分寸法取病人男左女右中指第二節內度兩橫紋相去為一寸應取穴及作炷分寸並依此法點灸穴法凡點穴時須得身體平直四肢毋令拳縮坐點毋令俯仰立點毋令傾側灸時孔穴不正無益於事徒燒肌肉虛忍痛楚若坐點則坐灸之臥點則臥灸之立點則立灸之反此亦不得其穴作艾炷法凡下火點灸須令艾柱根下廣三分長亦三分若減此不復孔穴不中經脈火氣不行亦不能除病強壯人亦可稍增令大周歲以里小兒可如小麥大點火法古來用火灸病忌八般木火今即不用木火灸人不犯諸患兼去久疴以清油點燈燈上燒艾莖點灸兼滋潤灸瘡至愈以來且無疼痛用蠟燭更佳又火珠耀日以艾承之遂得火出此火灸病為良次有火照耀日以艾引之便得火出此火亦佳下火灸時法皆以日正午以後乃可下火灸之時謂陰氣未至灸無不著午前平旦穀氣虛令人顛眩不可臥灸慎之慎之其大法如此卒急者不可用此例若遇陰霧天起風雪忽降猛雨炎暑雷電虹霓暫時且停候待清明即再下火灸灸時不得傷飽太飢飲酒食生硬物兼忌思慮愁憂怒呼罵叫吁嗟嘆息一切不祥忌之大吉治灸瘡不發法凡著灸療病歷春夏秋冬不較者灸炷雖然數足得瘡發膿出所患即瘥如不得瘡發膿出其疾不愈甲乙經云灸瘡不發者用故履底灸令熱熨之三日即發膿出自然愈疾今用赤皮蔥三五莖去其蔥青於煻灰火中煨熟拍破熱熨灸瘡十餘遍其瘡三日自發立壞膿出疾愈淋洗灸瘡法凡著灸治病才住火便用赤皮蔥薄荷二味煎湯溫溫淋洗灸瘡周迴約一二寸已來令驅逐風氣於瘡口內出兼令經脈往來不滯於瘡下自然瘡壞疾愈若灸瘡退火痂後用桃樹東南枝稍青嫩桃皮二味等分煎湯溫溫淋洗灸瘡此二味偏能護灸瘡中諸風若瘡內黑爛潰者加胡荽三味等分煎湯溫溫淋洗灸瘡自然生好肉也若灸瘡疼痛不可忍多時不較者加黃連四味等分煎湯淋洗立有神效壯數多少法千金方云凡言壯數者若丁壯遇疾病根深篤者可倍多於方數其人老小羸瘦者可復減半依扁鵲灸法有至五百壯千壯者皆臨時消息之推人神所在法一日足大指二日外踝三日股內四日腰五日口舌咽懸雍六日足小指七日內踝八日足腕九日尻十日背腰十一日鼻柱十二日髮際十三日牙齒十四日胃脘十五日遍身十六日胸乳十七日氣衝十八日腹內十九日足趺二十日膝下二十一日手小指二十二日伏兔二十三日肝俞二十四日手陽明兩脅二十五日足陽明二十六日手足二十七日膝二十八日陰二十九日膝脛顳顬三十日關元下至足心以上上神所在之日禁忌著灸若遇病急切不拘此例紹興續添方常山飲治瘧疾凡瘧疾蓋因外邪客於風府生冷之物內傷脾胃或先寒後熱或先熱後寒或寒熱獨作或連日併發或間日一發寒則肢體顫掉熱則舉身如燒頭痛惡心煩渴引飲氣息喘急口苦舌乾脊膂痠疼腸鳴腹痛諸藥不治漸成勞瘧者此藥治之知母川常山草果甘草炙各二斤良薑二十兩烏梅去仁一斤上件為粗末每服三錢水一盞生薑五片棗子一枚煎至七分去渣溫服對金飲子治證並