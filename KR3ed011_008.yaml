發背先以敗蒲一斤用水三升煎五十沸如人體溫將蒲水洗瘡拭乾貼藥一兩分為三服溫酒下未成膿者立瘥於外貼之奶癰外貼瘰癧骨疽毒穿至骨用藥一兩分作三服溫酒下甚者即瀉出惡物兼外貼瘥腸癰以藥半兩分為五服甘草湯下未成膿者當時消已有膿者隨藥下膿出後每日酒下五丸如梧桐子大待膿止即住服風眼貼兩太陽穴壁鏡咬蜘蛛咬外貼留瘡口發腦發髭鬢發眉發耳臍癰牙癰牙疼並外貼包裹即當時痛止箭頭所傷箭頭在內外貼每日吃少許爛綠豆箭頭自出虎豹所傷先以甘草湯洗然後貼膏每日換不過三次貼狗蛇咬生油下十丸如梧桐子大仍須貼外難產三日不分娩溫酒下一分便生血運欲死以薑汁和小便半升溫酒下十丸死者即返死胎在腹以榆白皮湯下半兩便生丈夫本臟氣茴香溫酒下一分每日一服不過二服瘥中毒藥酒洗襪一本作中暑毒取地水溫下一分每日一服不過四度瀉出惡物瘥瘤贅外貼消之一切腫癤外貼立瘥但有所苦並皆治之藥到即瘥以上主療只忌羊血余無所忌如人收此藥防身以蠟紙裹不令風乾可三十年不損藥力小犀角丸治腸癰乳癰發背一切毒腫服之化為水巴豆二十二枚去皮膜心炒出油細研大黃蒸焙一兩一分犀角三兩黃連去須梔子去皮干蓼藍升麻黃芩防風去蘆人參當歸去蘆黃耆去苗甘草炙各一兩上為細末入巴豆勻煉蜜搜和為丸如梧桐子大每服三丸溫湯下利三兩行吃冷粥止之不利加至四五丸初服取快利後漸減丸數取微溏泄為度老小以意加減腫消及和潤乃止利下黃水覺腫處微皺色變即是消候一切腫毒皆內消神驗不可論忌熱面蒜豬肉蘆筍魚海藻菘菜生冷黏食何首烏散治脾肺風毒攻衝遍身癬疥瘙癢或生癮疹搔之成瘡肩背拘倦肌肉頑痹手足皴裂風氣上攻頭面生瘡及治紫癜白癜頑麻等風荊芥穗蔓荊子去白皮蚵蚾草去土威靈仙淨洗何首烏防風去蘆叉甘草炙上件各五斤搗羅為末每服一錢食後溫酒調下沸湯亦得樺皮散治肺臟風毒遍身瘡疥及癮疹瘙癢搔之成瘡又治面上風刺及婦人粉刺杏仁去皮尖用水一碗於銀銚子內熬候水減一半以來取出放令乾荊芥穗各二兩枳殼去瓤用炭火燒存性取出於濕紙上令冷樺皮燒成灰各四兩甘草炙半兩上件藥除杏仁外余藥都搗羅為末卻將杏仁別研令極細次用諸藥末旋旋入研令勻每服二錢食後溫酒調下日進三服瘡疥甚者每日頻服太岳活血丹治男子婦人外傷內損狗咬蟲傷驢撲馬墜手足傷折一切疼痛腹中瘀血刺脅築心及左癱右緩走注疼痛癰腫痔漏婦人冷氣入腹血脈不通產後敗血灌注四肢吹奶腫痛血氣撮痛並宜服之亂髮皂角水淨洗二斤曬乾用清麻油二斤入鍋內炒頻以手拈看脆亂如糊苔即止不可令炒過慄楔謂慄三顆共一球其中有扁薄者是去殼薄切日乾皂角刺燒通紅米醋內淬焙大黑豆以濕布揩去塵垢退黑皮焙乾花桑枝如臂大者炭火燒煙盡米醋淬取出焙各一斤蓖麻仁別研塗墨三兩乳香好者細研入米醋一碗熬令熟香四兩細墨半斤一半用蓖麻仁三兩乳缽爛研塗墨上塗盡用薄紙裹以黃泥固濟日乾以火五十斤煅令通紅放地上盆蓋出火氣兩飯久一半用硇砂二兩醋化塗墨上炙乾硇砂光淨者醋化塗墨上二兩上六味為末入乳香膏內和杵三千下丸如彈子大如乳香膏少更入醋煮麵糊痛甚者每服一丸輕可者服半丸用無灰酒一盞乳香一豆大先磨香盡次磨藥盡煎三五沸臨臥溫服以痛處就床臥如欲出汗以衣被蓋覆仍用藥塗磨損處忌一切動風物應婦人諸疾服者更用當歸末一錢依法煎服有孕者莫服玉龍膏摩風止痛消腫化毒治一切傷折瘡腫栝蔞大者一個去皮黃蠟一兩半白芷淨揀銼半兩麻油清真者六兩麝香研一錢松脂研一錢半零香藿香各一兩杏仁去皮尖升麻黃耆赤芍藥白芨白蘞甘草淨揀銼各一分上以油浸七日卻比出油先煉令香熟放冷入諸藥慢火煎黃色用絹濾去渣入銀石鍋內入蠟並麝香松脂熬少時以瓷盒器盛每用少許薄攤絹帛上貼若頭面風癬癢瘡腫疼痛並塗磨令熱頻頻用之如耳鼻中肉鈴用紙拈子每日點之至一月即愈如治灸瘡及小兒瘤瘡塗之兼滅瘢痕神效花蕊石散治一切金刃箭鏃傷中及打撲傷損貓狗咬傷或至死者急於傷處摻藥其血化為黃水再摻藥便活更不疼痛如內損血入臟腑熱煎童子小便入酒少許調一大錢服之立效若牛抵腸出不損者急內入細絲桑白皮尖茸為線縫合肚皮縫上摻藥血止立活如無桑白皮用生麻縷亦得並不得封裹瘡口恐作膿血如瘡干以津液潤之然後摻藥婦人產後敗血不盡血迷血運惡血奔心胎死腹中胎衣不下至死者但心頭暖急以童子小便調一錢取下惡物如豬肝片終身不患血風血氣若膈上有血化為黃水即時吐出或隨小便出立效硫黃上色明淨者搗為粗末四兩花蕊石搗為粗末一兩上二味相拌令勻先用紙筋和膠泥固濟瓦罐子一個內可容藥候泥干入藥內密泥封口子焙籠內焙乾令透熱便安在四方磚上磚上書八卦五行字用炭一稱籠迭周匝自巳午時從下生火令漸漸上徹有墜下火旋夾火上直至經宿火冷炭消盡又放經宿罐冷定取出細研以絹羅子羅至細瓷盒內盛依前法使用紹興續添方化膿排膿內補十宣散亦名折里十補散治一切癰疽瘡癤未成者速散已成者速潰敗膿自出無用手擠惡肉自去不犯刀杖服藥後疼痛頓減其效如神黃耆以綿上來者為勝半如箭竿長二三尺頭不叉者洗淨寸截槌破絲擘以鹽湯潤透用盞盛蓋湯鉼上一炊久焙燥隨眾藥入碾成細末一兩人參以新羅者為上擇團結重實滋潤者洗淨去蘆薄切焙乾搗用當歸取川中來者擇大片如馬尾狀滋潤甜辣芬香者溫水洗薄切焙乾各二兩厚朴用梓間者肉厚而色紫掐之油出去粗皮切薑汁罨一宿爁熟焙燥勿用桂樸桔梗以有心味苦者為真無心味甘者薺苨也主解藥毒切勿誤用洗淨去頭尾薄切焙燥桂心用卷薄者古法帶皮桂每兩隻取二錢半合用一兩者當買四兩候眾藥罷別研方入不得見火芎藭以川中來者為上今多用撫芎大塊者淨洗切焙防風擇新香者淨洗切焙甘草生用白芷各一兩上十味選藥貴精皆取淨曬焙極燥方秤除桂心外一處搗羅為細末入桂令勻每服自三錢加至五六錢熱酒調下日夜各數服以多為妙服至瘡口合更服尤佳所以補前損杜後患也不飲酒人濃煎木香湯下然不若酒力之勝也或飲酒不多能勉強間用酒調並以木香湯解酒功效當不減於酒也大抵癰疽之作皆血氣凝滯風毒壅結所致治之不早則外壞肌肉內攻臟腑其害甚大才覺便服倍加服數服之醉則其效尤速發散風毒流行經絡排膿止痛生肌長肉藥性平和老人小兒婦人室女皆可服之沒藥降聖丹治打撲閃肭筋斷骨折攣急疼痛不能屈伸及榮衛虛弱外受遊風內傷經絡筋骨緩縱皮肉刺痛肩背拘急身體倦怠四肢少力自然銅火煅醋淬十二次研末水飛過焙川烏頭生去皮臍骨碎補爁去毛白芍藥沒藥別研乳香別研當歸洗焙各一兩生乾地黃川芎各一兩半上並生用為細末以生薑自然汁與蜜等分煉熟和丸每一兩作四丸每服一丸捶碎水酒各半盞入蘇木少許同煎至八分去蘇木熱服空心食前寶慶新增方千金漏蘆湯治癰疽發背丹毒惡腫時行熱毒發作赤色瘰癧初發頭目赤痛暴生障翳吹奶腫痛一切無名惡瘡雖覺所苦細微不可輕慢急服此藥並皆內消更不成膿若發背癰疽已成膿者當排膿服之直至膿盡漏蘆去蘆麻黃去根節升麻銼赤芍藥生銼黃芩去皮甘草生銼白蘞淨洗白芨去須枳殼米泔浸一宿去白各四兩生大黃一十三兩上㕮咀每服四錢水二盞煎至一盞紗帛濾去渣空心食前熱服以快利為度病人更自量增損服之立效滑肌散治風邪客於肌中渾身瘙癢致生瘡疥及脾肺風毒攻衝遍身瘡疥皴裂乾溼髮瘡日久不瘥並皆治之剪草七兩不見火輕粉一錢上為細末瘡濕用藥乾摻瘡干用麻油調藥敷之神效托裡散治癰疽發背腸癰奶癰無名腫毒焮作疼痛憎寒壯熱類若傷寒不問老幼虛人並皆治之忍冬草去梗黃耆去蘆各五兩當歸一兩二錢甘草炙八兩上為細末每服二錢酒一盞半煎至一盞若病在上食後服病在下食前服少須再進第二服留渣外敷未成膿者內消已成膿者即潰淳祐新添方紅玉散斂瘡口生肌肉止疼痛去惡水不問日近年深並治之寒水石炭火燒通赤候冷細研二兩黃丹半兩上同研細乾摻瘡口內後用萬金膏貼每日一上再上尤妙萬金膏治癰疽發背諸般瘡癤從高墜墮打撲傷損腳膝生瘡遠年臁瘡五般痔漏一切惡瘡並皆治之龍骨鱉甲苦參烏賊魚骨黃柏草烏頭黃連豬牙皂角黃芩白蘞白芨木鱉子仁當歸洗焙厚朴去粗皮川芎香白芷沒藥別研槐枝柳枝並同銼研各一分乳香別研一錢黃丹一兩半清麻油四兩冬月用半斤上除黃丹外銀石器中將諸藥並油內用慢火煎紫赤色去藥不用卻入黃丹一半放油內不住手攪令微黑更入余黃丹不住手攪須是慢火熬令紫黑滴在水上不散及不黏手然後更別入黃丹少許再熬數沸如硬時卻更入油些少以不黏手為度用時量瘡大小攤紙上貼之吳直閣增諸家名方接骨散治從高墮下馬逐傷折筋斷骨碎痛不可忍接骨續筋止痛活血定粉當歸各一錢硼砂一錢半上為細末每服二錢煎蘇木湯調下服訖後時時吃蘇木湯急風散治久新諸瘡破傷中風項強背直腰為反折口噤不語手足抽掣眼目上視喉中沸聲丹砂一兩草烏頭三兩一半生用一半以火燒存性於米醋內淬令冷麝香研生烏豆同草烏一處為末各一分上為細末和勻破傷風以酒一小盞調半錢神效如出箭頭先用酒一盞調服半錢卻以藥貼箭瘡上油調立效散治濕疥浸淫流潰遍體大作瘭漿搔之水出小如粟粒癢痛難忍肌膚濕潤經久不瘥膩粉綠礬黃柏微炙細研硫黃研細各等分上為細末研勻以生油調藥塗之導滯散治重物壓迮或從高墜下作熱五內吐血下血出不禁止或瘀血在內胸腹脹滿喘粗氣短當歸大黃上等分炒為末每二錢溫酒調下不拘時候如聖散治肺臟風毒攻發皮膚血氣凝澀變生疥瘡瘙癢搔之皮起作痂增展浸引連滯不瘥此藥活血脈潤皮膚散風邪止瘙癢蛇床子半兩黃連去須三分胡粉結砂子一兩水銀同胡粉點水研令黑一分上件藥以生麻油和稀滑每用藥時先以鹽漿水洗瘡令淨後以藥塗之干即便換不過三五度瘥檳榔散治癰疽瘡癤膿潰之後外觸風寒腫焮結硬膿水清稀出而不絕內腠空虛惡汁臭敗瘡邊乾急好肌不生及療疳瘻惡瘡連滯不瘥下注臁瘡浸潰不斂檳榔黃連去須切木香各等分上為細末每用干貼瘡上拔毒散治小兒丹毒肉色變異或著四肢或在胸背遊走不定焮熱疼痛拔痛消腫散熱定疼石膏三兩甘草黃柏各一兩寒水石七兩上為細末每用水調時復以雞翎刷掃以芭蕉自然汁調妙琥珀膏治頸項瘰癧及發腋下初如梅子腫結硬強漸若連珠不消不潰或穿穴膿潰肌汁不絕經久難瘥漸成瘻疾並治之琥珀一兩木通桂心當歸白芷防風松脂硃砂研木鱉去殼各半兩麻油二斤丁香木香各三分上件藥先用琥珀丁香桂心硃砂木香五味搗羅為末其餘藥並細銼以油浸一宿於鐺中以慢火煎候白芷焦黃濾出次下松脂末濾去渣再澄清油卻安鐺中慢火熬下黃丹一斤以柳木篦不住手攪令黑色滴入水中成珠子不散看硬軟得所入琥珀等末攪令勻於瓷器內盛之每使時看大小用火㶸紙上勻攤貼之丹參膏治乳腫乳癰毒氣焮作赤熱漸成攻刺疼痛及治乳核結硬不消散通順經絡宣導壅滯丹參赤芍藥白芷各等分上細銼以酒淹三宿入豬脂半斤微煎令白芷黃色濾去渣入黃蠟一兩每用少許時時塗之神效當歸膏治湯火傷初起瘭漿熱毒侵展焮赤疼痛毒氣壅盛腐化成膿斂瘡口生肌肉拔熱毒止疼痛當歸黃蠟各一兩麻油四兩上件先將油煎令當歸焦黑去滓次入蠟急攪之放冷入瓷盒內每使時故帛子攤貼之膩粉膏治風邪熱毒客搏皮膚身體生瘡癢痛無時及大疥作瘡焮赤疼痛浸淫侵展肌汁不絕拔熱毒止疼痛生肌肉斂瘡口神效豬脂煉六兩松脂半兩膩粉胡粉黃連為末甘草為末各一兩上件藥先以豬脂煎松脂次入黃蠟二兩濾去渣次下膩粉並四味攪勻傾於瓷器中每用藥少許塗之日三四易烏蛇膏治風邪毒氣外客皮膚熏發成腫所起不定遊走往來時發癢痛或風毒勢盛攻注成瘡焮赤多膿瘡邊緊急但是風腫並皆治之吳茱萸藁本獨活細辛白殭蠶去絲嘴炒半夏蜀椒去目炒防風赤芍藥當歸桂心川芎香白芷各半兩烏蛇黃蠟各二兩乾蠍附子去皮尖各一兩上件細銼以煉臘月豬脂二斤文火煎候白芷赤黑色為度綿濾去渣下蠟入瓷器內盛每用取少許摩之令熱日三服槐白皮膏治內外諸痔腫核結硬或癢發無時或痛不可忍或肛邊生瘡赤爛侵潰或鼠乳附核久不消散槐白皮楝實各五兩甘草白芷各二兩赤小豆二合桃仁六十枚當歸三兩上七味㕮咀以煎成豬膏一斤微火煎白芷黃藥成每用摩瘡上日再用神仙太一膏治八發癰疽一切惡瘡軟癤不問年月深遠已成膿未成膿貼之即效蛇虎蠍犬湯火刀斧所傷並可內服外貼發背先以溫水洗瘡拭乾用帛子攤藥貼仍用水下一粒血氣木通酒下赤白帶下當歸酒下咳嗽喉閉纏喉風並綿裹含化一切風赤眼貼太陽穴後用山梔子湯下打撲傷損貼藥仍用橘皮湯下腰膝痛貼之鹽湯下唾血桑白皮湯下諸漏先以鹽湯洗其諸瘡癤並量大小以紙攤藥貼之並每服一粒旋丸櫻桃大以蛤粉為衣其藥可收十年不壞愈久愈烈神效不可具述玄參白芷川當歸去蘆肉桂去粗皮大黃赤芍藥生乾地黃各一兩上銼用麻油二斤浸春五日夏三日秋七日冬十日濾去滓油熬得所次下黃丹一斤以滴油在水中不散為度續添諸局經驗秘方補損當歸散療墜馬落車被打傷腕折臂呼叫不絕服此藥呼吸之間不復大痛服三日筋骨即當相連神效澤蘭制附子炮去皮臍各一分當歸炒蜀椒炒出汗甘草炙桂心各三分芎藭炒六分上為細末每服二錢溫酒調下日三服忌海藻菘菜生蔥豬肉冷水復元通氣散治瘡癤癰疽方作焮赤初發疼痛及膿已潰未潰小腸氣腎癰便毒腰痛氣刺腿膝生瘡及婦人吹奶舶上茴香炒穿山甲銼蛤粉炒去粉各二兩南木香不見火一兩半延胡索擦去皮白牽牛炒取末陳皮去白甘草炒各一兩上為細末每服一大錢熱酒調病在上食後服病在下食前服不飲酒人煎南木香湯調下排膿托裡散治一切瘡癤癰毒及腸癰背疽或赤腫而未破或已破而膿血不散渾身發熱疼痛不可堪忍者並治婦人奶癰一切毒腫並宜服之地蜈蚣赤芍藥當歸甘草各等分上為細末每服二錢溫酒調下不拘時候升麻和氣飲治瘡疥發於四肢臀髀痛癢不常甚至憎寒發熱攻刺疼痛浸淫浮腫又癩風入臟陰下濕癢耳鳴眼痛皆治之乾薑熟枳殼各半錢乾葛熟蒼朮桔梗升麻各一兩當歸熟半夏茯苓白芷各二錢陳皮甘草各一兩半芍藥七錢半大黃蒸半兩上為銼散每服四大錢水一盞半姜三片燈心十五莖煎至七分去渣食前服五香連翹湯治一切惡核瘰癧癰疽惡腫等病出三因方沉香不見火乳香不見火研甘草生舶上青木香不見火各一分連翹去蒂射干升麻桑寄生無以升麻代之獨活今鋪家所賣者只是宿前胡或是土當歸不堪用只用羌活甚妙木通去節各三分丁香不見火半兩大黃蒸三兩麝香真者別研一錢半上㕮咀每服四大錢水二盞煮取一盞以上去渣取八分清汁空心熱服半日以上未利再吃一服以利下惡物為度未生肉前服不妨以折去熱毒之氣本方有竹瀝芒硝恐泥去聲者不能斟酌故闕之智者當自添減五香連翹湯方甚多當以三因為正李氏方今並存之李氏方用乳香甘草木香沉香連翹射干升麻木通桑寄生獨活各三分丁香半兩大便秘者加大黃三分李氏所以不用大黃者蓋恐虛人老人不宜服故臨時加減用又一方青木香三分桑寄生二分沉香木通生黃耆大黃各一兩酒浸煨麝香二錢乳香藿香川升麻連翹各半兩雞舌香三分此方與三因李氏方同但外加雞舌香藿香耳
